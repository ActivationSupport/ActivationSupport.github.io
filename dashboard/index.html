function _devSwitchRole(role) {
  // Clicking the active role resets back to master-admin
  _DEV_ROLE = (_DEV_ROLE === role) ? null : role;
  SESSION.role = _DEV_ROLE || SESSION._actualRole || 'master-admin';
  var nameEl = document.getElementById('sb-user-name');
  if (nameEl) nameEl.textContent = SESSION.name + ' · ' + (_DEV_ROLE ? '👁 '+(_ROLE_LABELS[_DEV_ROLE]||_DEV_ROLE) : SESSION._actualRole);
  var wrap = document.getElementById('dev-toggle-wrap');
  if (wrap) wrap.innerHTML = _devToggleHtml();
  TAB_CACHE = {};
  buildNav();
  var tab = TABS.find(function(t){ return t.id === CURRENT_TAB; });
  if (!tab || !tab.roles.includes(SESSION.role)) {
    CURRENT_TAB = TABS.find(function(t){ return t.roles.includes(SESSION.role); }).id;
  }
  switchTab(CURRENT_TAB);
}

function buildNav() {
  var role = SESSION.role || 'client-rep';
  var nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  var lastGroup = null;
  TABS.forEach(function(t) {
    if (!t.roles.includes(role)) return;
    if (t.group && t.group !== lastGroup) {
      var lbl = document.createElement('div');
      lbl.className = 'nav-group-label';
      lbl.textContent = t.group;
      nav.appendChild(lbl);
      lastGroup = t.group;
    }
    var el = document.createElement('div');
    el.className = 'nav-item' + (t.id === CURRENT_TAB ? ' active' : '');
    el.dataset.tab = t.id;
    el.innerHTML = '<span class="nav-icon">' + t.icon + '</span><span>' + t.label + '</span>';
    el.onclick = function() { switchTab(t.id); };
    nav.appendChild(el);
  });
}

function switchTab(id) {
  CURRENT_TAB = id;
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.tab === id);
  });
  var tab = TABS.find(function(t) { return t.id === id; });
  document.getElementById('page-title').textContent = tab ? tab.label : id;
  document.getElementById('page-subtitle').textContent = tab && tab.sub ? tab.sub : '';
  renderTab(id);
}

function loadData() {
  TAB_CACHE = {};
  _CACHE.mainFlight = true;
  document.getElementById('main-content').innerHTML = skelLoader();
  api({}).then(function(res) {
    _CACHE.mainFlight = false;
    if (res.error) { document.getElementById('main-content').innerHTML = '<div class="spinner">Error: ' + esc(res.error) + '</div>'; return; }
    DATA = res;
    _CACHE.mainDataTs = Date.now();
    var roster = DATA.roster || {};
    var me = roster[SESSION.email];
    if (me) {
      SESSION.role = me.rank || 'client-rep';
      SESSION.name = me.name || SESSION.email;
      SESSION.tableauName = me.tableauName || '';
    } else if (!SESSION.role) {
      SESSION.role = 'client-rep';
      SESSION.name = SESSION.email;
      SESSION.tableauName = '';
    }
    SESSION._actualRole = SESSION.role;
    sessionStorage.setItem('as_session_' + (SESSION.homeOffice || CFG.officeId), JSON.stringify(SESSION));
    document.getElementById('sb-user-name').textContent = SESSION.name + ' · ' + SESSION.role;
    _updateLastUpdated();

    if (devWrap) { devWrap.style.display = SESSION._actualRole === 'master-admin' ? 'block' : 'none'; if (SESSION._actualRole === 'master-admin') devWrap.innerHTML = _devToggleHtml(); }
    buildNav();
    var tab = TABS.find(function(t) { return t.id === CURRENT_TAB; });
    if (!tab || !tab.roles.includes(SESSION.role)) {
      CURRENT_TAB = TABS.find(function(t) { return t.roles.includes(SESSION.role); }).id;
    }
    switchTab(CURRENT_TAB);
    // Pre-load secondary data in background so those tabs are instant
    _bgRefreshLst();
    _preloadArLines();

    _CACHE.mainFlight = false;
    document.getElementById('main-content').innerHTML = '<div class="spinner">Connection error. <a href="#" onclick="loadData()">Retry</a></div>';

function _updateLastUpdated() {
  var el = document.getElementById('last-updated'); if (!el || !_CACHE.mainDataTs) return;
  var s = Math.round((Date.now() - _CACHE.mainDataTs) / 1000);
  var txt = s < 10 ? 'just now' : s < 60 ? s + 's ago' : s < 3600 ? Math.floor(s/60) + 'min ago' : Math.floor(s/3600) + 'h ago';
  el.textContent = 'Updated ' + txt;
}

function _bgRefreshMain() {
  if (_CACHE.mainFlight) return;
  _CACHE.mainFlight = true;
  api({}).then(function(res) {
    _CACHE.mainFlight = false;
    if (res.error) return;
    DATA = res;
    _CACHE.mainDataTs = Date.now();
    var me = (DATA.roster || {})[SESSION.email];
    if (me) SESSION.tableauName = me.tableauName || SESSION.tableauName;

function _startBgRefresh() {
  clearInterval(_bgInterval);
  clearInterval(_luInterval);
  // Check every 15s — fires a refresh once the TTL (90s) has passed
  _bgInterval = setInterval(function() {
    if (document.getElementById('app').style.display === 'none') return;
    var modalOpen = document.getElementById('detail-modal').classList.contains('open');
    if (modalOpen) {
      if (Date.now() - _CACHE.mainDataTs >= _CACHE.MAIN_TTL) _pendingRefresh = true;
      return;
    }
    if (Date.now() - _CACHE.mainDataTs >= _CACHE.MAIN_TTL) _bgRefreshMain();
    if (Date.now() - _CACHE.lstSalesTs  >= _CACHE.LST_TTL)  _bgRefreshLst();
  }, 15000);
  // Tick the "X ago" label every 20s
  _luInterval = setInterval(_updateLastUpdated, 20000);
}

function _myTeam() {
  var role = SESSION.role, teams = DATA.teams || {}, roster = DATA.roster || {};
  if (role === 'leader') {
    var myEmail = (SESSION.email || '').toLowerCase();
    var found = null;
    Object.keys(teams).forEach(function(tid) {
      if ((teams[tid].leaderId || '').toLowerCase() === myEmail) found = teams[tid];
    });
    return found;
  }
  if (role === 'jd') {
    var me = roster[SESSION.email] || {};
    var teamName = me.team || '';
    if (!teamName) return null;
    var found2 = null;
    Object.keys(teams).forEach(function(tid) {
      if (teams[tid].name === teamName) found2 = teams[tid];
    });
    return found2;
  }
  return null;
}
function _teamTableauNames(teamName) {
  if (!teamName) return [];
  var roster = DATA.roster || {};
  var tns = [];
  Object.keys(roster).forEach(function(email) {
    var p = roster[email];
    if ((p.team || '') === teamName && p.tableauName)
      tns.push((p.tableauName || '').trim().toLowerCase());
  });
  return tns;
}
function _teamEmails(teamName) {
  if (!teamName) return [];
  var roster = DATA.roster || {};

    return (roster[email].team || '') === teamName;
  });
}

// ── REP FILTER ────────────────────────────────────────────────────────────
function repFilter(orders) {
  var role = SESSION.role;
  if (role === 'client-rep') {
    var tn = (SESSION.tableauName || '').trim();
    if (!tn) return [];
    return orders.filter(function(o) { return o.rep === tn; });
  }
  if (role === 'leader' || role === 'jd') {
    var team = _myTeam();
    if (team) {
      var tns = _teamTableauNames(team.name);
      if (!tns.length) return [];
      return orders.filter(function(o) { return tns.indexOf((o.rep || '').trim().toLowerCase()) !== -1; });
    }
    var tn2 = (SESSION.tableauName || '').trim();
    return tn2 ? orders.filter(function(o) { return o.rep === tn2; }) : [];
  }
  return orders;
}
function isIssueStatus(s) {
  var sl = String(s||'').toLowerCase().trim();
  return sl.indexOf('porting issue') !== -1 ||
         sl.indexOf('port approved') !== -1 ||
         sl.indexOf('pending order port') !== -1 ||
         sl.indexOf('byod') !== -1 ||
         sl.indexOf('pending valid payment') !== -1;
}
function issueFilter(orders) {
  return orders.filter(function(o) {
    return Object.keys(o.statusCounts||{}).some(isIssueStatus);
  });
}
function _cutoff29() {
  var d = new Date(); d.setDate(d.getDate() - 29);
  return d.toISOString().slice(0, 10);
}
function within29Days(orders) {
  var cutoff = _cutoff29();
  return orders.filter(function(o) { return (o.orderDate || '') >= cutoff; });
}

var _AR_LOADING = false;

function renderActRates() {

function _renderActRatesWithData() {
  if (!_AR_LINES || !_AR_LINES.length) return noData('No activation rate data available.');

  var role = SESSION.role || 'client-rep';
  var myName = (SESSION.tableauName || '').toLowerCase();
  var isTeamScoped = role === 'leader' || role === 'jd';
  var isRep = role === 'client-rep' || isTeamScoped;

  var repSet = {};

    reps.map(function(r){ return '<option value="'+esc(r)+'">'+esc(r)+'</option>'; }).join('') + '</select>' +
    '</div>';

    filterHtml + '<div id="ar-table-wrap">' + _buildArTable('') + '</div></div></div>';
}

function refreshActRates() {
  var rs = document.getElementById('ar-rep-sel');
  var wrap = document.getElementById('ar-table-wrap');
  if (wrap) wrap.innerHTML = _buildArTable(rs ? rs.value : '');
}

function _buildArTable(repFilter) {
  if (!_AR_LINES) return '';
  var role = SESSION.role || 'client-rep';
  var myName = (SESSION.tableauName || '').toLowerCase();
  var isClientRep = role === 'client-rep';
  var isTeamRole = role === 'leader' || role === 'jd';

  var BKT_MAP = { '0-7 Days':'b0_7', '8-14 Days':'b8_14', '15-30 Days':'b15_30', '31-60 Days':'b31_60' };

  // All office lines (respects admin rep-filter dropdown only)
  var allLines = _AR_LINES.filter(function(l) {
    if (repFilter && l.rep !== repFilter) return false;
    return true;
  });

  // Determine visible individual rows
  var indivLines;
  if (isClientRep && myName) {
    indivLines = allLines.filter(function(l) { return l.rep.toLowerCase() === myName; });
  } else if (isTeamRole) {
    var _arTeam = _myTeam();
    var _arTns = _arTeam ? _teamTableauNames(_arTeam.name) : [];
    if (_arTns.length) {
      indivLines = allLines.filter(function(l) { return _arTns.indexOf(l.rep.trim().toLowerCase()) !== -1; });
    } else if (myName) {
      indivLines = allLines.filter(function(l) { return l.rep.toLowerCase() === myName; });
    } else {
      indivLines = [];
    }
  } else {
    indivLines = allLines;
  }

  // Aggregate individual rows
  var repData = {};
  indivLines.forEach(function(l) {
    var b=BKT_MAP[l.bucket]; if (!b) return;
    if (!repData[l.rep]) repData[l.rep]={b0_7:{t:0,a:0},b8_14:{t:0,a:0},b15_30:{t:0,a:0},b31_60:{t:0,a:0}};
    repData[l.rep][b].t+=(l.vol||0); repData[l.rep][b].a+=(l.acts||0);
  });

  // Grand total: team roles use team lines; others use full office lines
  var grandLines = isTeamRole ? indivLines : allLines;
  var totals={b0_7:{t:0,a:0},b8_14:{t:0,a:0},b15_30:{t:0,a:0},b31_60:{t:0,a:0}};
  grandLines.forEach(function(l) {
    var b=BKT_MAP[l.bucket]; if (!b) return;
    totals[b].t+=(l.vol||0); totals[b].a+=(l.acts||0);
  });

  function bktCls(bktKey, pct) {
    if (bktKey==='b0_7')   return pct>=21?'ar-green':pct>=10?'ar-yellow':'ar-red';
    if (bktKey==='b8_14')  return pct>=71?'ar-green':pct>=51?'ar-yellow':'ar-red';
    if (bktKey==='b15_30') return pct>=75?'ar-green':pct>=70?'ar-yellow':'ar-red';
    if (bktKey==='b31_60') return pct>=86?'ar-green':pct>=79?'ar-yellow':'ar-red';
    return pct>=80?'ar-green':pct>=60?'ar-yellow':'ar-red';
  }

  function cell(b, bktKey, isTotal) {
    if (!isTotal && b.t===0) return '<td></td>';
    if (b.t===0) return '<td class="ar-cell"><div class="ar-badge ar-blue">(0/0)<br>—</div></td>';
    var pct=Math.round(b.a/b.t*100);
    return '<td class="ar-cell"><div class="ar-badge '+bktCls(bktKey,pct)+'">('+b.a+'/'+b.t+')<br>'+pct+'%</div></td>';
  }

  var repRows = Object.keys(repData).sort().map(function(rep) {
    var d=repData[rep];
    return '<tr><td class="ar-rep">'+esc(rep)+'</td>'+cell(d.b0_7,'b0_7',false)+cell(d.b8_14,'b8_14',false)+cell(d.b15_30,'b15_30',false)+cell(d.b31_60,'b31_60',false)+'</tr>';
  }).join('');

  if (!repRows) return '<div class="empty">No data for the selected filters.</div>';

  var grandRow = '<tr class="ar-grand-row"><td class="ar-rep ar-grand-rep">Grand Total</td>'+cell(totals.b0_7,'b0_7',true)+cell(totals.b8_14,'b8_14',true)+cell(totals.b15_30,'b15_30',true)+cell(totals.b31_60,'b31_60',true)+'</tr>';

  return '<div class="tbl-wrap"><table class="call-table"><thead><tr>' +
    '<th>Rep</th><th>0–7 Days</th><th>8–14 Days</th><th>15–30 Days</th><th>31–60 Days</th>' +
    '</tr></thead><tbody>'+grandRow+repRows+'</tbody></table></div>';
}

// ── STATUS PILL ───────────────────────────────────────────────────────────
function spCls(s) {
  if (!s) return 'sp-pale-yellow';
  var sl = s.toLowerCase().trim();
  if (!sl || sl === 'null' || sl === '—' || sl === '-') return 'sp-pale-yellow';
  if (sl === 'active')                                           return 'sp-active';
  if (sl === 'posted' || sl === 'approved')                     return 'sp-posted';
  if (sl.indexOf('cancel') !== -1)                              return 'sp-canceled';
  if (sl.indexOf('disco') !== -1)                               return 'sp-disconnected';
  if (sl === 'porting issue' || sl === 'pending valid payment') return 'sp-orange-bright';
  if (sl === 'byod')                                            return 'sp-orange';
  if (sl === 'port approved' || sl === 'pending order port')    return 'sp-dark-orange';
  if (sl.indexOf('deliver') !== -1)                             return 'sp-purple';
  if (sl.indexOf('ship') !== -1)                                return 'sp-yellow-bright';
  if (sl === 'scheduled' || sl.indexOf('sched') !== -1)         return 'sp-yellow';
  if (sl.indexOf('pend') !== -1 || sl === 'open' || sl === 'confirmed') return 'sp-pale-yellow';
  if (sl.indexOf('backorder') !== -1 || sl.indexOf('back order') !== -1) return 'sp-pale-yellow';
  return 'sp-default';
}
function statusPill(s) {
  if (!s) return '<span class="sp sp-pale-yellow">Null</span>';
  return '<span class="sp ' + spCls(s) + '">' + esc(s) + '</span>';
}

var SARA_URL = 'https://www.saraplus.com/e/ServicePages/Login.aspx';
var _openedDsis = new Set();

function clickDsi(dsi) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(dsi);
  } else {
    var el = document.createElement('textarea');
    el.value = dsi; el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el); el.select(); document.execCommand('copy');
    document.body.removeChild(el);
  }
  if (!_openedDsis.has(dsi)) {
    _openedDsis.add(dsi);
    window.open(SARA_URL, '_blank');
    showToast('Copied & opened SARA: ' + dsi);
  } else {
    showToast('Copied: ' + dsi);
  }
}
function copyDsiAndOpen(dsi) { clickDsi(dsi); }

function showToast(msg) {
  var t = document.getElementById('dsi-toast'); if (!t) return;
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

var PRODUCT_LABELS = { 'WIRELESS':'Wireless','AIR/AWB':'Air','TABLET/WEARABLE':'Tablet','FIBER':'Fiber','VOIP':'VoIP','DTV':'DTV' };

function productBreakdown(productCounts) {
  if (!productCounts || !Object.keys(productCounts).length) return '<span class="sp sp-default">—</span>';
  return Object.keys(productCounts).map(function(pt) {
    var label = PRODUCT_LABELS[pt.toUpperCase()] || pt;
    var count = productCounts[pt];
    return '<span class="prod-pill">' + esc(label) + (count > 1 ? ' \xd7' + count : '') + '</span>';
  }).join('');
}

function statusBreakdown(statusCounts) {
  if (!statusCounts || !Object.keys(statusCounts).length) return '<span class="sp sp-yellow">—</span>';
  return Object.keys(statusCounts).map(function(s) {
    var count = statusCounts[s];
    return '<span class="sp ' + spCls(s) + '">' + esc(s) + (count > 1 ? ' \xd7' + count : '') + '</span>';
  }).join(' ');
}

function ratingPill(dsi, safeId) {
  var r = (DATA.ratings||{})[dsi] || '';
  var cls = r==='No Answer'?'rp-na':r==='1 Star'?'rp-1':r==='2 Stars'?'rp-2':r==='3 Stars'?'rp-3':r==='4 Stars'?'rp-4':r==='5 Stars'?'rp-5':'';
  var id = safeId ? ' id="rp-'+safeId+'"' : '';
  return '<span class="rating-pill '+cls+'"'+id+'>'+esc(r)+'</span>';
}

// ── NOTES MODAL ───────────────────────────────────────────────────────────
var _modalDsi = '';

function _noteItemHtml(n) {
  return '<div class="nm-note"><div class="nm-note-meta">'+fmtDate(n.ts)+' &mdash; '+esc(n.authorName)+'</div><div class="nm-note-text">'+esc(n.noteText)+'</div></div>';
}

function openNotesModal(dsi, customer, rep) {
  _modalDsi = dsi;
  var notes = (DATA.notes||{})[dsi] || [];
  var rating = (DATA.ratings||{})[dsi] || '';
  var role = SESSION.role || 'client-rep';
  var canAddActivation = role==='master-admin' || role==='activator';
  var canAddRep = ['master-admin','owner','admin','activator','client-rep','leader','jd','manager'].indexOf(role) !== -1;

  var actNotes = notes.filter(function(n){ return (n.noteType||'activation')==='activation'; });
  var repNotes = notes.filter(function(n){ return n.noteType==='rep' || n.noteType==='note'; });

  var actHistHtml = actNotes.length ? actNotes.map(_noteItemHtml).join('') : '<div class="nm-empty">No activation notes yet.</div>';
  var repHistHtml = repNotes.length ? repNotes.map(_noteItemHtml).join('') : '<div class="nm-empty">No rep notes yet.</div>';

  var ratingHtml = RATING_OPTS.map(function(r) {
    var active = r===rating ? ' active-'+( r==='No Answer'?'na': r.replace(' Stars','').replace(' Star','') ) : '';
    return '<button class="nm-r-btn'+active+'" onclick="modalSetRating(\''+r+'\')">'+r+'</button>';
  }).join('');

  document.getElementById('modal-title').innerHTML =
    '<div class="nm-dsi">DSI: '+esc(dsi)+'</div>' +
    '<div class="nm-sub">'+(rep?esc(rep):'')+'</div>';

  document.getElementById('modal-body').innerHTML =
    '<div class="nm-section-label nm-act-label">Activation Notes</div>' +
    '<div class="nm-history" id="nm-act-hist">'+actHistHtml+'</div>' +
    (canAddActivation ? '<textarea class="nm-textarea" id="nm-act-input" placeholder="Add activation note…"></textarea><button class="nm-add-btn" onclick="modalAddNote(\'activation\')" style="margin-bottom:14px">ADD ACTIVATION NOTE</button>' : '') +
    '<div class="nm-section-label nm-rep-label" style="margin-top:8px">Rep Notes</div>' +
    '<div class="nm-history" id="nm-rep-hist">'+repHistHtml+'</div>' +
    (canAddRep ? '<textarea class="nm-textarea" id="nm-rep-input" placeholder="Add rep note…"></textarea><button class="nm-add-btn nm-rep-add-btn" onclick="modalAddNote(\'rep\')" style="margin-bottom:14px">ADD REP NOTE</button>' : '') +
    '<div class="nm-section-label" style="margin-top:8px">Rating</div>' +
    '<div class="nm-rating-row" id="nm-rating-row">'+ratingHtml+'</div>' +
    '<div class="nm-actions"><button class="nm-close-btn" style="width:100%" onclick="closeModal()">CLOSE</button></div>';

  document.getElementById('detail-modal').classList.add('open');

function modalSetRating(rating) {
  if (!_modalDsi) return;
  if (!DATA.ratings) DATA.ratings = {};
  DATA.ratings[_modalDsi] = rating;
  // Update modal buttons
  document.querySelectorAll('#nm-rating-row .nm-r-btn').forEach(function(btn) {
    var r = btn.textContent.trim();
    var active = r===rating ? ' active-'+(r==='No Answer'?'na':r.replace(' Stars','').replace(' Star','')) : '';
    btn.className = 'nm-r-btn' + active;
  });
  // Update rating pill on the row
  var pill = document.getElementById('rp-'+_modalDsi.replace(/\W/g,'_'));
  if (pill) {
    var cls = rating==='No Answer'?'rp-na':rating==='1 Star'?'rp-1':rating==='2 Stars'?'rp-2':rating==='3 Stars'?'rp-3':rating==='4 Stars'?'rp-4':rating==='5 Stars'?'rp-5':'';
    pill.className = 'rating-pill '+cls;
    pill.textContent = rating;
  }
  apiPost({ action:'setRating', dsi:_modalDsi, rating:rating, updatedBy:SESSION.email });
}

function modalAddNote(noteType) {
  noteType = noteType || 'activation';
  var inputId = noteType === 'rep' ? 'nm-rep-input' : 'nm-act-input';
  var histId  = noteType === 'rep' ? 'nm-rep-hist'  : 'nm-act-hist';
  var input = document.getElementById(inputId);
  if (!input) return;
  var text = input.value.trim(); if (!text) return;
  input.value = ''; input.disabled = true;
  var now = new Date().toISOString();
  var entry = { ts:now, authorEmail:SESSION.email, authorName:SESSION.name||SESSION.email, noteText:text, noteType:noteType };
  if (!DATA.notes) DATA.notes = {};
  if (!DATA.notes[_modalDsi]) DATA.notes[_modalDsi] = [];
  DATA.notes[_modalDsi].push(entry);
  var hist = document.getElementById(histId);
  if (hist) {
    hist.querySelectorAll('.nm-empty').forEach(function(e) { e.remove(); });
    hist.innerHTML += _noteItemHtml(entry);
    hist.scrollTop = hist.scrollHeight;
  }
  var noteCount = document.getElementById('nc-'+_modalDsi.replace(/\W/g,'_'));
  if (noteCount) noteCount.textContent = DATA.notes[_modalDsi].length;
  apiPost({ action:'addNote', dsi:_modalDsi, noteText:text, noteType:noteType, authorEmail:SESSION.email, authorName:SESSION.name||SESSION.email })
    .then(function() { input.disabled = false; })
    .catch(function() { input.disabled = false; });
}

// ── CALL TABLE ────────────────────────────────────────────────────────────
var _tabOrders = [], _sortTblId = '', _sortState = { col: null, dir: 1 };
var _activeFilters = { products: [], statuses: [], dateFrom: '', dateTo: '', lastCalled: '' };
var _extraColFn = null;

function _applyView() {
  var result = _tabOrders.filter(function(o) {
    if (_activeFilters.products.length) {
      var pk = Object.keys(o.productCounts||{}).map(function(k){ return k.toLowerCase(); });
      if (!_activeFilters.products.some(function(p){ return pk.indexOf(p.toLowerCase()) !== -1; })) return false;
    }
    if (_activeFilters.statuses.length) {
      var sk = Object.keys(o.statusCounts||{}).map(function(k){ return k.toLowerCase(); });
      if (!_activeFilters.statuses.some(function(s){ return sk.indexOf(s.toLowerCase()) !== -1; })) return false;
    }
    if (_activeFilters.dateFrom && o.orderDate < _activeFilters.dateFrom) return false;
    if (_activeFilters.dateTo   && o.orderDate > _activeFilters.dateTo)   return false;
    if (_activeFilters.lastCalled) {
      var d = o._daysSince === undefined ? _daysSinceLastNote(o.dsi) : o._daysSince;
      if (_activeFilters.lastCalled === 'recent'  && !(d !== null && d <= 2))  return false;
      if (_activeFilters.lastCalled === 'mid'     && !(d !== null && d >= 3 && d <= 7)) return false;
      if (_activeFilters.lastCalled === 'overdue' && !(d !== null && d >= 8))  return false;
      if (_activeFilters.lastCalled === 'never'   && d !== null)               return false;
    }
    if (_activeFilters.risk) {
      if (_activeFilters.risk === 'atrisk'  && !_isAtRisk(o.dsi))  return false;
      if (_activeFilters.risk === 'rotting' && !_isRotting(o.dsi)) return false;
      if (_activeFilters.risk === 'booked'  && !_bookedFor(o.dsi)) return false;
    }
    return true;
  });
  if (_sortState.col) {
    var col = _sortState.col;
    result.sort(function(a, b) {
      var va, vb;
      if      (col==='rep')     { va=(a.rep||'').toLowerCase();                      vb=(b.rep||'').toLowerCase(); }
      else if (col==='dsi')     { va=a.dsi||'';                                      vb=b.dsi||''; }
      else if (col==='date')    { va=a.orderDate||'';                                vb=b.orderDate||''; }
      else if (col==='product') { va=Object.keys(a.productCounts||{}).sort()[0]||''; vb=Object.keys(b.productCounts||{}).sort()[0]||''; }
      else if (col==='status')     { va=Object.keys(a.statusCounts||{}).sort()[0]||''; vb=Object.keys(b.statusCounts||{}).sort()[0]||''; }
      else if (col==='lastcalled') {
        var da2 = a._daysSince === undefined ? _daysSinceLastNote(a.dsi) : a._daysSince;
        var db2 = b._daysSince === undefined ? _daysSinceLastNote(b.dsi) : b._daysSince;
        va = da2 === null ? 9999 : da2; vb = db2 === null ? 9999 : db2;
        return (va - vb) * _sortState.dir;
      }
      else return 0;
      return va<vb ? -_sortState.dir : va>vb ? _sortState.dir : 0;
    });
  }
  var tbody = document.querySelector('#'+_sortTblId+' tbody');
  if (tbody) tbody.innerHTML = callTableRows(result, _extraColFn);
  var inp = document.getElementById('f-'+_sortTblId.replace('-table',''));
  if (inp && inp.value) {
    var q = inp.value.toLowerCase();
    Array.from(document.querySelectorAll('#'+_sortTblId+' tbody tr')).forEach(function(tr) {
      tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }
  var countEl = document.getElementById('ct-count');
  if (countEl) {
    var visible = Array.from(document.querySelectorAll('#ct-table tbody tr')).filter(function(tr){ return tr.style.display !== 'none'; }).length;
    countEl.textContent = visible === _tabOrders.length
      ? 'Showing all ' + _tabOrders.length + ' orders'
      : 'Showing ' + visible + ' of ' + _tabOrders.length + ' orders';
  }
  var chipsEl = document.getElementById('ct-chips');
  if (chipsEl) chipsEl.innerHTML = _ctChipsInner(_tabOrders);   // keep chip counts/active state fresh (e.g. after booked load)
}

function sortCallTable(col) {
  _sortState.dir = _sortState.col === col ? -_sortState.dir : 1;
  _sortState.col = col;
  _applyView();
  var labels = { rep:'Name', dsi:'DSI', date:'Date', product:'Product', status:'Status', lastcalled:'Last Called' };
  document.querySelectorAll('#'+_sortTblId+' th[data-col]').forEach(function(th) {
    th.textContent = (labels[th.dataset.col]||th.dataset.col) + (th.dataset.col===col ? (_sortState.dir===1?' ↑':' ↓') : '');
  });
}

function ddSelectAll(ddId) {
  document.querySelectorAll('#ddp-'+ddId+' input[type=checkbox]').forEach(function(cb){ cb.checked = true; });
  applyCallFilters();
}
function ddClearAll(ddId) {
  document.querySelectorAll('#ddp-'+ddId+' input[type=checkbox]').forEach(function(cb){ cb.checked = false; });

function toggleDd(id, event) {
  if (event) event.stopPropagation();
  var panel = document.querySelector('#'+id+' .dd-panel');

  document.querySelectorAll('.dd-panel.open').forEach(function(p){ p.classList.remove('open'); });
  if (!wasOpen) panel.classList.add('open');

function _updateFilterBadge() {
  var inp = document.getElementById('f-ct');
  var count = _activeFilters.products.length + _activeFilters.statuses.length +
    (_activeFilters.dateFrom ? 1 : 0) + (_activeFilters.dateTo ? 1 : 0) +
    (inp && inp.value ? 1 : 0);

  var btn = document.querySelector('.clear-filters-btn');

function applyCallFilters() {
  _activeFilters.products = [];

  var sb = document.querySelector('#dd-status .dd-btn');
  if (sb) sb.textContent = (_activeFilters.statuses.length ? 'Status ('+_activeFilters.statuses.length+')' : 'Status') + ' ▾';
  _updateFilterBadge();

function clearCallFilters() {
  _activeFilters = { products: [], statuses: [], dateFrom: '', dateTo: '', risk: '' };
  document.querySelectorAll('#ddp-product input, #ddp-status input').forEach(function(cb){ cb.checked = false; });
  var fe = document.getElementById('f-date-from'); if (fe) fe.value = '';
  var te = document.getElementById('f-date-to');   if (te) te.value = '';
  var rk = document.querySelector('.ct-risk-filter'); if (rk) rk.value = '';
  var se = document.getElementById('f-'+_sortTblId.replace('-table','')); if (se) se.value = '';
  var pb = document.querySelector('#dd-product .dd-btn'); if (pb) pb.textContent = 'Product ▾';
  var sb = document.querySelector('#dd-status .dd-btn');  if (sb) sb.textContent = 'Status ▾';
  _applyView();
  _updateFilterBadge();
}

function _buildFilterRow(searchId) {
  var products = {}, statuses = {};
  _tabOrders.forEach(function(o) {
    Object.keys(o.productCounts||{}).forEach(function(k){ products[k]=true; });
    Object.keys(o.statusCounts||{}).forEach(function(k){ statuses[k]=true; });
  });
  function ddHtml(ddId, label, items) {
    return '<div class="dd-filter" id="dd-'+ddId+'">' +
      '<button class="dd-btn" onclick="toggleDd(\'dd-'+ddId+'\',event)">'+label+' ▾</button>' +
      '<div class="dd-panel" id="ddp-'+ddId+'">' +
      '<div class="dd-panel-hdr">Filter by '+label+'</div>' +
      items.map(function(v){ return '<label><input type="checkbox" value="'+esc(v)+'" onchange="applyCallFilters()"> '+esc(v)+'</label>'; }).join('') +
      '<div class="dd-panel-actions"><span onclick="ddSelectAll(\''+ddId+'\')">Select all</span><span onclick="ddClearAll(\''+ddId+'\')">Clear</span></div>' +
      '</div></div>';
  }
  return '<div class="filter-row">' +
    '<input id="'+searchId+'" placeholder="Search rep, DSI…">' +
    ddHtml('product','Product',Object.keys(products).sort()) +
    ddHtml('status','Status',Object.keys(statuses).sort()) +
    '<div class="date-filter-wrap"><span>From</span><input type="date" id="f-date-from" onchange="applyCallFilters()"><span>To</span><input type="date" id="f-date-to" onchange="applyCallFilters()"></div>' +
    '<button class="clear-filters-btn" onclick="clearCallFilters()">Clear</button>' +
    '<span id="filter-active-badge" class="filter-active-badge"></span>' +
    '</div>';
}

// ── At-risk / rotting / booked classification (call-log row signals) ──────
// At-risk  = order rated 1–2★ OR present in the Order Issues log.
// Rotting  = order rated "No Answer" AND 8+ days since the last note/call.
// Booked   = the customer's DSI has a future, non-cancelled appointment.
var _ISSUE_DSI = null;        // {dsi:true} — rebuilt each render from DATA.orderIssues
var _BOOKED_MAP = null;       // dsi -> {date,timeSlot} nearest future appt (null = not loaded)
var _bookedLoading = false;
var _ctShowRiskFlags = true;  // show ⚠/⏳ flags on generic call tables, not on No Answer/Escalations

function _issueDsiSet() {
  if (_ISSUE_DSI) return _ISSUE_DSI;
  _ISSUE_DSI = {};
  (DATA.orderIssues||[]).forEach(function(o){ if(o.dsi) _ISSUE_DSI[o.dsi]=true; });
  return _ISSUE_DSI;
}
function _isAtRisk(dsi) {
  var r=(DATA.ratings||{})[dsi]||'';
  return r==='1 Star' || r==='2 Stars' || !!_issueDsiSet()[dsi];
}
function _isRotting(dsi) {
  if (((DATA.ratings||{})[dsi]||'') !== 'No Answer') return false;
  var d=_daysSinceLastNote(dsi);
  return d!==null && d>=8;
}
function _bookedFor(dsi) { return (_BOOKED_MAP||{})[dsi]||null; }
function _ctShortDate(s) { var p=String(s||'').split('-'); return p.length===3 ? (Number(p[1])+'/'+Number(p[2])) : s; }

// Column summary chips above a call table — counts over the whole tab, each a
// one-click shortcut into the matching show-only risk filter.
function _ctChipsInner(orders) {
  var risk=_activeFilters.risk||'', n=orders.length, ar=0, rot=0, bk=0;
  orders.forEach(function(o){ if(_isAtRisk(o.dsi))ar++; if(_isRotting(o.dsi))rot++; if(_bookedFor(o.dsi))bk++; });
  function chip(val,label,count,cls){
    return '<span class="ct-chip'+(cls?' '+cls:'')+(risk===val?' ct-chip-active':'')+'" onclick="_ctSetRisk(\''+val+'\')">'+label+' <b>'+count+'</b></span>';
  }
  return chip('','Orders',n,'') +
    chip('atrisk','&#x26A0; At-risk',ar,'ct-chip-atrisk') +
    chip('rotting','&#x23F3; Rotting',rot,'ct-chip-rotting') +
    chip('booked','&#x1F4C5; Booked',bk,'ct-chip-booked');
}
function _ctSetRisk(val) {
  _activeFilters.risk = (_activeFilters.risk===val ? '' : val);   // toggle off if same chip
  var sel=document.querySelector('.ct-risk-filter'); if(sel) sel.value=_activeFilters.risk;
  _applyView();
}

// Lazily pull the appointment list once and map DSI -> nearest future appt, so
// call-log rows can show a "📅 Booked" badge. Uses the existing (already
// deployed) getAppointments endpoint. DSIs are privacy-masked for some roles —
// masked entries are skipped, so the badge degrades gracefully.
function _loadBookedAppts() {
  if (_bookedLoading) return;
  _bookedLoading = true;
  _apptGet({action:'getAppointments',officeId:CFG.officeId,bookerEmail:SESSION.email,role:SESSION.role}).then(function(res){
    var map={}, today=_apptDateStr(new Date());
    (res.appointments||[]).forEach(function(a){
      var d=a.customerDSI||'';
      if(!d || d.indexOf('•')!==-1) return;            // missing or masked
      if(a.status==='cancelled') return;
      if(!a.date || a.date<today) return;              // only upcoming / today
      if(!map[d] || a.date<map[d].date) map[d]={date:a.date,timeSlot:a.timeSlot};
    });
    _BOOKED_MAP=map; _bookedLoading=false;
    if(_sortTblId && document.getElementById(_sortTblId)) _applyView();   // re-stamp badges
  }).catch(function(){ _BOOKED_MAP={}; _bookedLoading=false; });
}

function callTableRows(orders, extraColFn) {
  return orders.map(function(o) {
    var dsi = o.dsi || '';
    var safeId = dsi.replace(/\W/g,'_');
    var noteCount = ((DATA.notes||{})[dsi]||[]).length;
    var extra = extraColFn ? extraColFn(o) : '';
    var rotting=_isRotting(dsi), atrisk=(!rotting && _isAtRisk(dsi)), booked=_bookedFor(dsi);
    var rowCls = rotting ? ' class="ct-row-rotting"' : (atrisk ? ' class="ct-row-atrisk"' : '');
    var flags='';
    if (_ctShowRiskFlags && rotting) flags+='<span class="ct-flag ct-flag-rotting" title="No Answer · 8+ days since last call">⏳ Rotting</span>';
    else if (_ctShowRiskFlags && atrisk) flags+='<span class="ct-flag ct-flag-atrisk" title="1–2★ rating or Order Issue">⚠ At-risk</span>';
    if (booked) flags+='<span class="ct-flag ct-flag-booked" title="Appointment '+esc(_apptFmtDate(booked.date))+' at '+esc(_apptFmt12(booked.timeSlot))+'">📅 '+esc(_ctShortDate(booked.date))+'</span>';
    var dsiCell='<span class="dsi-link" onclick="clickDsi(\''+esc(dsi)+'\')">'+esc(dsi)+'</span>'+(flags?'<div class="ct-flags">'+flags+'</div>':'');
    return '<tr'+rowCls+'>' +
      '<td><span class="rep-name">'+esc(o.rep)+'</span></td>' +
      '<td>'+dsiCell+'</td>' +
      '<td>'+esc(o.orderDate)+'</td>' +
      '<td>'+productBreakdown(o.productCounts)+'</td>' +
      extra +
      '<td>'+statusBreakdown(o.statusCounts)+'</td>' +
      '<td>' + ratingPill(dsi, safeId) + '</td>' +
      '<td>' +
        '<button class="notes-btn'+(noteCount>0?' has-notes':'')+'" onclick="openNotesModal(\''+esc(dsi)+'\',\''+esc(o.spe)+'\',\''+esc(o.rep)+'\')">NOTES' +
        (noteCount>0?'<span class="notes-count" id="nc-'+safeId+'">'+noteCount+'</span>':'') +
        '</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

function _sortHeaders(tblId) {
  var cols = [['rep','Name'],['dsi','DSI'],['date','Date'],['product','Product'],['status','Status']];
  return cols.map(function(c) {
    return '<th class="sort-th" data-col="'+c[0]+'" onclick="sortCallTable(\''+c[0]+'\')">'+c[1]+'</th>';
  }).join('') + '<th>Rating</th><th>Notes</th>';
}

function renderCallTable(orders, title, emptyMsg) {
  if (!orders.length) return noData(emptyMsg);
  _tabOrders = orders.slice(); _sortTblId = 'ct-table'; _sortState = { col: null, dir: 1 }; _activeFilters = { products: [], statuses: [], dateFrom: '', dateTo: '', risk: '' }; _extraColFn = null;
  _ctShowRiskFlags = true; _ISSUE_DSI = null;
  if (_BOOKED_MAP === null) _loadBookedAppts();   // lazy one-time appointment pull for booked badges
  var riskSel = '<select class="ct-risk-filter" onchange="_activeFilters.risk=this.value;_applyView()">' +
    '<option value="">All orders</option>' +
    '<option value="atrisk">&#x26A0; At-risk only</option>' +
    '<option value="rotting">&#x23F3; Rotting only</option>' +
    '<option value="booked">&#x1F4C5; Booked only</option>' +
    '</select>';
  return '<div class="card"><div class="card-header dark">'+esc(title)+' &nbsp;<span style="font-weight:400;font-size:.82rem;opacity:.8">'+orders.length+' orders</span></div><div class="card-body">' +
    _buildFilterRow('f-ct') +
    '<div class="ct-chips" id="ct-chips">'+_ctChipsInner(orders)+'</div>' +
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap">' +
      '<div id="ct-count" class="tbl-count" style="margin:0">Showing all '+orders.length+' orders</div>' +
      riskSel +
    '</div>' +
    '<div class="call-table-wrap"><table class="call-table" id="ct-table"><thead><tr>' +
    _sortHeaders('ct-table') +

// ── ORDER LOOKUP — call list data first, AOR as fallback ─────────────────
function buildOrderLookup() {
  var map = {};
  (DATA.masterTracker||[]).concat(DATA.completedOrders||[]).concat(DATA.dayAfterOrders||[]).concat(DATA.deliveredOrders||[]).concat(DATA.orderIssues||[]).forEach(function(o) {
    if (o.dsi && !map[o.dsi]) map[o.dsi] = o;
  });
  (DATA.aorData||[]).forEach(function(r) {
    var d = r['sp.SPM Number']; if (!d || map[d]) return;
    map[d] = { dsi:d, rep:r['Rep']||'—', spe:r['Customer Name']||'', productType:r['Product Type (Broken out lvl 2)']||'', orderDate:r['sp.Order Date (copy)']||'', dtrStatus:r['DTR Status (enriched)']||'' };
  });
  return map;
}

// ── NO ANSWER ─────────────────────────────────────────────────────────────
function _daysSinceLastNote(dsi) {
  var notes = (DATA.notes||{})[dsi];
  if (!notes || !notes.length) return null;
  var latest = notes.reduce(function(max, n) {
    var t = n.ts ? new Date(n.ts).getTime() : 0;
    return t > max ? t : max;
  }, 0);
  if (!latest) return null;
  return Math.floor((Date.now() - latest) / 86400000);
}

function _lastCallCell(o) {
  var days = _daysSinceLastNote(o.dsi);
  var label, style;
  if (days === null) {
    label = 'Never';
    style = 'background:#2a2a2a;color:#888';
  } else if (days <= 2) {
    label = days === 0 ? 'Today' : days + 'd ago';
    style = 'background:#0d2e1a;color:#4ade80';
  } else if (days <= 7) {
    label = days + 'd ago';
    style = 'background:#2a1e00;color:#eab308';
  } else {
    label = days + 'd ago';
    style = 'background:#2a0a0a;color:#ef4444';
  }
  return '<td><span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:.75rem;font-weight:700;white-space:nowrap;'+style+'">'+label+'</span></td>';
}

function renderNoAnswerTable() {
  var ratings = DATA.ratings || {};
  var noAnswerDsis = Object.keys(ratings).filter(function(dsi) { return ratings[dsi]==='No Answer'; });
  if (!noAnswerDsis.length) return noData('No orders marked No Answer yet.');
  var lookup = buildOrderLookup();
  var cutoff = _cutoff29();
  var orders = noAnswerDsis.map(function(dsi) {
    var o = lookup[dsi];
    var base = o ? o : { dsi:dsi, rep:'—', spe:'', productType:'—', orderDate:'—', dtrStatus:'—' };
    base._daysSince = _daysSinceLastNote(dsi);
    return base;
  }).filter(function(o) { return (o.orderDate || '') >= cutoff; });
  // Sort: never-called first, then oldest call first
  orders.sort(function(a, b) {
    var da = a._daysSince === null ? 9999 : a._daysSince;
    var db = b._daysSince === null ? 9999 : b._daysSince;
    return db - da;
  });
  _tabOrders = orders.slice(); _sortTblId = 'na-table'; _sortState = { col: null, dir: 1 }; _activeFilters = { products: [], statuses: [], dateFrom: '', dateTo: '', lastCalled: '' }; _extraColFn = _lastCallCell;
  _ctShowRiskFlags = false; _ISSUE_DSI = null;
  if (_BOOKED_MAP === null) _loadBookedAppts();
  var headers = [['rep','Name'],['dsi','DSI'],['date','Date'],['product','Product']].map(function(c) {
    return '<th class="sort-th" data-col="'+c[0]+'" onclick="sortCallTable(\''+c[0]+'\')">'+c[1]+'</th>';
  }).join('') + '<th class="sort-th" data-col="lastcalled" onclick="sortCallTable(\'lastcalled\')">Last Called</th><th class="sort-th" data-col="status" onclick="sortCallTable(\'status\')">Status</th><th>Rating</th><th>Notes</th>';
  var lcFilter = '<select id="lc-filter" onchange="_activeFilters.lastCalled=this.value;_applyView()" style="height:32px;padding:0 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.82rem;cursor:pointer">' +
    '<option value="">All Days</option>' +
    '<option value="recent">&#x1F7E2; Recent (0–2d)</option>' +
    '<option value="mid">&#x1F7E1; Due (3–7d)</option>' +
    '<option value="overdue">&#x1F534; Overdue (8+d)</option>' +
    '<option value="never">&#x26AA; Never Called</option>' +
    '</select>';
  return '<div class="card"><div class="card-header dark">No Answer &nbsp;<span style="font-weight:400;font-size:.82rem;opacity:.8">'+orders.length+' orders</span></div><div class="card-body">' +
    _buildFilterRow('f-na') +

    '<div class="call-table-wrap"><table class="call-table" id="na-table"><thead><tr>' +
    headers +
    '</tr></thead><tbody>'+callTableRows(orders, _lastCallCell)+'</tbody></table></div></div></div>';

// ── CHURN ─────────────────────────────────────────────────────────────────
var CHURN_BUCKETS = ['0-30 Day', '30 Day', '60 Day', '90 Day', '120 Day'];

function _churnCls(color) {
  var c = String(color||'').toLowerCase();
  return c==='green'?'ar-green':c==='yellow'?'ar-yellow':c==='red'?'ar-red':'';
}

function _buildChurnRepMap(rows, repFilter) {
  var repMap = {}, repList = [];
  (rows||[]).forEach(function(r) {
    if (!r.rep || CHURN_BUCKETS.indexOf(r.bucket) === -1) return;
    if (repFilter && r.rep !== repFilter) return;
    if (!repMap[r.rep]) { repMap[r.rep] = {}; repList.push(r.rep); }
    repMap[r.rep][r.bucket] = r;
  });
  repList.sort();
  return { repMap: repMap, repList: repList };
}

function _churnTableHtml(repList, repMap, gtRepList, gtRepMap) {
  // gtRepList/gtRepMap: full office data for grand total (falls back to repList/repMap)
  var _gtList = gtRepList || repList;
  var _gtMap  = gtRepMap  || repMap;
  function fmtN(n) { return Number(n).toLocaleString(); }
  function fmtRate(r) {
    var s = String(r == null ? '' : r).trim();
    if (s.indexOf('%') !== -1) return s;
    var n = parseFloat(s);
    if (isNaN(n)) return '0.0%';
    return (n <= 1 ? n * 100 : n).toFixed(1) + '%';
  }
  function cell(d) {
    if (!d) return '<td class="ar-cell"></td>';
    return '<td class="ar-cell"><span class="ar-badge '+_churnCls(d.color)+'">('+fmtN(d.disconnects)+'/'+fmtN(d.activated)+')<br>'+fmtRate(d.churnRate)+'</span></td>';
  }
  function totalCell(bkt) {
    var acts=0, disco=0;
    _gtList.forEach(function(rep){ var d=_gtMap[rep][bkt]; if(d){acts+=d.activated;disco+=d.disconnects;} });
    if (!acts) return '<td class="ar-cell"></td>';
    var pct = disco/acts*100;
    var pctR = Math.round(pct*10)/10;
    var cls;
    if      (bkt==='0-30 Day') cls = pctR<=2.4 ?'ar-green':pctR<=3.0 ?'ar-yellow':'ar-red';
    else if (bkt==='30 Day')   cls = pctR<=4.9 ?'ar-green':pctR<=6.9 ?'ar-yellow':'ar-red';
    else if (bkt==='60 Day')   cls = pctR<=8.9 ?'ar-green':pctR<=9.9 ?'ar-yellow':'ar-red';
    else if (bkt==='90 Day')   cls = pctR<=10.9?'ar-green':pctR<=13.9?'ar-yellow':'ar-red';
    else if (bkt==='120 Day')  cls = pctR<=13.9?'ar-green':pctR<=17.9?'ar-yellow':'ar-red';
    else                       cls = 'ar-blue';
    return '<td class="ar-cell"><span class="ar-badge '+cls+'">('+fmtN(disco)+'/'+fmtN(acts)+')<br>'+pct.toFixed(1)+'%</span></td>';
  }
  var hdr = '<th style="min-width:160px">Rep</th>' +
    CHURN_BUCKETS.map(function(b){return '<th style="min-width:110px">'+esc(b)+'</th>';}).join('');
  var grandRow = '<tr class="ar-grand-row"><td class="ar-rep ar-grand-rep">Grand Total</td>'+CHURN_BUCKETS.map(totalCell).join('')+'</tr>';
  var repRows = repList.map(function(rep){
    return '<tr><td class="ar-rep">'+esc(rep)+'</td>'+CHURN_BUCKETS.map(function(bkt){return cell(repMap[rep][bkt]);}).join('')+'</tr>';
  }).join('');
  return '<div class="tbl-wrap"><table><thead><tr>'+hdr+'</tr></thead><tbody>'+grandRow+repRows+'</tbody></table></div>';
}

function renderChurn() {
  var rows = DATA.churnReport || [];
  if (!rows.length) return noData('No churn data yet. Tableau sync runs nightly.');
  var role = SESSION.role || 'client-rep';
  var isTeamRole = role === 'leader' || role === 'jd';
  if (isTeamRole) {
    var churnTeam = _myTeam();
    if (churnTeam) {
      var churnTns = _teamTableauNames(churnTeam.name);
      var teamRows = rows.filter(function(r) { return churnTns.indexOf((r.rep || '').trim().toLowerCase()) !== -1; });
      var built = _buildChurnRepMap(teamRows, '');
      return '<div class="card"><div class="card-header dark">Churn Report — ICD</div><div class="card-body">' +
        '<div id="churn-table-wrap">'+_churnTableHtml(built.repList, built.repMap)+'</div>' +
        '</div></div>';
    }
    // No team found — show own row with office grand total
    var myNameC = (SESSION.tableauName || '').trim();
    var myBuiltC = _buildChurnRepMap(rows, myNameC);
    var allBuiltC = _buildChurnRepMap(rows, '');
    return '<div class="card"><div class="card-header dark">Churn Report — ICD</div><div class="card-body">' +
      '<div id="churn-table-wrap">'+_churnTableHtml(myBuiltC.repList, myBuiltC.repMap, allBuiltC.repList, allBuiltC.repMap)+'</div>' +
      '</div></div>';
  }
  if (role === 'client-rep') {
    var myName = (SESSION.tableauName || '').trim();
    var myBuilt  = _buildChurnRepMap(rows, myName);
    var allBuilt = _buildChurnRepMap(rows, '');
    return '<div class="card"><div class="card-header dark">Churn Report — ICD</div><div class="card-body">' +
      '<div id="churn-table-wrap">'+_churnTableHtml(myBuilt.repList, myBuilt.repMap, allBuilt.repList, allBuilt.repMap)+'</div>' +
      '</div></div>';
  }
  var allReps = [];
  var seen = {};
  (rows).forEach(function(r){ if(r.rep&&!seen[r.rep]){seen[r.rep]=true;allReps.push(r.rep);} });
  allReps.sort();
  var repSel = '<select class="ar-select" id="churn-rep-sel" onchange="refreshChurn()">' +
    '<option value="">All Reps</option>' +
    allReps.map(function(n){return '<option value="'+esc(n)+'">'+esc(n)+'</option>';}).join('') + '</select>';
  var built = _buildChurnRepMap(rows, '');
  return '<div class="card"><div class="card-header dark">Churn Report — ICD</div><div class="card-body">' +
    '<div class="filter-row">'+repSel+'</div>' +
    '<div id="churn-table-wrap">'+_churnTableHtml(built.repList, built.repMap)+'</div>' +
    '</div></div>';
}

function refreshChurn() {
  var sel = document.getElementById('churn-rep-sel');
  var filter = sel ? sel.value : '';
  var built = _buildChurnRepMap(DATA.churnReport||[], filter);
  var wrap = document.getElementById('churn-table-wrap');
  if (wrap) wrap.innerHTML = _churnTableHtml(built.repList, built.repMap);

}

  dates.forEach(function(dt){opts.push('<option value="'+esc(dt)+'"'+(dt===selDate?' selected':'')+'>'+esc(dt)+'</option>');});

function _drFmtTs(iso) {

// ── ACTIVATION RATES ──────────────────────────────────────────────────────
var _DR_AR_BUCKETS = ['0-7 Days','8-14 Days','15-30 Days','31-60 Days'];
function _drArCls(vol,acts,bkt) {
  if (!vol) return '';
  var p=acts/vol*100;
  if (bkt==='0-7 Days')   return p>=21?'ar-green':p>=10?'ar-yellow':'ar-red';
  if (bkt==='8-14 Days')  return p>=71?'ar-green':p>=51?'ar-yellow':'ar-red';
  if (bkt==='15-30 Days') return p>=75?'ar-green':p>=70?'ar-yellow':'ar-red';
  if (bkt==='31-60 Days') return p>=86?'ar-green':p>=79?'ar-yellow':'ar-red';
  return '';
}
function _drArCell(bktData,bkt) {
  if (!bktData||!bktData.vol) return '<td class="ar-cell"></td>';
  var vol=bktData.vol,acts=bktData.acts||0,p=Math.round(acts/vol*100);
  return '<td class="ar-cell"><span class="ar-badge '+_drArCls(vol,acts,bkt)+'">('+acts+'/'+vol+')<br>'+p+'%</span></td>';
}
function _drSectionActivation(arSummary) {
  var officeTotal=arSummary.officeTotal||{},repImpact=arSummary.repImpact||[];
  if (!Object.keys(officeTotal).length&&!repImpact.length) return '';
  var hdr='<th>Rep</th>'+
    _DR_AR_BUCKETS.map(function(b){return '<th style="min-width:100px">'+esc(b)+'</th>';}).join('');
  var totRow='<tr class="ar-grand-row"><td class="ar-rep ar-grand-rep">Grand Total</td>'+
    _DR_AR_BUCKETS.map(function(b){return _drArCell(officeTotal[b],b);}).join('')+'</tr>';
  var repRows=repImpact.map(function(r){
    return '<tr><td class="ar-rep">'+esc(r.rep)+'</td>'+
      _DR_AR_BUCKETS.map(function(b){return _drArCell(r.buckets[b],b);}).join('')+'</tr>';
  }).join('');
  return '<div class="dr-section"><div class="dr-sec-hdr">Activation Rates '+
    '<span class="dr-subhdr">office summary + bottom 5 reps</span></div>'+
    '<div class="tbl-wrap"><table class="call-table"><thead><tr>'+hdr+
    '</tr></thead><tbody>'+totRow+repRows+'</tbody></table></div></div>';
}

// ── CHURN RATES ───────────────────────────────────────────────────────────
var _DR_CHURN_BUCKETS = ['0-30 Day','30 Day','60 Day','90 Day','120 Day'];
var _DR_CHURN_THRESH  = {'0-30 Day':[2.4,3.0],'30 Day':[4.9,6.9],'60 Day':[8.9,9.9],'90 Day':[10.9,13.9],'120 Day':[13.9,17.9]};
function _drChurnCls(color) {
  var c=String(color||'').toLowerCase();
  if (c.indexOf('green')!==-1) return 'ar-green';
  if (c.indexOf('red')!==-1||c.indexOf('orange')!==-1) return 'ar-red';
  if (c.indexOf('yellow')!==-1||c.indexOf('blue')!==-1) return 'ar-yellow';
  return '';
}
function _drChurnTotalCls(bkt,pct) {
  var t=_DR_CHURN_THRESH[bkt]; if (!t) return '';
  return pct<=t[0]?'ar-green':pct<=t[1]?'ar-yellow':'ar-red';
}
function _drChurnCell(bktData,bkt,isTotal) {
  if (!bktData||!bktData.acts) return '<td class="ar-cell"></td>';
  var disco=bktData.disco||0,acts=bktData.acts,pct=disco/acts*100;
  var cls=isTotal?_drChurnTotalCls(bkt,pct):_drChurnCls(bktData.color||'');
  return '<td class="ar-cell"><span class="ar-badge '+cls+'">('+disco+'/'+acts+')<br>'+pct.toFixed(1)+'%</span></td>';
}
function _drSectionChurn(churnSummary) {
  var officeTotal=churnSummary.officeTotal||{},repImpact=churnSummary.repImpact||[];
  if (!Object.keys(officeTotal).length&&!repImpact.length) return '';
  var hdr='<th>Rep</th>'+
    _DR_CHURN_BUCKETS.map(function(b){return '<th style="min-width:90px">'+esc(b)+'</th>';}).join('');
  var totRow='<tr class="ar-grand-row"><td class="ar-rep ar-grand-rep">Grand Total</td>'+
    _DR_CHURN_BUCKETS.map(function(b){return _drChurnCell(officeTotal[b],b,true);}).join('')+'</tr>';
  var repRows=repImpact.map(function(r){
    return '<tr><td class="ar-rep">'+esc(r.rep)+'</td>'+
      _DR_CHURN_BUCKETS.map(function(b){return _drChurnCell(r.buckets[b],b,false);}).join('')+'</tr>';
  }).join('');
  return '<div class="dr-section"><div class="dr-sec-hdr">Churn Rates '+
    '<span class="dr-subhdr">office summary + top 5 reps by 0-30 Day disconnects</span></div>'+
    '<div class="tbl-wrap"><table class="call-table"><thead><tr>'+hdr+
    '</tr></thead><tbody>'+totRow+repRows+'</tbody></table></div></div>';
}

// ── EMAIL COPY ───────────────────────────────────────────────────────────
function drCopyEmail() {
  if (!_DR_DATA) { _drToast('Generate a report first.'); return; }
  var html = _drBuildEmailHtml();
  if (typeof ClipboardItem !== 'undefined' && navigator.clipboard && navigator.clipboard.write) {
    navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'})})]).then(function(){
      _drToast('Copied! Paste into your email.');
    }).catch(function(){ _drFallbackCopy(html); });
  } else { _drFallbackCopy(html); }
}
function _drFallbackCopy(html) {
  var el=document.createElement('div');
  el.innerHTML=html;
  el.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:.01;';
  document.body.appendChild(el);
  var r=document.createRange(); r.selectNodeContents(el);
  var s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
  try { document.execCommand('copy'); _drToast('Copied! Paste into your email.'); }
  catch(e) { _drToast('Copy failed — try Chrome or Edge.'); }
  s.removeAllRanges(); document.body.removeChild(el);
}
function _drToast(msg) {
  var t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f8fafc;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.4);pointer-events:none';
  document.body.appendChild(t);
  setTimeout(function(){if(document.body.contains(t))document.body.removeChild(t);},3000);
}

function _drBuildEmailHtml() {
  var rpt=_DR_DATA; if (!rpt) return '';
  var selDate=_DR_SEL_DATE||_drTodayStr();
  var d=new Date(selDate+'T12:00:00');
  var DN=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dayLabel=DN[d.getDay()]+', '+MN[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();

  var TBL='border-collapse:collapse;width:100%;font-size:12px;margin:0';
  var TH='border:1px solid #cbd5e1;padding:5px 9px;background:#f1f5f9;color:#0f172a;font-weight:700;text-align:left;white-space:nowrap';
  var TD='border:1px solid #cbd5e1;padding:5px 9px;color:#111;vertical-align:top';
  var TDG='border:1px solid #cbd5e1;padding:5px 9px;background:#f8fafc;font-weight:700;color:#111;vertical-align:top';
  var SEC='background:#1e3a5f;color:#fff;font-size:13px;font-weight:700;padding:7px 10px;margin:0';
  var BADGE='padding:2px 8px;border-radius:3px;font-weight:700;font-size:11px;white-space:nowrap;display:inline-block';
  var GRN=BADGE+';background:#166534;color:#bbf7d0';
  var YEL=BADGE+';background:#713f12;color:#fef9c3';
  var RED=BADGE+';background:#991b1b;color:#fecaca';

  var PILL_MAP={'sp-active':'background:#166534;color:#bbf7d0','sp-posted':'background:#14532d;color:#86efac','sp-canceled':'background:#991b1b;color:#fecaca','sp-disconnected':'background:#7f1d1d;color:#fecaca','sp-orange-bright':'background:#9a3412;color:#fed7aa','sp-orange':'background:#7c2d12;color:#fde68a','sp-dark-orange':'background:#6b2109;color:#fdba74','sp-purple':'background:#581c87;color:#e9d5ff','sp-yellow-bright':'background:#854d0e;color:#fef08a','sp-yellow':'background:#713f12;color:#fef9c3','sp-pale-yellow':'background:#a16207;color:#fef9c3','':'background:#e2e8f0;color:#111'};
  function ePill(text,cls){return '<span style="display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;font-weight:600;'+(PILL_MAP[cls]||PILL_MAP[''])+'">'+esc(text)+'</span>';}
  function eHdr(t){return '<div style="'+SEC+'">'+t+'</div>';}
  function eTbl(thead,tbody){return '<table style="'+TBL+'"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>';}

  function eArCls(vol,acts,bkt){
    if (!vol) return BADGE+';background:#e2e8f0;color:#334155';
    var p=acts/vol*100;
    if (bkt==='0-7 Days')   return p>=21?GRN:p>=10?YEL:RED;
    if (bkt==='8-14 Days')  return p>=71?GRN:p>=51?YEL:RED;
    if (bkt==='15-30 Days') return p>=75?GRN:p>=70?YEL:RED;
    if (bkt==='31-60 Days') return p>=86?GRN:p>=79?YEL:RED;
    return BADGE+';background:#e2e8f0;color:#334155';
  }
  function eArCell(bd,bkt){
    if (!bd||!bd.vol) return '<td style="'+TD+'"></td>';
    var p=Math.round(bd.acts/bd.vol*100);
    return '<td style="'+TD+'"><span style="'+eArCls(bd.vol,bd.acts,bkt)+'">('+bd.acts+'/'+bd.vol+')<br>'+p+'%</span></td>';
  }
  function eCrTotCls(bkt,pct){
    var t={'0-30 Day':[2.4,3.0],'30 Day':[4.9,6.9],'60 Day':[8.9,9.9],'90 Day':[10.9,13.9],'120 Day':[13.9,17.9]};
    var th=t[bkt]; if (!th) return BADGE+';background:#e2e8f0;color:#334155';
    return pct<=th[0]?GRN:pct<=th[1]?YEL:RED;
  }
  function eCrRepCls(color){
    var c=String(color||'').toLowerCase();
    if (c.indexOf('green')!==-1) return GRN;
    if (c.indexOf('red')!==-1||c.indexOf('orange')!==-1) return RED;
    if (c.indexOf('yellow')!==-1||c.indexOf('blue')!==-1) return YEL;
    return BADGE+';background:#e2e8f0;color:#334155';
  }
  function eCrCell(bd,bkt,isT){
    if (!bd||!bd.acts) return '<td style="'+TD+'"></td>';

    return '<td style="'+TD+'"><span style="'+(isT?eCrTotCls(bkt,pct):eCrRepCls(bd.color||''))+'">('+disco+'/'+bd.acts+')<br>'+pct.toFixed(1)+'%</span></td>';
  }

  // Stat bar
  var cats=rpt.callCategories||{};
  var daT=cats.dayAfterTotal||0,daW=cats.dayAfterWorked||0;
  var cov=daT>0?Math.round(daW/daT*100)+'%':'—';
  function sPill(label,val,bg){return '<span style="background:'+(bg||'#1e3a5f')+';color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:600;display:inline-block;margin:2px">'+val+' <span style="font-weight:400;font-size:11px">'+label+'</span></span>';}
  var statBar=sPill('Day-After covered',daW+'/'+daT+' ('+cov+')')+sPill('Delivered worked',cats.deliveredWorked||0)+sPill('Issues worked',cats.issuesWorked||0)+sPill('No Answers',cats.noAnswerTotal||0,'#991b1b')+sPill('Escalations',cats.escalationTotal||0,'#991b1b');

  var HOUSING_HDR={'green':'background:#f0fdf4;border:1px solid #86efac;color:#166534','orange':'background:#fff7ed;border:1px solid #fdba74;color:#9a3412','purple':'background:#faf5ff;border:1px solid #d8b4fe;color:#581c87','yellow':'background:#fefce8;border:1px solid #fde68a;color:#713f12'};
  function eSubCards(sub){
    return (sub||[]).map(function(s){
      var cls=_DR_ST_CLS[s.status]||'';

        '<table style="width:100%;border-collapse:collapse;margin-top:4px"><tr>'+
          '<td style="text-align:center;padding:2px 3px;border:none"><div style="font-size:16px;font-weight:700;color:#0f172a;line-height:1">'+s.customers+'</div><div style="font-size:9px;color:#64748b;text-transform:uppercase">Customers</div></td>'+
          '<td style="width:1px;background:#e2e8f0;padding:0;border:none"></td>'+
          '<td style="text-align:center;padding:2px 3px;border:none"><div style="font-size:16px;font-weight:700;color:#0f172a;line-height:1">'+s.lines+'</div><div style="font-size:9px;color:#64748b;text-transform:uppercase">Lines</div></td>'+
        '</tr></table></div>';
    }).join('');

  function eHousingCell(label,colorKey,data){
    if (!data||(!data.customers&&!data.lines)) return '';
    var hdrStyle=HOUSING_HDR[colorKey]||HOUSING_HDR['green'];
    return '<details style="margin-bottom:8px;border-radius:8px;overflow:hidden">'+
      '<summary style="'+hdrStyle+';padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;list-style:none;display:block">'+
        esc(label)+
        ' &nbsp;<span style="font-size:11px;font-weight:400">'+data.customers+' customers &nbsp;·&nbsp; '+data.lines+' lines</span>'+
        '&nbsp;&nbsp;<span style="font-size:11px;opacity:.7">▾</span>'+

      '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;padding:6px">'+eSubCards(data.sub)+'</div>'+

  }
  var sbRaw=rpt.statusBreakdown||{};
  var sbTotal=Array.isArray(sbRaw)

  var sbContent='';
  if (Array.isArray(sbRaw)) {
    sbContent=sbRaw.filter(function(r){return r.status!=='TOTAL';}).map(function(r){
      var cls=_DR_ST_CLS[r.status]||'';

        '<table style="width:100%;border-collapse:collapse;margin-top:4px"><tr>'+
          '<td style="text-align:center;padding:2px 3px;border:none"><div style="font-size:16px;font-weight:700;color:#0f172a;line-height:1">'+r.customerRows+'</div><div style="font-size:9px;color:#64748b;text-transform:uppercase">Customers</div></td>'+
          '<td style="width:1px;background:#e2e8f0;padding:0;border:none"></td>'+
          '<td style="text-align:center;padding:2px 3px;border:none"><div style="font-size:16px;font-weight:700;color:#0f172a;line-height:1">'+r.totalLines+'</div><div style="font-size:9px;color:#64748b;text-transform:uppercase">Lines</div></td>'+
        '</tr></table></div>';
    }).join('');
  } else {
    sbContent=eHousingCell('Completed Orders','green', sbRaw.completedOrders)+
              eHousingCell('Order Issues',    'orange',sbRaw.orderIssues)+
              eHousingCell('All Pending Lines','purple',sbRaw.allPendingLines)+
              eHousingCell('Fiber',           'yellow',sbRaw.fiber);
  }
  var sbTotalBar='<table style="width:100%;border-collapse:collapse;background:#f0f9ff;border:1px solid #bae6fd;border-radius:7px;margin-top:4px"><tr>'+
    '<td style="padding:9px 14px;border:none;font-size:12px;font-weight:700;color:#0369a1;text-transform:uppercase;letter-spacing:.06em">Total</td>'+
    '<td style="padding:9px 14px;border:none;text-align:right">'+
      '<span style="font-size:16px;font-weight:700;color:#0f172a">'+sbTotCust+'</span> <span style="font-size:11px;color:#64748b">customers</span>&nbsp;&nbsp;'+
      '<span style="font-size:16px;font-weight:700;color:#0f172a">'+sbTotLines+'</span> <span style="font-size:11px;color:#64748b">lines</span>'+
    '</td></tr></table>';
  var statusSec=eHdr('Order Status Breakdown')+'<div style="padding:6px 0">'+sbContent+'</div>'+sbTotalBar;

  // Activation rates
  var arSum=rpt.activationSummary||{},offAr=arSum.officeTotal||{},repAr=arSum.repImpact||[];
  var arHdr='<tr><th style="'+TH+'">Rep</th>'+_DR_AR_BUCKETS.map(function(b){return '<th style="'+TH+'">'+b+'</th>';}).join('')+'</tr>';
  var arTot='<tr><td style="'+TDG+'">Grand Total</td>'+_DR_AR_BUCKETS.map(function(b){return eArCell(offAr[b],b);}).join('')+'</tr>';
  var arReps=repAr.map(function(r){return '<tr><td style="'+TD+'">'+esc(r.rep)+'</td>'+_DR_AR_BUCKETS.map(function(b){return eArCell(r.buckets[b],b);}).join('')+'</tr>';}).join('');
  var arSec=eHdr('Activation Rates — office summary + bottom 5 reps')+eTbl(arHdr,arTot+arReps);

  // Churn rates
  var crSum=rpt.churnSummary||{},offCr=crSum.officeTotal||{},repCr=crSum.repImpact||[];
  var CR_BKTS=['0-30 Day','30 Day','60 Day','90 Day','120 Day'];
  var crHdr='<tr><th style="'+TH+'">Rep</th>'+CR_BKTS.map(function(b){return '<th style="'+TH+'">'+b+'</th>';}).join('')+'</tr>';
  var crTot='<tr><td style="'+TDG+'">Grand Total</td>'+CR_BKTS.map(function(b){return eCrCell(offCr[b],b,true);}).join('')+'</tr>';
  var crReps=repCr.map(function(r){return '<tr><td style="'+TD+'">'+esc(r.rep)+'</td>'+CR_BKTS.map(function(b){return eCrCell(r.buckets[b],b,false);}).join('')+'</tr>';}).join('');
  var crSec=eHdr('Churn Rates — office summary + top 5 reps by 0-30 Day disconnects')+eTbl(crHdr,crTot+crReps);

  // Calls worked
  function eCwGroup(entries,label){
    if (!entries||!entries.length) return '';
    var rows=entries.map(function(e){
      var prods=Object.keys(e.productCounts||{}).map(function(p){return '<span style="background:#e2e8f0;padding:1px 5px;border-radius:3px;font-size:10px;margin:1px;display:inline-block">'+esc(p)+' ×'+e.productCounts[p]+'</span>';}).join('');
      var stats=Object.keys(e.statusCounts||{}).map(function(s){return ePill(s+' ×'+e.statusCounts[s],_DR_ST_CLS[s]||'');}).join(' ');
      var notes=(e.notes||[]).length?e.notes.map(function(n){return '<div style="margin:1px 0;font-size:11px"><b>'+esc(n.authorName||'?')+'</b>: '+esc(n.noteText)+'</div>';}).join(''):'<span style="color:#94a3b8;font-size:11px">No notes</span>';
      return '<tr><td style="'+TD+';white-space:nowrap">'+esc(e.rep||'—')+'</td><td style="'+TD+';white-space:nowrap">'+esc(e.dsi)+'</td><td style="'+TD+';white-space:nowrap">'+esc(_drFmtDate(e.orderDate))+'</td><td style="'+TD+'">'+prods+'</td><td style="'+TD+'">'+stats+'</td><td style="'+TD+'">'+notes+'</td></tr>';
    }).join('');
    return '<div style="margin-bottom:6px"><div style="background:#334155;color:#f1f5f9;font-size:12px;font-weight:700;padding:4px 9px">'+esc(label)+' ('+entries.length+')</div>'+eTbl('<tr><th style="'+TH+'">Rep</th><th style="'+TH+'">DSI</th><th style="'+TH+'">Order Date</th><th style="'+TH+'">Products</th><th style="'+TH+'">Status</th><th style="'+TH+'">Notes</th></tr>',rows)+'</div>';
  }
  var cw=rpt.callsWorked||{};
  var cwTotal=(cw.dayafter||[]).length+(cw.delivered||[]).length+(cw.issues||[]).length+(cw.other||[]).length;
  var cwSec=cwTotal?eHdr('Calls Worked That Day ('+cwTotal+' orders)')+eCwGroup(cw.dayafter,'Day-After')+eCwGroup(cw.delivered,'Delivered Not Active')+eCwGroup(cw.issues,'Order Issues')+eCwGroup(cw.other,'Other'):'';

  // No answers
  var naList=rpt.noAnswers||[];
  var naSec='';
  if (naList.length) {
    var naRows=naList.map(function(e){
      var notes=(e.notes||[]).length?e.notes.map(function(n){return '<div style="font-size:11px"><b>'+esc(n.authorName||'?')+'</b>: '+esc(n.noteText)+'</div>';}).join(''):'<span style="color:#94a3b8;font-size:11px">No notes</span>';
      return '<tr><td style="'+TD+';white-space:nowrap">'+esc(e.dsi)+'</td><td style="'+TD+'">'+notes+'</td></tr>';
    }).join('');
    naSec=eHdr('No Answers That Day ('+naList.length+')')+eTbl('<tr><th style="'+TH+'">DSI</th><th style="'+TH+'">Notes</th></tr>',naRows);
  }

  // Escalations
  var escList=rpt.escalations||[];
  var escSec='';
  if (escList.length) {
    var escRows=escList.map(function(e){
      var rbg=e.rating==='1 Star'?'#991b1b':'#7f1d1d';
      var notes=(e.notes||[]).length?e.notes.map(function(n){return '<div style="font-size:11px"><b>'+esc(n.authorName||'?')+'</b>: '+esc(n.noteText)+'</div>';}).join(''):'<span style="color:#94a3b8;font-size:11px">No notes</span>';
      return '<tr><td style="'+TD+';white-space:nowrap"><span style="background:'+rbg+';color:#fecaca;padding:1px 7px;border-radius:3px;font-size:11px;font-weight:700">'+esc(e.rating)+'</span></td><td style="'+TD+';white-space:nowrap">'+esc(e.dsi)+'</td><td style="'+TD+'">'+notes+'</td></tr>';
    }).join('');
    escSec=eHdr('Escalations That Day ('+escList.length+')')+eTbl('<tr><th style="'+TH+'">Rating</th><th style="'+TH+'">DSI</th><th style="'+TH+'">Notes</th></tr>',escRows);
  }

  return '<div style="font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#111;background:#fff;max-width:960px;padding:16px">'+
    '<h2 style="margin:0 0 2px;font-size:16px;color:#0f172a">Daily Call Report — '+esc(dayLabel)+'</h2>'+
    '<p style="margin:0 0 10px;color:#64748b;font-size:11px">Generated: '+_drFmtTs(rpt.generatedAt)+'</p>'+
    '<div style="margin-bottom:10px">'+statBar+'</div>'+
    '<div style="margin-top:10px">'+statusSec+'</div>'+
    '<div style="margin-top:10px">'+arSec+'</div>'+
    '<div style="margin-top:10px">'+crSec+'</div>'+
    (cwSec?'<div style="margin-top:10px">'+cwSec+'</div>':'')+
    (naSec?'<div style="margin-top:10px">'+naSec+'</div>':'')+
    (escSec?'<div style="margin-top:10px">'+escSec+'</div>':'')+
    '</div>';
}

var PORTAL_ROLES = ['master-admin','owner','admin','activator','client-rep','leader','jd','manager'];
var _ROLE_LABELS = {
  'master-admin':'Master Admin','owner':'Owner','admin':'Admin',
  'activator':'Activator','client-rep':'Client Rep','leader':'Team Leader',
  'jd':'JD','manager':'Manager'
};

function renderPeople() {
  var roster = DATA.roster || {};
  var guestRoster = DATA.guestRoster || {};
  var role = SESSION.role;
  var isAdmin   = role === 'master-admin' || role === 'owner' || role === 'admin' || role === 'manager';
  var isMgr     = role === 'jd';
  var myEmail   = (SESSION.email || '').toLowerCase();
  var homeRows = Object.keys(roster).map(function(email) {
    return Object.assign({ email: email, isGuest: false }, roster[email]);
  });
  var guestRows = Object.keys(guestRoster).filter(function(email) { return !roster[email]; }).map(function(email) {
    return Object.assign({ email: email, isGuest: true }, guestRoster[email]);
  });
  var rows = homeRows.concat(guestRows).sort(function(a,b) { return (a.name||'').localeCompare(b.name||''); });
  if (!rows.length) return noData('No people in the roster yet.');
  var addBtn = isAdmin ? '<button class="refresh-btn" style="margin-bottom:14px" onclick="openAddPersonModal()">+ Add Person</button>' : '';
  return '<div class="card"><div class="card-header dark">People &amp; Roster</div><div class="card-body">' +
    addBtn +
    '<div class="filter-row"><input id="f-people" placeholder="Search name, email, role…"></div>' +
    '<div class="tbl-wrap"><table id="people-table"><thead><tr>' +
    '<th>Name</th><th>Email</th><th>Role</th><th>Team</th><th>Phone</th><th>Status</th><th>Tableau Name</th><th>Office Access</th><th>Actions</th>' +
    '</tr></thead><tbody>' +
    rows.map(function(row) {
      var statusBadge = row.deactivated ? '<span class="badge badge-red">Inactive</span>' : '<span class="badge badge-green">Active</span>';
      var perms = (row.permissions || CFG.officeId).split(',').map(function(p) { return OFFICE_NAMES[p.trim()] || p.trim(); }).join(', ');
      var nameCell = esc(row.name) + (row.isGuest ? ' <span style="font-size:.72rem;color:#888;font-weight:400">from ' + esc(OFFICE_NAMES[row.homeOffice]||row.homeOffice) + '</span>' : '');
      var isSelf = row.email.toLowerCase() === myEmail;
      var actions;
      if (row.isGuest) {
        actions = (isAdmin || isMgr) ? '<td style="color:#aaa;font-size:.78rem">Managed in ' + esc(OFFICE_NAMES[row.homeOffice]||row.homeOffice) + '</td>' : '<td></td>';
      } else if (isAdmin) {
        actions = '<td style="white-space:nowrap"><button class="notes-btn" onclick="openEditPersonModal(\''+esc(row.email)+'\')">Edit</button>' +
          (role==='master-admin' ? ' <button class="notes-btn" style="color:var(--red)" onclick="deletePerson(\''+esc(row.email)+'\')">Remove</button>' : '') + '</td>';
      } else if (isMgr) {
        actions = '<td><button class="notes-btn" onclick="openEditPersonModal(\''+esc(row.email)+'\')">Edit</button></td>';
      } else if (isSelf) {
        actions = '<td><button class="notes-btn" onclick="openEditPersonModal(\''+esc(row.email)+'\')">Edit Phone</button></td>';
      } else {
        actions = '<td></td>';
      }
      return '<tr'+(row.isGuest?' style="background:#fafafa;color:#555"':'')+'>'+
        '<td>'+nameCell+'</td><td>'+esc(row.email)+'</td><td>'+esc(_ROLE_LABELS[row.rank]||row.rank||'client-rep')+'</td><td>'+esc(row.team||'')+'</td><td>'+esc(row.phone||'—')+'</td><td>'+statusBadge+'</td><td>'+esc(row.tableauName||'—')+'</td><td>'+esc(perms)+'</td>'+actions+'</tr>';
    }).join('') + '</tbody></table></div></div></div>';
}

function buildPersonForm(email, person) {
  var p = person || {};
  var rank = p.rank || 'client-rep';
  var role = SESSION.role;
  var isSelf = email && email.toLowerCase() === (SESSION.email||'').toLowerCase();
  var editLevel;
  if (role === 'master-admin') editLevel = 'full';
  else if (role === 'owner')   editLevel = 'owner';
  else if (role === 'admin')   editLevel = 'admin';
  else if (role === 'jd') editLevel = 'limited';
  else if (role === 'manager') editLevel = 'admin';
  else editLevel = 'selfphone';
  var canRole   = editLevel === 'full' || editLevel === 'owner';
  var canPerms  = editLevel === 'full' || editLevel === 'owner';
  var canStatus = editLevel === 'full' || editLevel === 'owner' || editLevel === 'admin';
  var canBasic  = editLevel !== 'selfphone';
  var fs = 'width:100%;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px';
  var ds = ';background:#1e1e1e;color:#999';
  var perms = (p.permissions || CFG.officeId).split(',').map(function(o){ return o.trim(); });
  var roleOpts = PORTAL_ROLES
    .filter(function(ro) { return editLevel !== 'owner' || ro !== 'master-admin'; })
    .map(function(ro) { return '<option value="'+ro+'"'+(ro===rank?' selected':'')+'>'+esc(_ROLE_LABELS[ro]||ro)+'</option>'; }).join('');
  var tableauOpts = '<option value="">— Not Assigned —</option>' +
    (PEOPLE_TABLEAU_NAMES||[]).map(function(n){ return '<option value="'+esc(n)+'"'+(n===(p.tableauName||'')?' selected':'')+'>'+esc(n)+'</option>'; }).join('');
  var officeChecks = Object.keys(OFFICE_NAMES).map(function(o){
    return '<label style="display:flex;align-items:center;gap:6px;margin:4px 0;font-size:.85rem"><input type="checkbox" value="'+o+'"'+(perms.indexOf(o)!==-1?' checked':'')+(canPerms?'':' disabled')+'>'+OFFICE_NAMES[o]+'</label>';
  }).join('');
  var isEdit = !!email;
  var lock = function(ok) { return ok ? '' : '<span style="font-size:.72rem;color:#aaa;font-weight:400;margin-left:6px">Read only</span>'; };
  var html = '';
  html += '<div class="field"><label>Name</label><input type="text" id="pf-name" value="'+esc(p.name||'')+'"'+(canBasic?'':' readonly')+' style="'+fs+(canBasic?'':ds)+'"></div>';
  html += '<div class="field"><label>Email</label><input type="email" id="pf-email" value="'+esc(email||'')+'"'+(isEdit?' readonly style="'+fs+ds+'"':' style="'+fs+'"')+'></div>';
  html += '<div class="field"><label>Phone</label><input type="text" id="pf-phone" value="'+esc(p.phone||'')+'" placeholder="e.g. 555-867-5309" style="'+fs+'"></div>';
  html += '<div class="field"><label>Role'+lock(canRole)+'</label><select id="pf-role"'+(canRole?'':' disabled')+' style="'+fs+(canRole?'':ds)+'">'+ roleOpts+'</select></div>';
  html += '<div class="field"><label>Team</label><input type="text" id="pf-team" value="'+esc(p.team||'')+'"'+(canBasic?'':' readonly')+' style="'+fs+(canBasic?'':ds)+'"></div>';
  html += '<div class="field"><label>Tableau Name'+lock(canBasic)+'</label><select id="pf-tableau"'+(canBasic?'':' disabled')+' style="'+fs+(canBasic?'':ds)+'">'+tableauOpts+'</select></div>';
  html += '<div class="field"><label>Office Permissions'+lock(canPerms)+'</label><div id="pf-perms" style="padding:8px;border:1.5px solid #3a3a3a;border-radius:6px'+(canPerms?'':';background:#1e1e1e')+'">'+ officeChecks+'</div></div>';
  html += '<div class="field"><label>Status'+lock(canStatus)+'</label><select id="pf-status"'+(canStatus?'':' disabled')+' style="'+fs+(canStatus?'':ds)+'"><option value="false"'+(p.deactivated?'':' selected')+'>Active</option><option value="true"'+(p.deactivated?' selected':'')+'>Inactive</option></select></div>';
  html += '<div class="nm-actions"><button class="nm-add-btn" onclick="savePerson('+(isEdit?'\''+esc(email)+'\'':'null')+')">SAVE</button><button class="nm-close-btn" onclick="closeModal()">CANCEL</button></div>';
  return html;
}

function openAddPersonModal() {
  document.getElementById('modal-title').innerHTML = '<div class="nm-dsi">Add Person</div>';
  document.getElementById('modal-body').innerHTML = buildPersonForm(null, null);
  document.getElementById('detail-modal').classList.add('open');
}

function openEditPersonModal(email) {
  var person = (DATA.roster||{})[email]; if (!person) return;
  document.getElementById('modal-title').innerHTML = '<div class="nm-dsi">Edit Person</div><div class="nm-sub">'+esc(email)+'</div>';
  document.getElementById('modal-body').innerHTML = buildPersonForm(email, person);
  document.getElementById('detail-modal').classList.add('open');
}

function savePerson(existingEmail) {
  var emailVal  = document.getElementById('pf-email').value.trim().toLowerCase();
  var phone     = document.getElementById('pf-phone').value.trim();
  var role      = SESSION.role;
  var editLevel;
  if (role === 'master-admin') editLevel = 'full';
  else if (role === 'owner')   editLevel = 'owner';
  else if (role === 'admin')   editLevel = 'admin';
  else if (role === 'jd') editLevel = 'limited';
  else if (role === 'manager') editLevel = 'admin';
  else editLevel = 'selfphone';
  var canRole   = editLevel === 'full' || editLevel === 'owner';
  var canPerms  = editLevel === 'full' || editLevel === 'owner';
  var canStatus = editLevel === 'full' || editLevel === 'owner' || editLevel === 'admin';
  var canBasic  = editLevel !== 'selfphone';
  var existing  = existingEmail ? ((DATA.roster||{})[existingEmail] || {}) : {};
  var name        = canBasic  ? document.getElementById('pf-name').value.trim()    : (existing.name || '');
  var team        = canBasic  ? document.getElementById('pf-team').value.trim()    : (existing.team || '');
  var tableauName = canBasic  ? document.getElementById('pf-tableau').value        : (existing.tableauName || '');
  var deactivated = canStatus ? document.getElementById('pf-status').value==='true': (existing.deactivated || false);
  var rank        = canRole   ? document.getElementById('pf-role').value           : (existing.rank || 'client-rep');
  var checked     = canPerms  ? document.querySelectorAll('#pf-perms input[type=checkbox]:checked') : null;
  var permissions = canPerms
    ? (Array.from(checked).map(function(cb){ return cb.value; }).join(',') || CFG.officeId)
    : (existing.permissions || CFG.officeId);
  if (!emailVal) { alert('Email is required.'); return; }
  var body = { name:name, rank:rank, team:team, tableauName:tableauName, phone:phone, permissions:permissions, deactivated:deactivated };
  if (existingEmail) { body.action = 'updateRosterEntry'; body.email = existingEmail; }
  else               { body.action = 'addRosterEntry';    body.email = emailVal; }
  apiPost(body).then(function(res) {
    if (res.ok) { closeModal(); refreshData(); }
    else alert(res.error || 'Save failed.');
  }).catch(function(){ alert('Connection error.'); });
}

function deletePerson(email) {
  if (!confirm('Remove ' + email + ' from the roster? This cannot be undone.')) return;
  apiPost({ action:'deleteRosterEntry', email:email }).then(function(res) {
    if (res.ok) refreshData(); else alert(res.error||'Delete failed.');
  });
}

function noData(msg) {
  return '<div class="card"><div class="card-body"><div class="empty">'+esc(msg)+'</div></div></div>';
}
