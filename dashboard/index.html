<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activation Support</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1F4E78;--blue2:#2E75B6;--blue3:#D6E4F0;
  --green:#1E5631;--green2:#C6EFCE;
  --yellow:#7F6000;--yellow2:#FFF2CC;
  --red:#9C0006;--red2:#FCE4D6;
  --gray:#555;--gray2:#efefef;
  --sidebar:220px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f4f8;color:#1a1a2e;line-height:1.5;height:100vh;overflow:hidden}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--blue);display:flex;align-items:center;justify-content:center;z-index:100}
.login-card{background:#fff;border-radius:12px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.login-card h1{font-size:1.5rem;color:var(--blue);margin-bottom:4px}
.login-card p{font-size:.85rem;color:#666;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#555;margin-bottom:6px}
.field input{width:100%;padding:10px 12px;border:1.5px solid #d1d9e0;border-radius:6px;font-size:.95rem;outline:none;transition:border .15s}
.field input:focus{border-color:var(--blue2)}
.btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--blue2)}
.btn:disabled{opacity:.55;cursor:not-allowed}
#login-error{color:#c0392b;font-size:.82rem;margin-top:10px;display:none}

/* ── APP SHELL ── */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--blue);color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.12)}
.sidebar-office{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.55);margin-bottom:2px}
.sidebar-name{font-size:1rem;font-weight:700}
.sidebar-user{font-size:.75rem;color:rgba(255,255,255,.65);margin-top:2px}
nav{flex:1;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:.87rem;cursor:pointer;color:rgba(255,255,255,.75);border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#fff;font-weight:600}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.12)}
.sign-out{font-size:.78rem;color:rgba(255,255,255,.55);cursor:pointer;display:flex;align-items:center;gap:6px}
.sign-out:hover{color:#fff}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:#fff;padding:14px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:1.05rem;font-weight:700;color:var(--blue)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.refresh-btn{padding:6px 14px;background:var(--blue3);color:var(--blue);border:none;border-radius:6px;font-size:.82rem;font-weight:700;cursor:pointer;transition:background .15s}
.refresh-btn:hover{background:#b8d4f0}
.content{padding:20px 24px;flex:1}

/* ── CARDS ── */
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden}
.card-header{background:var(--blue2);color:#fff;padding:12px 16px;font-size:.88rem;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.card-header.dark{background:var(--blue)}
.card-body{padding:16px}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.stat{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center}
.stat-val{font-size:2rem;font-weight:700;color:var(--blue);line-height:1}
.stat-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-top:4px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;background:var(--blue3);color:var(--blue);font-weight:700;padding:9px 12px;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #eef2f7;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#f9fbfd}
tr:hover td{background:#f0f7ff}

/* ── BADGES ── */
.badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-blue{background:var(--blue3);color:var(--blue)}
.badge-green{background:var(--green2);color:var(--green)}
.badge-yellow{background:var(--yellow2);color:var(--yellow)}
.badge-red{background:var(--red2);color:var(--red)}
.badge-gray{background:var(--gray2);color:var(--gray)}

/* ── SEARCH/FILTER ── */
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-row input,.filter-row select{padding:7px 10px;border:1.5px solid #d1d9e0;border-radius:6px;font-size:.84rem;outline:none}
.filter-row input:focus,.filter-row select:focus{border-color:var(--blue2)}
.filter-row input{flex:1;min-width:180px}

/* ── LOADING / EMPTY ── */
.spinner{text-align:center;padding:48px;color:#aaa;font-size:.9rem}
.empty{text-align:center;padding:40px;color:#aaa;font-size:.88rem}

/* ── CALL TABLE ── */
.call-table-wrap{overflow-x:auto}
.call-table{width:100%;border-collapse:collapse;font-size:.875rem}
.call-table thead tr{border-bottom:2px solid #e2e8f0}
.call-table th{text-align:left;padding:10px 14px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#888;white-space:nowrap}
.call-table td{padding:12px 14px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
.call-table tbody tr:last-child td{border-bottom:none}
.call-table tbody tr:hover td{background:#f7fbff}
.rep-name{font-weight:600;color:#1a1a2e}
.dsi-link{color:var(--blue2);font-weight:600;cursor:pointer;text-decoration:none}
.dsi-link:hover{text-decoration:underline}
/* status pills */
.sp{display:inline-block;font-size:.75rem;font-weight:700;padding:2px 9px;border-radius:10px;white-space:nowrap;margin-right:3px}
.sp-active{background:#c6efce;color:#1e5631}
.sp-delivered{background:#d1ecf1;color:#0c5460}
.sp-shipped{background:#cce5ff;color:#004085}
.sp-open{background:#fff3cd;color:#856404}
.sp-pending{background:#fde2e2;color:#721c24}
.sp-canceled,.sp-disconnected{background:#efefef;color:#555}
.sp-default{background:#e9ecef;color:#495057}
/* issue badge */
.issue-tag{display:inline-block;font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:8px;background:#fff3cd;color:#856404;margin-right:4px}
.issue-tag.porting{background:#fde2e2;color:#9c0006}
.issue-tag.payment{background:#fff3cd;color:#856404}
.issue-tag.byod{background:#cce5ff;color:#004085}
/* rating pill on row */
.rating-pill{display:inline-block;font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:10px;white-space:nowrap}
.rp-na{background:#efefef;color:#555}
.rp-1{background:#f8d7da;color:#721c24}
.rp-2{background:var(--red2);color:var(--red)}
.rp-3{background:var(--yellow2);color:var(--yellow)}
.rp-4{background:#e2efda;color:#385723}
.rp-5{background:var(--green2);color:var(--green)}
/* NOTES button */
.notes-btn{padding:5px 14px;border:1.5px solid #d1d9e0;background:#fff;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;color:#555;transition:all .15s}
.notes-btn:hover{border-color:var(--blue2);color:var(--blue2)}
/* ── NOTES MODAL ── */
.nm-dsi{font-size:1.1rem;font-weight:700;color:var(--blue);margin-bottom:2px}
.nm-sub{font-size:.82rem;color:#888;margin-bottom:16px}
.nm-section-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#999;margin-bottom:8px}
.nm-history{min-height:60px;max-height:200px;overflow-y:auto;background:#f7f9fc;border-radius:6px;padding:10px 12px;margin-bottom:16px}
.nm-empty{font-size:.82rem;color:#aaa;font-style:italic}
.nm-note{padding:6px 0;border-bottom:1px solid #eef2f7;font-size:.83rem}
.nm-note:last-child{border-bottom:none}
.nm-note-meta{font-size:.72rem;color:#999;margin-bottom:2px}
.nm-note-text{color:#222}
.nm-rating-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.nm-r-btn{padding:5px 12px;border-radius:12px;border:1.5px solid #d1d9e0;background:#fff;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s}
.nm-r-btn:hover{border-color:var(--blue2)}
.nm-r-btn.active-na{background:#efefef;color:#555;border-color:#aaa}
.nm-r-btn.active-1{background:#f8d7da;color:#721c24;border-color:#f5c6cb}
.nm-r-btn.active-2{background:var(--red2);color:var(--red);border-color:#e9aeae}
.nm-r-btn.active-3{background:var(--yellow2);color:var(--yellow);border-color:#ffe08a}
.nm-r-btn.active-4{background:#e2efda;color:#385723;border-color:#b8d9a3}
.nm-r-btn.active-5{background:var(--green2);color:var(--green);border-color:#8fd49b}
.nm-textarea{width:100%;padding:9px 12px;border:1.5px solid #d1d9e0;border-radius:6px;font-size:.86rem;font-family:inherit;resize:vertical;min-height:80px;outline:none;margin-bottom:12px}
.nm-textarea:focus{border-color:var(--blue2)}
.nm-actions{display:flex;gap:8px}
.nm-add-btn{flex:1;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:.88rem;font-weight:700;cursor:pointer}
.nm-add-btn:hover{background:var(--blue2)}
.nm-close-btn{padding:10px 20px;border:1.5px solid #d1d9e0;background:#fff;border-radius:6px;font-size:.88rem;font-weight:600;cursor:pointer;color:#555}
.nm-close-btn:hover{border-color:#aaa}
.add-note-row input:focus{border-color:var(--blue2)}
.add-note-row button{padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap}
.add-note-row button:hover{background:var(--blue2)}
.issue-badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;background:#fff3cd;color:#856404;margin-left:6px}
/* ── PILLS for activation bucket ── */
.pill-0-7{background:#C6EFCE;color:#1E5631;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700}
.pill-8-14{background:#FFF2CC;color:#7F6000;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700}
.pill-15-30{background:#FCE4D6;color:#7F2704;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700}
.pill-31-60{background:#F8CBAD;color:#660000;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:10px;padding:28px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:1rem;color:var(--blue);margin-bottom:16px;font-weight:700}
.modal-close{float:right;cursor:pointer;color:#aaa;font-size:1.2rem;margin-top:-4px}
.modal-close:hover{color:#333}
.detail-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #eef2f7;font-size:.85rem}
.detail-row:last-child{border-bottom:none}
.detail-label{font-weight:600;color:#555;min-width:140px;flex-shrink:0}
.detail-val{color:#222}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .sidebar{width:56px}
  .sidebar-header,.sidebar-office,.sidebar-name,.sidebar-user,.nav-item span,.sidebar-footer{display:none}
  .nav-item{justify-content:center;padding:12px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>Activation Support</h1>
    <p id="login-office-name">Loading office…</p>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>PIN</label>
      <input type="password" id="login-pin" placeholder="••••" maxlength="6" inputmode="numeric">
    </div>
    <button class="btn" id="login-btn">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="shell">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-office">Office</div>
        <div class="sidebar-name" id="sb-office-name">—</div>
        <div class="sidebar-user" id="sb-user-name">—</div>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sign-out" onclick="signOut()">⬅ <span>Sign Out</span></div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div class="topbar-actions">
          <span id="last-updated" style="font-size:.75rem;color:#999"></span>
          <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
        </div>
      </div>
      <div class="content" id="main-content">
        <div class="spinner">Loading…</div>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detail-modal">
  <div class="modal">
    <span class="modal-close" onclick="closeModal()">✕</span>
    <h3 id="modal-title">Details</h3>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
var CFG = {};
var SESSION = {};
var DATA = {};
var CURRENT_TAB = 'dayafter';

function loadConfig() {
  var params = new URLSearchParams(window.location.search);
  var raw = params.get('office');
  if (!raw) { showError('No office config in URL. Use the link provided by your admin.'); return false; }
  try {
    CFG = JSON.parse(atob(raw));
    document.getElementById('login-office-name').textContent = (CFG.officeName || 'Office') + ' — Activation Support';
    document.title = (CFG.officeName || 'Activation') + ' Dashboard';
    return true;
  } catch(e) {
    showError('Invalid office config. Contact your admin.'); return false;
  }
}

function showError(msg) {
  document.getElementById('login-office-name').textContent = '⚠ ' + msg;
}

// ── API ──────────────────────────────────────────────────────────────────
function api(params) {
  params.key = CFG.apiKey;
  params.officeId = CFG.officeId;
  params.sheetId = CFG.sheetId;
  var qs = Object.keys(params).map(function(k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); }).join('&');
  return fetch(CFG.appsScriptUrl + '?' + qs).then(function(r) { return r.json(); });
}

function apiPost(body) {
  body.key = CFG.apiKey;
  body.officeId = CFG.officeId;
  body.sheetId = CFG.sheetId;
  return fetch(CFG.appsScriptUrl, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

// ── AUTH ─────────────────────────────────────────────────────────────────
function initLogin() {
  if (!loadConfig()) return;
  document.getElementById('login-btn').onclick = doLogin;
  document.getElementById('login-pin').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-email').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('login-pin').focus(); });

  // Restore session
  var saved = sessionStorage.getItem('as_session_' + CFG.officeId);
  if (saved) { try { SESSION = JSON.parse(saved); showApp(); } catch(e) {} }
}

function doLogin() {
  var email = document.getElementById('login-email').value.trim().toLowerCase();
  var pin   = document.getElementById('login-pin').value.trim();
  var err   = document.getElementById('login-error');
  var btn   = document.getElementById('login-btn');
  err.style.display = 'none';
  if (!email || !pin) { err.textContent = 'Enter your email and PIN.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  apiPost({ action: 'validatePin', email: email, pin: pin }).then(function(res) {
    if (res.ok && res.valid) {
      SESSION = { email: email };
      sessionStorage.setItem('as_session_' + CFG.officeId, JSON.stringify(SESSION));
      showApp();
    } else {
      err.textContent = res.error || 'Incorrect PIN. Try again.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }).catch(function() {
    err.textContent = 'Connection error. Try again.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  });
}

function signOut() {
  sessionStorage.removeItem('as_session_' + CFG.officeId);
  DATA = {}; SESSION = {};
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-pin').value = '';
}

// ── APP INIT ─────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sb-office-name').textContent = CFG.officeName || '—';
  buildNav();
  loadData();
}

var TABS = [
  { id: 'dayafter',    icon: '📞', label: 'Day-After Calls',     roles: ['admin','owner','manager','jd','l1','rep'] },
  { id: 'delivered',   icon: '📦', label: 'Delivered Not Active', roles: ['admin','owner','manager','jd','l1','rep'] },
  { id: 'issues',      icon: '⚠️',  label: 'Order Issues',        roles: ['admin','owner','manager','jd','l1','rep'] },
  { id: 'escalations', icon: '🚨', label: 'Escalations',          roles: ['admin','owner','manager','jd','l1','rep'] },
  { id: 'noanswer',    icon: '📵', label: 'No Answer',            roles: ['admin','owner','manager','jd','l1','rep'] },
  { id: 'actrates',    icon: '📊', label: 'Activation Rates',    roles: ['admin','owner','manager','jd','l1'] },
  { id: 'churn',       icon: '📉', label: 'Churn Report',         roles: ['admin','owner','manager','jd'] },
  { id: 'people',      icon: '👥', label: 'People',               roles: ['admin','owner','manager','jd','l1'] },
];

function buildNav() {
  var role = SESSION.role || 'rep';
  var nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  TABS.forEach(function(t) {
    if (!t.roles.includes(role)) return;
    var el = document.createElement('div');
    el.className = 'nav-item' + (t.id === CURRENT_TAB ? ' active' : '');
    el.dataset.tab = t.id;
    el.innerHTML = '<span class="nav-icon">' + t.icon + '</span><span>' + t.label + '</span>';
    el.onclick = function() { switchTab(t.id); };
    nav.appendChild(el);
  });
}

function switchTab(id) {
  CURRENT_TAB = id;
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.tab === id);
  });
  var tab = TABS.find(function(t) { return t.id === id; });
  document.getElementById('page-title').textContent = tab ? tab.label : id;
  renderTab(id);
}

// ── DATA ─────────────────────────────────────────────────────────────────
var TAB_CACHE = {};

function loadData() {
  TAB_CACHE = {};
  document.getElementById('main-content').innerHTML = '<div class="spinner">Loading data…</div>';
  api({ ownerEmail: SESSION.email, ownerName: SESSION.name || '' }).then(function(res) {
    if (res.error) { document.getElementById('main-content').innerHTML = '<div class="spinner">Error: ' + res.error + '</div>'; return; }
    DATA = res;
    var roster = DATA.roster || {};
    var me = roster[SESSION.email];
    SESSION.role = me ? (me.rank || 'rep') : 'rep';
    SESSION.name = me ? (me.name || SESSION.email) : SESSION.email;
    sessionStorage.setItem('as_session_' + CFG.officeId, JSON.stringify(SESSION));
    document.getElementById('sb-user-name').textContent = SESSION.name + ' · ' + SESSION.role;
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    buildNav();
    var tab = TABS.find(function(t) { return t.id === CURRENT_TAB; });
    if (!tab || !tab.roles.includes(SESSION.role)) {
      CURRENT_TAB = TABS.find(function(t) { return t.roles.includes(SESSION.role); }).id;
    }
    switchTab(CURRENT_TAB);
  }).catch(function() {
    document.getElementById('main-content').innerHTML = '<div class="spinner">Connection error. <a href="#" onclick="loadData()">Retry</a></div>';
  });
}

function refreshData() { TAB_CACHE = {}; loadData(); }

// ── RENDER TABS ───────────────────────────────────────────────────────────
function renderTab(id) {
  var c = document.getElementById('main-content');
  switch(id) {
    case 'actrates':    c.innerHTML = renderActRates();    break;
    case 'dayafter':    c.innerHTML = renderCallTable(DATA.dayAfterOrders||[], 'Day-After Calls', 'No day-after orders found.'); break;
    case 'delivered':   c.innerHTML = renderCallTable(DATA.deliveredOrders||[], 'Delivered Not Active', 'No delivered-not-active orders found.'); break;
    case 'issues':      c.innerHTML = renderIssuesTable(DATA.orderIssues||[]); break;
    case 'noanswer':    c.innerHTML = renderNoAnswerTable(); break;
    case 'escalations': c.innerHTML = renderEscalationsTable(); break;
    case 'churn':       c.innerHTML = renderChurn();       break;
    case 'people':      c.innerHTML = renderPeople();      break;
    default: c.innerHTML = '<div class="empty">Coming soon.</div>';
  }
  bindFilters();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmtDate(v) {
  if (!v) return '—';
  var d = v instanceof Date ? v : new Date(v);
  if (isNaN(d.getTime())) return String(v).split('T')[0];
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── ACTIVATION RATES ──────────────────────────────────────────────────────
function renderActRates() {
  var rows = DATA.activationRates || [];
  if (!rows.length) return noData('No activation rate data yet. Tableau sync runs nightly.');
  return '<div class="card"><div class="card-header dark">Activation Rates by Rep</div><div class="card-body">' +
  '<div class="filter-row"><input id="f-rates" placeholder="Search rep or office…"></div>' +
  '<div class="tbl-wrap"><table id="rates-table"><thead><tr>' +
  '<th>Owner & Office</th><th>Activation Color</th>' +
  '<th>0-7 Days</th><th>8-14 Days</th><th>15-30 Days</th><th>31-60 Days</th>' +
  '</tr></thead><tbody>' +
  rows.map(function(r) {
    function pct(v){ var n=parseFloat(v); return isNaN(n)?'—':(n*100).toFixed(1)+'%'; }
    var color = String(r['Activation Color']||'').toLowerCase();
    var rowStyle = color==='green'?'background:#f0fff4':color==='yellow'?'background:#fffbeb':color==='red'?'background:#fff5f5':'';
    return '<tr style="'+rowStyle+'"><td>'+esc(r['Owner & Office'])+'</td>' +
    '<td>'+esc(r['Activation Color'])+'</td>' +
    '<td>'+pct(r['0-7 Days'])+'</td><td>'+pct(r['8-14 Days'])+'</td>' +
    '<td>'+pct(r['15-30 Days'])+'</td><td>'+pct(r['31-60 Days'])+'</td></tr>';
  }).join('') +
  '</tbody></table></div></div></div>';
}

// ── CALL TABLE HELPERS ────────────────────────────────────────────────────
var RATING_OPTS = ['No Answer','1 Star','2 Stars','3 Stars','4 Stars','5 Stars'];

// ── STATUS PILL ───────────────────────────────────────────────────────────
function statusPill(s) {
  if (!s) return '<span class="sp sp-default">—</span>';
  var sl = s.toLowerCase();
  var cls = sl.indexOf('active')!==-1?'sp-active':sl.indexOf('deliver')!==-1?'sp-delivered':sl.indexOf('ship')!==-1?'sp-shipped':sl.indexOf('open')!==-1?'sp-open':sl.indexOf('pend')!==-1?'sp-pending':(sl.indexOf('cancel')!==-1||sl.indexOf('disco')!==-1)?'sp-canceled':'sp-default';
  return '<span class="sp '+cls+'">'+esc(s)+'</span>';
}

function ratingPill(dsi, safeId) {
  var r = (DATA.ratings||{})[dsi] || '';
  var cls = r==='No Answer'?'rp-na':r==='1 Star'?'rp-1':r==='2 Stars'?'rp-2':r==='3 Stars'?'rp-3':r==='4 Stars'?'rp-4':r==='5 Stars'?'rp-5':'';
  var id = safeId ? ' id="rp-'+safeId+'"' : '';
  return '<span class="rating-pill '+cls+'"'+id+'>'+esc(r)+'</span>';
}

// ── NOTES MODAL ───────────────────────────────────────────────────────────
var _modalDsi = '';

function openNotesModal(dsi, customer, rep) {
  _modalDsi = dsi;
  var notes = (DATA.notes||{})[dsi] || [];
  var rating = (DATA.ratings||{})[dsi] || '';

  var historyHtml = notes.length ? notes.map(function(n) {
    return '<div class="nm-note"><div class="nm-note-meta">'+fmtDate(n.ts)+' &mdash; '+esc(n.authorName)+'</div><div class="nm-note-text">'+esc(n.noteText)+'</div></div>';
  }).join('') : '<div class="nm-empty">No notes yet.</div>';

  var ratingHtml = RATING_OPTS.map(function(r) {
    var active = r===rating ? ' active-'+( r==='No Answer'?'na': r.replace(' Stars','').replace(' Star','') ) : '';
    return '<button class="nm-r-btn'+active+'" onclick="modalSetRating(\''+r+'\')">'+r+'</button>';
  }).join('');

  document.getElementById('modal-title').innerHTML =
    '<div class="nm-dsi">DSI: '+esc(dsi)+'</div>' +
    '<div class="nm-sub">'+esc(customer)+(rep?' &mdash; '+esc(rep):'')+'</div>';

  document.getElementById('modal-body').innerHTML =
    '<div class="nm-section-label">History</div>' +
    '<div class="nm-history" id="nm-hist-'+esc(dsi)+'">'+historyHtml+'</div>' +
    '<div class="nm-section-label">Rating</div>' +
    '<div class="nm-rating-row" id="nm-rating-row">'+ratingHtml+'</div>' +
    '<div class="nm-section-label">Add Note</div>' +
    '<textarea class="nm-textarea" id="nm-note-input" placeholder="Type your note…"></textarea>' +
    '<div class="nm-actions">' +
      '<button class="nm-add-btn" onclick="modalAddNote()">ADD NOTE</button>' +
      '<button class="nm-close-btn" onclick="closeModal()">CLOSE</button>' +
    '</div>';

  document.getElementById('detail-modal').classList.add('open');
}

function modalSetRating(rating) {
  if (!_modalDsi) return;
  if (!DATA.ratings) DATA.ratings = {};
  DATA.ratings[_modalDsi] = rating;
  // Update modal buttons
  document.querySelectorAll('#nm-rating-row .nm-r-btn').forEach(function(btn) {
    var r = btn.textContent.trim();
    var active = r===rating ? ' active-'+(r==='No Answer'?'na':r.replace(' Stars','').replace(' Star','')) : '';
    btn.className = 'nm-r-btn' + active;
  });
  // Update rating pill on the row
  var pill = document.getElementById('rp-'+_modalDsi.replace(/\W/g,'_'));
  if (pill) {
    var cls = rating==='No Answer'?'rp-na':rating==='1 Star'?'rp-1':rating==='2 Stars'?'rp-2':rating==='3 Stars'?'rp-3':rating==='4 Stars'?'rp-4':rating==='5 Stars'?'rp-5':'';
    pill.className = 'rating-pill '+cls;
    pill.textContent = rating;
  }
  apiPost({ action:'setRating', dsi:_modalDsi, rating:rating, updatedBy:SESSION.email });
}

function modalAddNote() {
  var input = document.getElementById('nm-note-input');
  if (!input) return;
  var text = input.value.trim(); if (!text) return;
  input.value = ''; input.disabled = true;
  var now = new Date().toISOString();
  var entry = { ts:now, authorEmail:SESSION.email, authorName:SESSION.name||SESSION.email, noteText:text };
  if (!DATA.notes) DATA.notes = {};
  if (!DATA.notes[_modalDsi]) DATA.notes[_modalDsi] = [];
  DATA.notes[_modalDsi].push(entry);
  var hist = document.getElementById('nm-hist-'+_modalDsi.replace(/\W/g,'_'));
  if (hist) {
    var empties = hist.querySelectorAll('.nm-empty');
    empties.forEach(function(e) { e.remove(); });
    hist.innerHTML += '<div class="nm-note"><div class="nm-note-meta">'+fmtDate(now)+' &mdash; '+esc(SESSION.name)+'</div><div class="nm-note-text">'+esc(text)+'</div></div>';
    hist.scrollTop = hist.scrollHeight;
  }
  // Update note count on row
  var noteCount = document.getElementById('nc-'+_modalDsi.replace(/\W/g,'_'));
  if (noteCount) noteCount.textContent = DATA.notes[_modalDsi].length;
  apiPost({ action:'addNote', dsi:_modalDsi, noteText:text, authorEmail:SESSION.email, authorName:SESSION.name||SESSION.email })
    .then(function() { input.disabled = false; })
    .catch(function() { input.disabled = false; });
}

// ── CALL TABLE ────────────────────────────────────────────────────────────
function callTableRows(orders, extraColFn) {
  return orders.map(function(o) {
    var dsi = o.dsi || '';
    var safeId = dsi.replace(/\W/g,'_');
    var noteCount = ((DATA.notes||{})[dsi]||[]).length;
    var extra = extraColFn ? extraColFn(o) : '';
    return '<tr>' +
      '<td><span class="rep-name">'+esc(o.rep)+'</span></td>' +
      '<td><span class="dsi-link" onclick="openNotesModal(\''+esc(dsi)+'\',\''+esc(o.spe)+'\',\''+esc(o.rep)+'\')">'+esc(dsi)+'</span></td>' +
      '<td>'+esc(o.orderDate)+'</td>' +
      '<td>'+esc(o.spe)+'</td>' +
      '<td>'+esc(o.productType)+'</td>' +
      extra +
      '<td>'+statusPill(o.dtrStatus)+'</td>' +
      '<td>' + ratingPill(dsi, safeId) + '</td>' +
      '<td>' +
        '<button class="notes-btn" onclick="openNotesModal(\''+esc(dsi)+'\',\''+esc(o.spe)+'\',\''+esc(o.rep)+'\')">NOTES' +
        (noteCount>0?'<span style="margin-left:5px;background:var(--blue2);color:#fff;border-radius:8px;padding:1px 6px;font-size:.68rem">'+noteCount+'</span>':'') +
        '</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

function renderCallTable(orders, title, emptyMsg) {
  if (!orders.length) return noData(emptyMsg);
  return '<div class="card"><div class="card-header dark">'+esc(title)+' &nbsp;<span style="font-weight:400;font-size:.82rem;opacity:.8">'+orders.length+' orders</span></div><div class="card-body">' +
    '<div class="filter-row"><input id="f-ct" placeholder="Search rep, customer, DSI…"></div>' +
    '<div class="call-table-wrap"><table class="call-table" id="ct-table"><thead><tr>' +
    '<th>Rep</th><th>DSI</th><th>Date</th><th>Customer</th><th>Product</th><th>Status</th><th>Rating</th><th>Notes</th>' +
    '</tr></thead><tbody>'+callTableRows(orders, null)+'</tbody></table></div></div></div>';
}

// ── ORDER ISSUES ──────────────────────────────────────────────────────────
function renderIssuesTable(orders) {
  if (!orders.length) return noData('No order issues found.');
  return '<div class="card"><div class="card-header dark">Order Issues &nbsp;<span style="font-weight:400;font-size:.82rem;opacity:.8">'+orders.length+' orders</span></div><div class="card-body">' +
    '<div class="filter-row"><input id="f-iss" placeholder="Search rep, customer, DSI…"></div>' +
    '<div class="call-table-wrap"><table class="call-table" id="iss-table"><thead><tr>' +
    '<th>Rep</th><th>DSI</th><th>Date</th><th>Customer</th><th>Product</th><th>Issue</th><th>Status</th><th>Rating</th><th>Notes</th>' +
    '</tr></thead><tbody>' +
    callTableRows(orders, function(o) {
      var tag = o.issueType==='Porting'?'porting':o.issueType==='Pending Payment'?'payment':'byod';
      var extra = '<span class="issue-tag '+tag+'">'+esc(o.issueType)+'</span>';
      if (o.issueType==='Porting'&&o.heldBackLines>0) extra += '<span class="issue-tag porting">'+o.heldBackLines+' line'+(o.heldBackLines>1?'s':'')+' held</span>';
      return '<td>'+extra+'</td>';
    }) +
    '</tbody></table></div></div></div>';
}

// ── ORDER LOOKUP — call list data first, AOR as fallback ─────────────────
function buildOrderLookup() {
  var map = {};
  (DATA.dayAfterOrders||[]).concat(DATA.deliveredOrders||[]).concat(DATA.orderIssues||[]).forEach(function(o) {
    if (o.dsi && !map[o.dsi]) map[o.dsi] = o;
  });
  (DATA.aorData||[]).forEach(function(r) {
    var d = r['sp.SPM Number']; if (!d || map[d]) return;
    map[d] = { dsi:d, rep:r['Rep']||'—', spe:r['Customer Name']||'', productType:r['Product Type (Broken out lvl 2)']||'', orderDate:r['sp.Order Date (copy)']||'', dtrStatus:r['DTR Status (enriched)']||'' };
  });
  return map;
}

// ── NO ANSWER ─────────────────────────────────────────────────────────────
function renderNoAnswerTable() {
  var ratings = DATA.ratings || {};
  var noAnswerDsis = Object.keys(ratings).filter(function(dsi) { return ratings[dsi]==='No Answer'; });
  if (!noAnswerDsis.length) return noData('No orders marked No Answer yet.');
  var lookup = buildOrderLookup();
  var orders = noAnswerDsis.map(function(dsi) {
    var o = lookup[dsi];
    return o ? o : { dsi:dsi, rep:'—', spe:'', productType:'—', orderDate:'—', dtrStatus:'—' };
  });
  return '<div class="card"><div class="card-header dark">No Answer &nbsp;<span style="font-weight:400;font-size:.82rem;opacity:.8">'+orders.length+' orders</span></div><div class="card-body">' +
    '<div class="filter-row"><input id="f-na" placeholder="Search rep, customer, DSI…"></div>' +
    '<div class="call-table-wrap"><table class="call-table" id="na-table"><thead><tr>' +
    '<th>Rep</th><th>DSI</th><th>Date</th><th>Customer</th><th>Product</th><th>Status</th><th>Rating</th><th>Notes</th>' +
    '</tr></thead><tbody>'+callTableRows(orders,null)+'</tbody></table></div></div></div>';
}

// ── ESCALATIONS ───────────────────────────────────────────────────────────
function renderEscalationsTable() {
  var ratings = DATA.ratings || {};
  var escDsis = Object.keys(ratings).filter(function(dsi) { return ratings[dsi]==='1 Star'||ratings[dsi]==='2 Stars'; });
  if (!escDsis.length) return noData('No escalations yet. Orders rated 1 or 2 Stars appear here.');
  var lookup = buildOrderLookup();
  var orders = escDsis.map(function(dsi) {
    var o = lookup[dsi];
    return o ? o : { dsi:dsi, rep:'—', spe:'', productType:'—', orderDate:'—', dtrStatus:'—' };
  });
  return '<div class="card"><div class="card-header dark">Escalations &nbsp;<span style="font-weight:400;font-size:.82rem;opacity:.8">'+orders.length+' orders</span></div><div class="card-body">' +
    '<div class="filter-row"><input id="f-esc" placeholder="Search rep, customer, DSI…"></div>' +
    '<div class="call-table-wrap"><table class="call-table" id="esc-table"><thead><tr>' +
    '<th>Rep</th><th>DSI</th><th>Date</th><th>Customer</th><th>Product</th><th>Status</th><th>Rating</th><th>Notes</th>' +
    '</tr></thead><tbody>'+callTableRows(orders,null)+'</tbody></table></div></div></div>';
}

// ── CHURN ─────────────────────────────────────────────────────────────────
function renderChurn() {
  var rows = DATA.churnReport || [];
  if (!rows.length) return noData('No churn data yet. Tableau sync runs nightly.');
  var headers = Object.keys(rows[0]).filter(function(k) { return !k.startsWith('_blank'); });
  return '<div class="card"><div class="card-header dark">Churn Report</div><div class="card-body">' +
  '<div class="filter-row"><input id="f-churn" placeholder="Search rep…"></div>' +
  '<div class="tbl-wrap"><table id="churn-table"><thead><tr>' +
  headers.map(function(h) { return '<th>'+esc(h)+'</th>'; }).join('') +
  '</tr></thead><tbody>' +
  rows.map(function(r) {
    return '<tr>' + headers.map(function(h) { return '<td>'+esc(r[h])+'</td>'; }).join('') + '</tr>';
  }).join('') + '</tbody></table></div></div></div>';
}

// ── PEOPLE ────────────────────────────────────────────────────────────────
function renderPeople() {
  var roster = DATA.roster || {};
  var rows = Object.keys(roster).map(function(email) {
    var r = roster[email]; return Object.assign({email:email}, r);
  }).sort(function(a,b) { return a.name.localeCompare(b.name); });
  if (!rows.length) return noData('No people in the roster yet.');
  return '<div class="card"><div class="card-header dark">People & Roster</div><div class="card-body">' +
  '<div class="filter-row"><input id="f-people" placeholder="Search name, email, role…"></div>' +
  '<div class="tbl-wrap"><table id="people-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Team</th><th>Status</th><th>Tableau Name</th></tr></thead><tbody>' +
  rows.map(function(r) {
    var statusBadge = r.deactivated ? '<span class="badge badge-red">Inactive</span>' : '<span class="badge badge-green">Active</span>';
    return '<tr><td>'+esc(r.name)+'</td><td>'+esc(r.email)+'</td><td>'+esc(r.rank)+'</td><td>'+esc(r.team)+'</td><td>'+statusBadge+'</td><td>'+esc(r.tableauName)+'</td></tr>';
  }).join('') + '</tbody></table></div></div></div>';
}

function noData(msg) {
  return '<div class="card"><div class="card-body"><div class="empty">'+esc(msg)+'</div></div></div>';
}

// ── LIVE FILTER BINDING ───────────────────────────────────────────────────
function bindFilters() {
  document.querySelectorAll('[id^="f-"]').forEach(function(input) {
    input.addEventListener('input', function() {
      var tblId = input.id.replace('f-','') + '-table';
      var tbl = document.getElementById(tblId);
      if (!tbl) return;
      var q = input.value.toLowerCase();
      Array.from(tbl.querySelectorAll('tbody tr')).forEach(function(tr) {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function closeModal() { document.getElementById('detail-modal').classList.remove('open'); }
document.getElementById('detail-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ── BOOT ─────────────────────────────────────────────────────────────────
initLogin();
</script>
