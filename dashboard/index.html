<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activation Support</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1F4E78;--blue2:#4A9FD4;--blue3:#1a3347;
  --green:#27ae60;--green2:#1a4a2a;--green3:#c6efce;
  --yellow:#f0b429;--yellow2:#3a2c00;--yellow3:#fff2cc;
  --red:#e74c3c;--red2:#3d0d0d;--red3:#fce4d6;
  --gray:#aaa;--gray2:#2e2e2e;
  --bg:#1a1a1a;--surface:#242424;--surface2:#2c2c2c;
  --border:rgba(255,255,255,.07);
  --text:#e2e2e2;--text2:#999;
  --sidebar:220px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;height:100vh;overflow:hidden}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:#111;display:flex;align-items:center;justify-content:center;z-index:100}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.login-card h1{font-size:1.5rem;color:var(--blue2);margin-bottom:4px}
.login-card p{font-size:.85rem;color:var(--text2);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:6px}
.field input{width:100%;padding:10px 12px;border:1.5px solid #3a3a3a;border-radius:6px;font-size:.95rem;outline:none;transition:border .15s;background:#1e1e1e;color:var(--text)}
.field input:focus{border-color:var(--blue2)}
.btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .15s}
.btn:hover{background:#2563a8}
.btn:disabled{opacity:.45;cursor:not-allowed}
#login-error{color:#e74c3c;font-size:.82rem;margin-top:10px;display:none}
.login-who{font-size:.88rem;color:var(--blue2);font-weight:600;margin-bottom:14px;word-break:break-all}
.login-set-intro{font-size:.82rem;color:var(--text2);margin-bottom:14px}
.login-back{font-size:.8rem;color:var(--text2);text-align:center;margin-top:12px;cursor:pointer}
.login-back:hover{color:var(--blue2)}

/* ── APP SHELL ── */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:#111827;color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-office{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4);margin-bottom:2px}
.sidebar-name{font-size:1rem;font-weight:700;color:#fff}
.sidebar-user{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:2px}
nav{flex:1;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:.87rem;cursor:pointer;color:rgba(255,255,255,.6);border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(74,159,212,.15);color:var(--blue2);border-left-color:var(--blue2);font-weight:600}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08)}
.sign-out{font-size:.78rem;color:rgba(255,255,255,.4);cursor:pointer;display:flex;align-items:center;gap:6px}
.sign-out:hover{color:#fff}

/* ── OFFICE DROPDOWN (topbar) ── */
.office-dd-wrap{position:relative;display:inline-block}
.office-dd-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;background:#2a2a2a;color:var(--blue2);border:1.5px solid #3a3a3a;border-radius:20px;font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:border .15s}
.office-dd-btn:hover{border-color:var(--blue2)}
.office-dd-arrow{font-size:.7rem;opacity:.6}
.office-dd-panel{position:absolute;top:calc(100% + 8px);right:0;background:#1e1e1e;border:1px solid #333;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.5);min-width:210px;padding:6px 0;z-index:500;display:none}
.office-dd-panel.open{display:block}
.office-dd-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--text)}
.office-dd-item:hover{background:#2a2a2a}
.office-dd-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;color:#fff;flex-shrink:0}
.office-dd-current{font-size:.68rem;font-weight:700;color:var(--text2);margin-left:auto;padding:2px 8px;background:#2a2a2a;border-radius:8px}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--surface);padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:1.05rem;font-weight:700;color:var(--blue2)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.refresh-btn{padding:6px 14px;background:#2a2a2a;color:var(--blue2);border:1px solid #3a3a3a;border-radius:6px;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s}
.refresh-btn:hover{border-color:var(--blue2)}
.content{padding:20px 24px;flex:1}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.3);margin-bottom:16px;overflow:hidden}
.card-header{background:#1e3a5f;color:#fff;padding:12px 16px;font-size:.88rem;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.card-header.dark{background:#112240}
.card-body{padding:16px}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.3);text-align:center}
.stat-val{font-size:2rem;font-weight:700;color:var(--blue2);line-height:1}
.stat-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-top:4px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;background:#1e2d3d;color:#7ab3d4;font-weight:700;padding:9px 12px;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:top;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:rgba(255,255,255,.02)}
tr:hover td{background:rgba(74,159,212,.07)}

/* ── BADGES ── */
.badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-blue{background:#1a3a5c;color:var(--blue2)}
.badge-green{background:#1a4a2a;color:#4caf7d}
.badge-yellow{background:#3a2c00;color:#f0b429}
.badge-red{background:#3d0d0d;color:#e87070}
.badge-gray{background:#2e2e2e;color:var(--gray)}

/* ── SEARCH/FILTER ── */
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-row input,.filter-row select{padding:7px 10px;border:1.5px solid #3a3a3a;border-radius:6px;font-size:.84rem;outline:none;background:#1e1e1e;color:var(--text)}
.filter-row input:focus,.filter-row select:focus{border-color:var(--blue2)}
.filter-row input{flex:1;min-width:180px}

/* ── LOADING / EMPTY ── */
.spinner{text-align:center;padding:48px;color:var(--text2);font-size:.9rem}
.empty{text-align:center;padding:40px;color:var(--text2);font-size:.88rem}

/* ── CALL TABLE ── */
.call-table-wrap{overflow-x:auto}
.call-table{width:100%;border-collapse:collapse;font-size:.875rem}
.call-table thead tr{border-bottom:1px solid rgba(255,255,255,.08)}
.call-table th{text-align:left;padding:10px 14px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);white-space:nowrap}
.sort-th{cursor:pointer;user-select:none}
.sort-th:hover{color:var(--text)}
/* ── ACTIVATION RATES ── */
.ar-cell{text-align:center;padding:4px 8px}
.ar-badge{display:inline-block;padding:5px 10px;border-radius:5px;font-weight:700;font-size:.82rem;line-height:1.4;min-width:64px;text-align:center}
.ar-green{background:#1b5e20;color:#a5d6a7}
.ar-yellow{background:#e65100;color:#fff}
.ar-red{background:#b71c1c;color:#ffcdd2}
.ar-blue{background:#0d47a1;color:#90caf9}
.ar-rep{padding:10px 14px;font-size:.875rem;color:var(--text)}
.ar-grand-row{border-top:2px solid rgba(255,255,255,.15);border-bottom:2px solid rgba(255,255,255,.15)}
.ar-grand-rep{font-weight:700;color:var(--blue2)}
.ar-select{padding:7px 10px;border:1.5px solid #3a3a3a;border-radius:6px;font-size:.84rem;background:#1e1e1e;color:var(--text);cursor:pointer;margin-right:8px}
.ar-select:focus{outline:none;border-color:var(--blue2)}
.dd-filter{position:relative;display:inline-block}
.dd-btn{padding:7px 12px;border:1.5px solid #3a3a3a;border-radius:6px;font-size:.84rem;background:#1e1e1e;color:var(--text);cursor:pointer;white-space:nowrap}
.dd-btn:hover{border-color:var(--blue2);color:var(--blue2)}
.dd-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:#252525;border:1.5px solid #3a3a3a;border-radius:6px;min-width:160px;padding:6px 0;max-height:260px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.dd-panel.open{display:block}
.dd-panel label{display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:.84rem;color:var(--text);cursor:pointer;white-space:nowrap}
.dd-panel label:hover{background:rgba(74,159,212,.1)}
.dd-panel input[type=checkbox]{accent-color:var(--blue2);flex-shrink:0}
.date-filter-wrap{display:flex;align-items:center;gap:6px;font-size:.84rem;color:var(--text2);white-space:nowrap}
.date-filter-wrap input[type=date]{padding:6px 8px;border:1.5px solid #3a3a3a;border-radius:6px;font-size:.84rem;background:#1e1e1e;color:var(--text);cursor:pointer;outline:none}
.date-filter-wrap input[type=date]:focus{border-color:var(--blue2)}
.clear-filters-btn{padding:7px 12px;border:1.5px solid #3a3a3a;border-radius:6px;font-size:.84rem;background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap}
.clear-filters-btn:hover{border-color:#e87070;color:#e87070}
.call-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;color:var(--text)}
.call-table tbody tr:last-child td{border-bottom:none}
.call-table tbody tr:hover td{background:rgba(74,159,212,.07)}
.rep-name{font-weight:600;color:var(--text)}
.dsi-link{color:var(--blue2);font-weight:600;cursor:pointer;text-decoration:none}
.dsi-link:hover{text-decoration:underline}

/* status pills */
.sp{display:inline-block;font-size:.75rem;font-weight:700;padding:2px 9px;border-radius:10px;white-space:nowrap;margin-right:3px}
.sp-active{background:#1a4a2a;color:#4caf7d}
.sp-delivered{background:#2d1b4e;color:#b48ef0}
.sp-yellow{background:#3a2c00;color:#f0c040}
.sp-pale-yellow{background:#2e2600;color:#c9a855}
.sp-canceled{background:#3d0d0d;color:#e87070}
.sp-disconnected{background:#1a0505;color:#c03030}
.sp-orange{background:#3d2000;color:#f08030}
.sp-dark-orange{background:#2a1200;color:#cc6010}
.sp-default{background:#2a2a2a;color:#999}


/* rating pill */
.rating-pill{display:inline-block;font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:10px;white-space:nowrap}
.rp-na{background:#2e2e2e;color:#aaa}
.rp-1{background:#3d1010;color:#e87070}
.rp-2{background:#3d1a1a;color:#e87070}
.rp-3{background:#3a2c00;color:#f0b429}
.rp-4{background:#1a3a1a;color:#6abf7a}
.rp-5{background:#1a4a2a;color:#4caf7d}

/* NOTES button */
.notes-btn{padding:5px 14px;border:1.5px solid #3a3a3a;background:#2a2a2a;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s}
.notes-btn:hover{border-color:var(--blue2);color:var(--blue2)}

/* ── NOTES MODAL ── */
.nm-dsi{font-size:1.1rem;font-weight:700;color:var(--blue2);margin-bottom:2px}
.nm-sub{font-size:.82rem;color:var(--text2);margin-bottom:16px}
.nm-section-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:8px}
.nm-history{min-height:60px;max-height:200px;overflow-y:auto;background:#1e1e1e;border-radius:6px;padding:10px 12px;margin-bottom:16px}
.nm-empty{font-size:.82rem;color:var(--text2);font-style:italic}
.nm-note{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.83rem}
.nm-note:last-child{border-bottom:none}
.nm-note-meta{font-size:.72rem;color:var(--text2);margin-bottom:2px}
.nm-note-text{color:var(--text)}
.nm-rating-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.nm-r-btn{padding:5px 12px;border-radius:12px;border:1.5px solid #3a3a3a;background:#2a2a2a;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s}
.nm-r-btn:hover{border-color:var(--blue2)}
.nm-r-btn.active-na{background:#2e2e2e;color:#aaa;border-color:#555}
.nm-r-btn.active-1{background:#3d1010;color:#e87070;border-color:#7a3030}
.nm-r-btn.active-2{background:#3d1a1a;color:#e87070;border-color:#7a3030}
.nm-r-btn.active-3{background:#3a2c00;color:#f0b429;border-color:#7a6000}
.nm-r-btn.active-4{background:#1a3a1a;color:#6abf7a;border-color:#2a6a2a}
.nm-r-btn.active-5{background:#1a4a2a;color:#4caf7d;border-color:#2a7a4a}
.nm-textarea{width:100%;padding:9px 12px;border:1.5px solid #3a3a3a;border-radius:6px;font-size:.86rem;font-family:inherit;resize:vertical;min-height:80px;outline:none;margin-bottom:12px;background:#1e1e1e;color:var(--text)}
.nm-textarea:focus{border-color:var(--blue2)}
.nm-actions{display:flex;gap:8px}
.nm-act-label{color:var(--blue2)}
.nm-rep-label{color:#4caf7d}
.nm-rep-add-btn{background:#1e5631!important}
.nm-add-btn{flex:1;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:.88rem;font-weight:700;cursor:pointer}
.nm-add-btn:hover{background:#2563a8}
.nm-close-btn{padding:10px 20px;border:1.5px solid #3a3a3a;background:#2a2a2a;border-radius:6px;font-size:.88rem;font-weight:600;cursor:pointer;color:var(--text2)}
.nm-close-btn:hover{border-color:#666;color:var(--text)}
.add-note-row input:focus{border-color:var(--blue2)}
.add-note-row button{padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap}
.add-note-row button:hover{background:#2563a8}

/* ── DSI TOAST ── */
#dsi-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#fff;padding:10px 22px;border-radius:8px;font-size:.85rem;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:400;white-space:nowrap}
#dsi-toast.show{opacity:1}

/* ── PRODUCT PILLS ── */
.prod-pill{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;background:#0d2a4a;color:#5ba3e8;white-space:nowrap;margin-right:3px}

/* ── PILLS for activation bucket ── */
.pill-0-7{background:#1a4a2a;color:#4caf7d;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700}
.pill-8-14{background:#3a2c00;color:#f0b429;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700}
.pill-15-30{background:#3d1a0a;color:#e89060;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700}
.pill-31-60{background:#3d0d0d;color:#e87070;padding:2px 7px;border-radius:8px;font-size:.72rem;font-weight:700}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:1rem;color:var(--blue2);margin-bottom:16px;font-weight:700}
.modal-close{float:right;cursor:pointer;color:var(--text2);font-size:1.2rem;margin-top:-4px}
.modal-close:hover{color:var(--text)}
.detail-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem}
.detail-row:last-child{border-bottom:none}
.detail-label{font-weight:600;color:var(--text2);min-width:140px;flex-shrink:0}
.detail-val{color:var(--text)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .sidebar{width:56px}
  .sidebar-header,.sidebar-office,.sidebar-name,.sidebar-user,.nav-item span,.sidebar-footer{display:none}
  .nav-item{justify-content:center;padding:12px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>Activation Support</h1>
    <p id="login-office-name">Loading office…</p>

    <!-- Step 1: email -->
    <div id="ls-email-step">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn" id="login-continue-btn">Continue</button>
    </div>

    <!-- Step 2a: enter PIN -->
    <div id="ls-pin-step" style="display:none">
      <div class="login-who" id="login-who"></div>
      <div class="field">
        <label>PIN</label>
        <input type="password" id="login-pin" placeholder="••••" maxlength="6" inputmode="numeric">
      </div>
      <button class="btn" id="login-btn">Sign In</button>
      <div class="login-back" onclick="loginBack()">← Use a different email</div>
    </div>

    <!-- Step 2b: create PIN -->
    <div id="ls-set-pin-step" style="display:none">
      <div class="login-who" id="login-who-set"></div>
      <p class="login-set-intro">No PIN yet — create one to access your dashboard.</p>
      <div class="field">
        <label>New PIN (4–6 digits)</label>
        <input type="password" id="login-new-pin" placeholder="••••" maxlength="6" inputmode="numeric">
      </div>
      <div class="field">
        <label>Confirm PIN</label>
        <input type="password" id="login-confirm-pin" placeholder="••••" maxlength="6" inputmode="numeric">
      </div>
      <button class="btn" id="login-set-pin-btn">Set PIN &amp; Sign In</button>
      <div class="login-back" onclick="loginBack()">← Use a different email</div>
    </div>

    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="shell">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-office">Office</div>
        <div class="sidebar-name" id="sb-office-name">—</div>
        <div class="sidebar-user" id="sb-user-name">—</div>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sign-out" onclick="signOut()">⬅ <span>Sign Out</span></div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div class="topbar-actions">
          <span id="last-updated" style="font-size:.75rem;color:#999"></span>
          <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
          <div class="office-dd-wrap" id="office-dd-wrap" style="display:none">
            <button class="office-dd-btn" id="office-dd-btn" onclick="toggleOfficeDropdown(event)">
              <span id="office-dd-label">—</span>
              <span class="office-dd-arrow">▾</span>
            </button>
            <div class="office-dd-panel" id="office-dd-panel"></div>
          </div>
        </div>
      </div>
      <div class="content" id="main-content">
        <div class="spinner">Loading…</div>
      </div>
    </div>
  </div>
</div>

<div id="dsi-toast"></div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detail-modal">
  <div class="modal">
    <span class="modal-close" onclick="closeModal()">✕</span>
    <h3 id="modal-title">Details</h3>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw9hfE_HDTDueNr-s-wQRNDvqWfQX-EkYkSFVQQeitc3_ccO8FqBabAhKe7YTqVzPQ21Q/exec';
var API_KEY = 'activation-dash-2026-secret';
var OFFICE_NAMES  = { midspire:'Midspire', viridian:'Viridian', elevate:'Elevate', ignite:'Ignite' };
var OFFICE_COLORS = { midspire:'#1F4E78', viridian:'#1E5631', elevate:'#2E75B6', ignite:'#C0392B' };

var CFG = {};
var SESSION = {};
var DATA = {};
var CURRENT_TAB = 'master';

function loadConfig() {
  var params = new URLSearchParams(window.location.search);
  var officeId = (params.get('office') || '').toLowerCase().trim();
  if (!officeId || !OFFICE_NAMES[officeId]) {
    showError('Invalid office URL. Contact your admin for the correct link.');
    return false;
  }
  CFG = { officeId: officeId, officeName: OFFICE_NAMES[officeId] };
  document.getElementById('login-office-name').textContent = CFG.officeName + ' — Activation Support';
  document.title = CFG.officeName + ' Dashboard';
  return true;
}

function showError(msg) {
  document.getElementById('login-office-name').textContent = '⚠ ' + msg;
}

// ── API ──────────────────────────────────────────────────────────────────
function api(params) {
  params.key = API_KEY;
  params.officeId = CFG.officeId;
  var qs = Object.keys(params).map(function(k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); }).join('&');
  return fetch(APPS_SCRIPT_URL + '?' + qs).then(function(r) { return r.json(); });
}

function apiPost(body) {
  body.key = API_KEY;
  body.officeId = CFG.officeId;
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

// ── AUTH ─────────────────────────────────────────────────────────────────
var LOGIN_EMAIL = '';

function initLogin() {
  if (!loadConfig()) return;
  document.getElementById('login-continue-btn').onclick = loginCheckEmail;
  document.getElementById('login-btn').onclick = doLogin;
  document.getElementById('login-set-pin-btn').onclick = doSetPin;
  document.getElementById('login-email').addEventListener('keydown', function(e) { if (e.key === 'Enter') loginCheckEmail(); });
  document.getElementById('login-pin').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-new-pin').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('login-confirm-pin').focus(); });
  document.getElementById('login-confirm-pin').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSetPin(); });

  var saved = sessionStorage.getItem('as_session_' + CFG.officeId);
  if (saved) { try { SESSION = JSON.parse(saved); showApp(); } catch(e) {} }
}

function loginShowStep(step) {
  document.getElementById('ls-email-step').style.display   = step === 'email'  ? '' : 'none';
  document.getElementById('ls-pin-step').style.display     = step === 'pin'    ? '' : 'none';
  document.getElementById('ls-set-pin-step').style.display = step === 'setpin' ? '' : 'none';
  document.getElementById('login-error').style.display = 'none';
}

function loginBack() {
  LOGIN_EMAIL = '';
  loginShowStep('email');
  document.getElementById('login-email').value = '';
  document.getElementById('login-email').focus();
}

function loginCheckEmail() {
  var email = document.getElementById('login-email').value.trim().toLowerCase();
  var err = document.getElementById('login-error');
  var btn = document.getElementById('login-continue-btn');
  err.style.display = 'none';
  if (!email) { err.textContent = 'Enter your email address.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Checking…';
  apiPost({ action: 'checkEmail', email: email }).then(function(res) {
    btn.disabled = false; btn.textContent = 'Continue';
    if (!res.ok) { err.textContent = res.error || 'Something went wrong. Try again.'; err.style.display = 'block'; return; }
    LOGIN_EMAIL = email;
    if (!res.found) {
      err.textContent = "Your email isn't recognized. Contact your Owner or Admin to be added to the system.";
      err.style.display = 'block';
      return;
    }
    if (res.hasPin) {
      document.getElementById('login-who').textContent = email;
      loginShowStep('pin');
      document.getElementById('login-pin').value = '';
      document.getElementById('login-pin').focus();
    } else {
      document.getElementById('login-who-set').textContent = email;
      loginShowStep('setpin');
      document.getElementById('login-new-pin').value = '';
      document.getElementById('login-confirm-pin').value = '';
      document.getElementById('login-new-pin').focus();
    }
  }).catch(function() {
    btn.disabled = false; btn.textContent = 'Continue';
    err.textContent = 'Connection error. Try again.';
    err.style.display = 'block';
  });
}

function doLogin() {
  var pin = document.getElementById('login-pin').value.trim();
  var err = document.getElementById('login-error');
  var btn = document.getElementById('login-btn');
  err.style.display = 'none';
  if (!pin) { err.textContent = 'Enter your PIN.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  apiPost({ action: 'validatePin', email: LOGIN_EMAIL, pin: pin }).then(function(res) {
    if (res.ok && res.valid) {
      SESSION = { email: LOGIN_EMAIL, homeOffice: CFG.officeId, permissions: res.permissions || CFG.officeId };
      sessionStorage.setItem('as_session_' + CFG.officeId, JSON.stringify(SESSION));
      showApp();
    } else {
      err.textContent = res.error || 'Incorrect PIN. Try again.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }).catch(function() {
    err.textContent = 'Connection error. Try again.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  });
}

function doSetPin() {
  var newPin     = document.getElementById('login-new-pin').value.trim();
  var confirmPin = document.getElementById('login-confirm-pin').value.trim();
  var err = document.getElementById('login-error');
  var btn = document.getElementById('login-set-pin-btn');
  err.style.display = 'none';
  if (!newPin) { err.textContent = 'Enter a PIN.'; err.style.display = 'block'; return; }
  if (!/^\d{4,6}$/.test(newPin)) { err.textContent = 'PIN must be 4–6 digits.'; err.style.display = 'block'; return; }
  if (newPin !== confirmPin) { err.textContent = "PINs don't match. Try again."; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Setting PIN…';
  apiPost({ action: 'setPin', email: LOGIN_EMAIL, pin: newPin }).then(function(res) {
    if (res.ok && res.valid) {
      SESSION = { email: LOGIN_EMAIL, homeOffice: CFG.officeId, permissions: res.permissions || CFG.officeId };
      sessionStorage.setItem('as_session_' + CFG.officeId, JSON.stringify(SESSION));
      showApp();
    } else {
      err.textContent = res.error || 'Failed to set PIN. Try again.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Set PIN & Sign In';
    }
  }).catch(function() {
    err.textContent = 'Connection error. Try again.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Set PIN & Sign In';
  });
}

function signOut() {
  sessionStorage.removeItem('as_session_' + CFG.officeId);
  DATA = {}; SESSION = {}; LOGIN_EMAIL = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  loginShowStep('email');
  document.getElementById('login-email').value = '';
}

// ── APP INIT ─────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sb-office-name').textContent = CFG.officeName || '—';
  buildOfficeSwitcher();
  buildNav();
  loadData();
}

function buildOfficeSwitcher() { updateOfficeDropdown(); }

function updateOfficeDropdown() {
  var wrap = document.getElementById('office-dd-wrap'); if (!wrap) return;
  var permitted = SESSION.role === 'master-admin'
    ? Object.keys(OFFICE_NAMES)
    : (SESSION.permissions || CFG.officeId).split(',').map(function(o){ return o.trim(); }).filter(function(o){ return OFFICE_NAMES[o]; });
  if (permitted.length <= 1) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'inline-block';
  document.getElementById('office-dd-label').textContent = OFFICE_NAMES[CFG.officeId] || CFG.officeId;
  document.getElementById('office-dd-panel').innerHTML = permitted.map(function(o) {
    var isCurrent = o === CFG.officeId;
    var color = OFFICE_COLORS[o] || '#555';
    var initial = (OFFICE_NAMES[o]||o).charAt(0).toUpperCase();
    return '<div class="office-dd-item" onclick="selectOffice(\''+o+'\')">'+
      '<div class="office-dd-icon" style="background:'+color+'">'+initial+'</div>'+
      '<span>'+OFFICE_NAMES[o]+'</span>'+
      (isCurrent ? '<span class="office-dd-current">Current</span>' : '')+
      '</div>';
  }).join('');
}

function toggleOfficeDropdown(e) {
  e.stopPropagation();
  document.getElementById('office-dd-panel').classList.toggle('open');
}

function selectOffice(officeId) {
  document.getElementById('office-dd-panel').classList.remove('open');
  switchOffice(officeId);
}

function switchOffice(newOfficeId) {
  if (!OFFICE_NAMES[newOfficeId] || newOfficeId === CFG.officeId) return;
  CFG.officeId = newOfficeId;
  CFG.officeName = OFFICE_NAMES[newOfficeId];
  document.getElementById('sb-office-name').textContent = CFG.officeName;
  window.history.pushState({}, '', window.location.pathname + '?office=' + newOfficeId);
  updateOfficeDropdown();
  TAB_CACHE = {};
  loadData();
}

var ALL_ROLES = ['master-admin','owner','admin','activator','rep'];
var TABS = [
  { id: 'master',      icon: '📋', label: 'Master Tracker',       roles: ALL_ROLES },
  { id: 'dayafter',    icon: '📞', label: 'Day-After Calls',      roles: ALL_ROLES },
  { id: 'delivered',   icon: '📦', label: 'Delivered Not Active', roles: ALL_ROLES },
  { id: 'issues',      icon: '⚠️',  label: 'Order Issues',        roles: ALL_ROLES },
  { id: 'completed',   icon: '✅', label: 'Completed Orders',     roles: ALL_ROLES },
  { id: 'escalations', icon: '🚨', label: 'Escalations',          roles: ALL_ROLES },
  { id: 'noanswer',    icon: '📵', label: 'No Answer',            roles: ALL_ROLES },
  { id: 'actrates',    icon: '📊', label: 'Activation Rates',    roles: ALL_ROLES },
  { id: 'churn',       icon: '📉', label: 'Churn Report',         roles: ALL_ROLES },
  { id: 'people',      icon: '👥', label: 'People',               roles: ALL_ROLES },
];

function buildNav() {
  var role = SESSION.role || 'rep';
  var nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  TABS.forEach(function(t) {
    if (!t.roles.includes(role)) return;
    var el = document.createElement('div');
    el.className = 'nav-item' + (t.id === CURRENT_TAB ? ' active' : '');
    el.dataset.tab = t.id;
    el.innerHTML = '<span class="nav-icon">' + t.icon + '</span><span>' + t.label + '</span>';
    el.onclick = function() { switchTab(t.id); };
    nav.appendChild(el);
  });
}

function switchTab(id) {
  CURRENT_TAB = id;
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.tab === id);
  });
  var tab = TABS.find(function(t) { return t.id === id; });
  document.getElementById('page-title').textContent = tab ? tab.label : id;
  renderTab(id);
}

// ── DATA ─────────────────────────────────────────────────────────────────
var TAB_CACHE = {};

function loadData() {
  TAB_CACHE = {};
  document.getElementById('main-content').innerHTML = '<div class="spinner">Loading data…</div>';
  api({}).then(function(res) {
    if (res.error) { document.getElementById('main-content').innerHTML = '<div class="spinner">Error: ' + res.error + '</div>'; return; }
    DATA = res;
    var roster = DATA.roster || {};
    var me = roster[SESSION.email];
    if (me) {
      SESSION.role = me.rank || 'rep';
      SESSION.name = me.name || SESSION.email;
      SESSION.tableauName = me.tableauName || '';
    } else if (!SESSION.role) {
      SESSION.role = 'rep';
      SESSION.name = SESSION.email;
      SESSION.tableauName = '';
    }
    sessionStorage.setItem('as_session_' + (SESSION.homeOffice || CFG.officeId), JSON.stringify(SESSION));
    document.getElementById('sb-user-name').textContent = SESSION.name + ' · ' + SESSION.role;
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    buildNav();
    var tab = TABS.find(function(t) { return t.id === CURRENT_TAB; });
    if (!tab || !tab.roles.includes(SESSION.role)) {
      CURRENT_TAB = TABS.find(function(t) { return t.roles.includes(SESSION.role); }).id;
    }
    switchTab(CURRENT_TAB);
  }).catch(function() {
    document.getElementById('main-content').innerHTML = '<div class="spinner">Connection error. <a href="#" onclick="loadData()">Retry</a></div>';
  });
}

function refreshData() { TAB_CACHE = {}; loadData(); }

// ── REP FILTER ────────────────────────────────────────────────────────────
function repFilter(orders) {
  if (SESSION.role !== 'rep') return orders;
  var tn = (SESSION.tableauName || '').trim();
  if (!tn) return [];
  return orders.filter(function(o) { return o.rep === tn; });
}
function isIssueStatus(s) {
  var sl = String(s||'').toLowerCase().trim();
  return sl.indexOf('porting issue') !== -1 ||
         sl.indexOf('port approved') !== -1 ||
         sl.indexOf('pending order port') !== -1 ||
         sl.indexOf('byod') !== -1 ||
         sl.indexOf('pending valid payment') !== -1;
}
function issueFilter(orders) {
  return orders.filter(function(o) {
    return Object.keys(o.statusCounts||{}).some(isIssueStatus);
  });
}

// ── RENDER TABS ───────────────────────────────────────────────────────────
function renderTab(id) {
  var c = document.getElementById('main-content');
  if (id === 'people') {
    c.innerHTML = '<div class="spinner">Loading…</div>';
    ensureTableauNames(function() { c.innerHTML = renderPeople(); bindFilters(); });
    return;
  }
  switch(id) {
    case 'actrates':    c.innerHTML = renderActRates();    break;
    case 'master':      c.innerHTML = renderCallTable(repFilter(DATA.masterTracker||[]), 'Master Tracker', 'No orders found.'); break;
    case 'dayafter':    c.innerHTML = renderCallTable(repFilter(DATA.dayAfterOrders||[]), 'Day-After Calls', 'No day-after orders found.'); break;
    case 'delivered':   c.innerHTML = renderCallTable(repFilter(DATA.deliveredOrders||[]), 'Delivered Not Active', 'No delivered-not-active orders found.'); break;
    case 'issues':      c.innerHTML = renderCallTable(repFilter(issueFilter(DATA.orderIssues||[])), 'Order Issues', 'No order issues found.'); break;
    case 'completed':   c.innerHTML = renderCallTable(repFilter(DATA.completedOrders||[]), 'Completed Order Log', 'No completed orders found.'); break;
    case 'noanswer':    c.innerHTML = renderNoAnswerTable(); break;
    case 'escalations': c.innerHTML = renderEscalationsTable(); break;
    case 'churn':       c.innerHTML = renderChurn();       break;
    default: c.innerHTML = '<div class="empty">Coming soon.</div>';
  }
  bindFilters();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmtDate(v) {
  if (!v) return '—';
  var d = v instanceof Date ? v : new Date(v);
  if (isNaN(d.getTime())) return String(v).split('T')[0];
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── ACTIVATION RATES ──────────────────────────────────────────────────────
var _AR_LINES = null;

function renderActRates() {
  _AR_LINES = DATA.actRateLines || null;
  if (!_AR_LINES || !_AR_LINES.length) return noData('No activation rate data. Redeploy Code.gs and hard-refresh.');

  var role = SESSION.role || 'rep';
  var myName = (SESSION.tableauName || '').toLowerCase();
  var isRep = role === 'rep' && !!myName;

  var repSet = {}, prodSet = {};
  _AR_LINES.forEach(function(l) { repSet[l.rep]=true; if(l.product) prodSet[l.product]=true; });
  var reps = Object.keys(repSet).sort();
  var prods = Object.keys(prodSet).sort();

  var filterHtml = isRep ? '' :
    '<div class="filter-row">' +
    '<select class="ar-select" id="ar-rep-sel" onchange="refreshActRates()"><option value="">All Reps</option>' +
    reps.map(function(r){ return '<option value="'+esc(r)+'">'+esc(r)+'</option>'; }).join('') + '</select>' +
    '<select class="ar-select" id="ar-prod-sel" onchange="refreshActRates()"><option value="">All Products</option>' +
    prods.map(function(p){ return '<option value="'+esc(p)+'">'+esc(p)+'</option>'; }).join('') + '</select>' +
    '</div>';

  return '<div class="card"><div class="card-header dark">Activation Rates</div><div class="card-body">' +
    filterHtml + '<div id="ar-table-wrap">' + _buildArTable('','') + '</div></div></div>';
}

function refreshActRates() {
  var rs = document.getElementById('ar-rep-sel'), ps = document.getElementById('ar-prod-sel');
  var wrap = document.getElementById('ar-table-wrap');
  if (wrap) wrap.innerHTML = _buildArTable(rs ? rs.value : '', ps ? ps.value : '');
}

function _buildArTable(repFilter, prodFilter) {
  if (!_AR_LINES) return '';
  var role = SESSION.role || 'rep';
  var myName = (SESSION.tableauName || '').toLowerCase();

  var filtered = _AR_LINES.filter(function(l) {
    if (role === 'rep' && myName && l.rep.toLowerCase() !== myName) return false;
    if (repFilter && l.rep !== repFilter) return false;
    if (prodFilter && l.product !== prodFilter) return false;
    return true;
  });

  function bkt(d) { return d<=7?'b0_7':d<=14?'b8_14':d<=30?'b15_30':'b31_60'; }
  function act(s) { var sl=(s||'').toLowerCase(); return sl==='active'||sl==='posted'||sl.startsWith('disconnect'); }

  var repData={}, totals={b0_7:{t:0,a:0},b8_14:{t:0,a:0},b15_30:{t:0,a:0},b31_60:{t:0,a:0}};
  filtered.forEach(function(l) {
    var b=bkt(l.diff), av=act(l.status)?1:0;
    if(!repData[l.rep]) repData[l.rep]={b0_7:{t:0,a:0},b8_14:{t:0,a:0},b15_30:{t:0,a:0},b31_60:{t:0,a:0}};
    repData[l.rep][b].t++; repData[l.rep][b].a+=av;
    totals[b].t++;         totals[b].a+=av;
  });

  function cell(b, isTotal) {
    if (!isTotal && b.t===0) return '<td></td>';
    if (b.t===0) return '<td class="ar-cell"><div class="ar-badge ar-blue">(0/0)<br>—</div></td>';
    var pct=Math.round(b.a/b.t*100);
    var cls=pct>=80?'ar-green':pct>=60?'ar-yellow':'ar-red';
    return '<td class="ar-cell"><div class="ar-badge '+cls+'">('+b.a+'/'+b.t+')<br>'+pct+'%</div></td>';
  }

  var repRows = Object.keys(repData).sort().map(function(rep) {
    var d=repData[rep];
    return '<tr><td class="ar-rep">'+esc(rep)+'</td>'+cell(d.b0_7,false)+cell(d.b8_14,false)+cell(d.b15_30,false)+cell(d.b31_60,false)+'</tr>';
  }).join('');

  if (!repRows) return '<div class="empty">No data for the selected filters.</div>';

  var grandRow = (role!=='rep') ?
    '<tr class="ar-grand-row"><td class="ar-rep ar-grand-rep">Grand Total</td>'+cell(totals.b0_7,true)+cell(totals.b8_14,true)+cell(totals.b15_30,true)+cell(totals.b31_60,true)+'</tr>' : '';

  return '<div class="tbl-wrap"><table class="call-table"><thead><tr>' +
    '<th>Rep</th><th>0–7 Days</th><th>8–14 Days</th><th>15–30 Days</th><th>31–60 Days</th>' +
    '</tr></thead><tbody>'+grandRow+repRows+'</tbody></table></div>';
}

// ── CALL TABLE HELPERS ────────────────────────────────────────────────────
var RATING_OPTS = ['No Answer','1 Star','2 Stars','3 Stars','4 Stars','5 Stars'];

// ── STATUS PILL ───────────────────────────────────────────────────────────
function spCls(s) {
  if (!s) return 'sp-yellow';
  var sl = s.toLowerCase().trim();
  if (!sl || sl === 'null' || sl === '—' || sl === '-') return 'sp-yellow';
  if (sl.indexOf('deliver') !== -1) return 'sp-delivered';
  if (sl.indexOf('active') !== -1 || sl === 'posted') return 'sp-active';
  if (sl.indexOf('cancel') !== -1) return 'sp-canceled';
  if (sl.indexOf('disco') !== -1) return 'sp-disconnected';
  if (sl.indexOf('port approv') !== -1) return 'sp-dark-orange';
  if (sl.indexOf('order port') !== -1) return 'sp-dark-orange';
  if (sl.indexOf('valid payment') !== -1 || (sl.indexOf('pend') !== -1 && sl.indexOf('payment') !== -1)) return 'sp-orange';
  if (sl.indexOf('porting') !== -1 || (sl.indexOf('port') !== -1 && sl.indexOf('issue') !== -1)) return 'sp-orange';
  if (sl.indexOf('byod') !== -1) return 'sp-orange';
  if (sl.indexOf('backorder') !== -1 || sl.indexOf('back order') !== -1 || sl === 'open') return 'sp-pale-yellow';
  if (sl.indexOf('ship') !== -1 || sl.indexOf('sched') !== -1 || sl.indexOf('pend') !== -1) return 'sp-yellow';
  return 'sp-default';
}
function statusPill(s) {
  if (!s) return '<span class="sp sp-yellow">Null</span>';
  return '<span class="sp ' + spCls(s) + '">' + esc(s) + '</span>';
}

var SARA_URL = 'https://www.saraplus.com/e/ServicePages/Login.aspx';

function clickDsi(dsi) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(dsi);
  } else {
    var el = document.createElement('textarea');
    el.value = dsi; el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el); el.select(); document.execCommand('copy');
    document.body.removeChild(el);
  }
  window.open(SARA_URL, '_blank');
  showToast('Copied: ' + dsi);
}

function showToast(msg) {
  var t = document.getElementById('dsi-toast'); if (!t) return;
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

var PRODUCT_LABELS = { 'WIRELESS':'Wireless','AIR/AWB':'Air','TABLET/WEARABLE':'Tablet','FIBER':'Fiber','VOIP':'VoIP','DTV':'DTV' };

function productBreakdown(productCounts) {
  if (!productCounts || !Object.keys(productCounts).length) return '<span class="sp sp-default">—</span>';
  return Object.keys(productCounts).map(function(pt) {
    var label = PRODUCT_LABELS[pt.toUpperCase()] || pt;
    var count = productCounts[pt];
    return '<span class="prod-pill">' + esc(label) + (count > 1 ? ' \xd7' + count : '') + '</span>';
  }).join('');
}

function statusBreakdown(statusCounts) {
  if (!statusCounts || !Object.keys(statusCounts).length) return '<span class="sp sp-yellow">—</span>';
  return Object.keys(statusCounts).map(function(s) {
    var count = statusCounts[s];

var _modalDsi = '';

    (canAddRep ? '<textarea class="nm-textarea" id="nm-rep-input" placeholder="Add rep note…"></textarea><button class="nm-add-btn nm-rep-add-btn" onclick="modalAddNote(\'rep\')" style="margin-bottom:14px">ADD REP NOTE</button>' : '') +

function modalSetRating(rating) {
  if (!_modalDsi) return;
  if (!DATA.ratings) DATA.ratings = {};
  DATA.ratings[_modalDsi] = rating;
  // Update modal buttons
  document.querySelectorAll('#nm-rating-row .nm-r-btn').forEach(function(btn) {
    var r = btn.textContent.trim();
    var active = r===rating ? ' active-'+(r==='No Answer'?'na':r.replace(' Stars','').replace(' Star','')) : '';
    btn.className = 'nm-r-btn' + active;
  });
  // Update rating pill on the row
  var pill = document.getElementById('rp-'+_modalDsi.replace(/\W/g,'_'));
  if (pill) {
    var cls = rating==='No Answer'?'rp-na':rating==='1 Star'?'rp-1':rating==='2 Stars'?'rp-2':rating==='3 Stars'?'rp-3':rating==='4 Stars'?'rp-4':rating==='5 Stars'?'rp-5':'';
    pill.className = 'rating-pill '+cls;
    pill.textContent = rating;
  }
  apiPost({ action:'setRating', dsi:_modalDsi, rating:rating, updatedBy:SESSION.email });
}

function modalAddNote(noteType) {
  noteType = noteType || 'activation';
  var inputId = noteType === 'rep' ? 'nm-rep-input' : 'nm-act-input';
  var histId  = noteType === 'rep' ? 'nm-rep-hist'  : 'nm-act-hist';
  var input = document.getElementById(inputId);
  if (!input) return;
  var text = input.value.trim(); if (!text) return;
  input.value = ''; input.disabled = true;
  var now = new Date().toISOString();
  var entry = { ts:now, authorEmail:SESSION.email, authorName:SESSION.name||SESSION.email, noteText:text, noteType:noteType };
  if (!DATA.notes) DATA.notes = {};
  if (!DATA.notes[_modalDsi]) DATA.notes[_modalDsi] = [];
  DATA.notes[_modalDsi].push(entry);
  var hist = document.getElementById(histId);
  if (hist) {
    hist.querySelectorAll('.nm-empty').forEach(function(e) { e.remove(); });
    hist.innerHTML += _noteItemHtml(entry);
    hist.scrollTop = hist.scrollHeight;
  }
  var noteCount = document.getElementById('nc-'+_modalDsi.replace(/\W/g,'_'));
  if (noteCount) noteCount.textContent = DATA.notes[_modalDsi].length;
  apiPost({ action:'addNote', dsi:_modalDsi, noteText:text, noteType:noteType, authorEmail:SESSION.email, authorName:SESSION.name||SESSION.email })
    .then(function() { input.disabled = false; })
    .catch(function() { input.disabled = false; });
}

// ── CALL TABLE ────────────────────────────────────────────────────────────
var _tabOrders = [], _sortTblId = '', _sortState = { col: null, dir: 1 };
var _activeFilters = { products: [], statuses: [], dateFrom: '', dateTo: '' };

function _applyView() {
  var result = _tabOrders.filter(function(o) {
    if (_activeFilters.products.length) {
      var pk = Object.keys(o.productCounts||{}).map(function(k){ return k.toLowerCase(); });
      if (!_activeFilters.products.some(function(p){ return pk.indexOf(p.toLowerCase()) !== -1; })) return false;
    }
    if (_activeFilters.statuses.length) {
      var sk = Object.keys(o.statusCounts||{}).map(function(k){ return k.toLowerCase(); });
      if (!_activeFilters.statuses.some(function(s){ return sk.indexOf(s.toLowerCase()) !== -1; })) return false;
    }
    if (_activeFilters.dateFrom && o.orderDate < _activeFilters.dateFrom) return false;
    if (_activeFilters.dateTo   && o.orderDate > _activeFilters.dateTo)   return false;
    return true;
  });
  if (_sortState.col) {
    var col = _sortState.col;
    result.sort(function(a, b) {
      var va, vb;
      if      (col==='rep')     { va=(a.rep||'').toLowerCase();                      vb=(b.rep||'').toLowerCase(); }
      else if (col==='dsi')     { va=a.dsi||'';                                      vb=b.dsi||''; }
      else if (col==='date')    { va=a.orderDate||'';                                vb=b.orderDate||''; }
      else if (col==='product') { va=Object.keys(a.productCounts||{}).sort()[0]||''; vb=Object.keys(b.productCounts||{}).sort()[0]||''; }
      else if (col==='status')  { va=Object.keys(a.statusCounts||{}).sort()[0]||''; vb=Object.keys(b.statusCounts||{}).sort()[0]||''; }
      else return 0;
      return va<vb ? -_sortState.dir : va>vb ? _sortState.dir : 0;
    });
  }
  var tbody = document.querySelector('#'+_sortTblId+' tbody');
  if (tbody) tbody.innerHTML = callTableRows(result, null);
  var inp = document.getElementById('f-'+_sortTblId.replace('-table',''));
  if (inp && inp.value) {
    var q = inp.value.toLowerCase();
    Array.from(document.querySelectorAll('#'+_sortTblId+' tbody tr')).forEach(function(tr) {
      tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }
}

function sortCallTable(col) {
  _sortState.dir = _sortState.col === col ? -_sortState.dir : 1;
  _sortState.col = col;
  _applyView();
  var labels = { rep:'Name', dsi:'DSI', date:'Date', product:'Product', status:'Status' };
  document.querySelectorAll('#'+_sortTblId+' th[data-col]').forEach(function(th) {
    th.textContent = (labels[th.dataset.col]||th.dataset.col) + (th.dataset.col===col ? (_sortState.dir===1?' ↑':' ↓') : '');
  });
}

function toggleDd(id, event) {
  if (event) event.stopPropagation();
  var panel = document.querySelector('#'+id+' .dd-panel');
  var wasOpen = panel.classList.contains('open');
  document.querySelectorAll('.dd-panel.open').forEach(function(p){ p.classList.remove('open'); });
  if (!wasOpen) panel.classList.add('open');
}

function applyCallFilters() {
  _activeFilters.products = [];
  _activeFilters.statuses = [];
  document.querySelectorAll('#ddp-product input:checked').forEach(function(cb){ _activeFilters.products.push(cb.value); });
  document.querySelectorAll('#ddp-status input:checked').forEach(function(cb){ _activeFilters.statuses.push(cb.value); });
  var fe = document.getElementById('f-date-from'), te = document.getElementById('f-date-to');
  _activeFilters.dateFrom = fe ? fe.value : '';
  _activeFilters.dateTo   = te ? te.value : '';
  _applyView();
  var pb = document.querySelector('#dd-product .dd-btn');
  if (pb) pb.textContent = (_activeFilters.products.length ? 'Product ('+_activeFilters.products.length+')' : 'Product') + ' ▾';
  var sb = document.querySelector('#dd-status .dd-btn');
  if (sb) sb.textContent = (_activeFilters.statuses.length ? 'Status ('+_activeFilters.statuses.length+')' : 'Status') + ' ▾';
}

function clearCallFilters() {
  _activeFilters = { products: [], statuses: [], dateFrom: '', dateTo: '' };
  document.querySelectorAll('#ddp-product input, #ddp-status input').forEach(function(cb){ cb.checked = false; });
  var fe = document.getElementById('f-date-from'); if (fe) fe.value = '';
  var te = document.getElementById('f-date-to');   if (te) te.value = '';
  var se = document.getElementById('f-'+_sortTblId.replace('-table','')); if (se) se.value = '';
  var pb = document.querySelector('#dd-product .dd-btn'); if (pb) pb.textContent = 'Product ▾';
  var sb = document.querySelector('#dd-status .dd-btn');  if (sb) sb.textContent = 'Status ▾';
  _applyView();
}

function _buildFilterRow(searchId) {
  var products = {}, statuses = {};
  _tabOrders.forEach(function(o) {
    Object.keys(o.productCounts||{}).forEach(function(k){ products[k]=true; });
    Object.keys(o.statusCounts||{}).forEach(function(k){ statuses[k]=true; });
  });
  function ddHtml(ddId, label, items) {
    return '<div class="dd-filter" id="dd-'+ddId+'">' +
      '<button class="dd-btn" onclick="toggleDd(\'dd-'+ddId+'\',event)">'+label+' ▾</button>' +
      '<div class="dd-panel" id="ddp-'+ddId+'">' +
      items.map(function(v){ return '<label><input type="checkbox" value="'+esc(v)+'" onchange="applyCallFilters()"> '+esc(v)+'</label>'; }).join('') +
      '</div></div>';
  }
  return '<div class="filter-row">' +
    '<input id="'+searchId+'" placeholder="Search rep, DSI…">' +
    ddHtml('product','Product',Object.keys(products).sort()) +
    ddHtml('status','Status',Object.keys(statuses).sort()) +
    '<div class="date-filter-wrap"><span>From</span><input type="date" id="f-date-from" onchange="applyCallFilters()"><span>To</span><input type="date" id="f-date-to" onchange="applyCallFilters()"></div>' +
    '<button class="clear-filters-btn" onclick="clearCallFilters()">Clear</button>' +
    '</div>';
}

function callTableRows(orders, extraColFn) {
  return orders.map(function(o) {
    var dsi = o.dsi || '';
    var safeId = dsi.replace(/\W/g,'_');
    var noteCount = ((DATA.notes||{})[dsi]||[]).length;

      '<td><span class="dsi-link" onclick="clickDsi(\''+esc(dsi)+'\')">'+esc(dsi)+'</span></td>' +
      '<td>'+esc(o.orderDate)+'</td>' +

      extra +
      '<td>'+statusBreakdown(o.statusCounts)+'</td>' +
      '<td>' + ratingPill(dsi, safeId) + '</td>' +
      '<td>' +
        '<button class="notes-btn" onclick="openNotesModal(\''+esc(dsi)+'\',\''+esc(o.spe)+'\',\''+esc(o.rep)+'\')">NOTES' +
        (noteCount>0?'<span style="margin-left:5px;background:var(--blue2);color:#fff;border-radius:8px;padding:1px 6px;font-size:.68rem">'+noteCount+'</span>':'') +

function _sortHeaders(tblId) {
  var cols = [['rep','Name'],['dsi','DSI'],['date','Date'],['product','Product'],['status','Status']];
  return cols.map(function(c) {
    return '<th class="sort-th" data-col="'+c[0]+'" onclick="sortCallTable(\''+c[0]+'\')">'+c[1]+'</th>';

function renderCallTable(orders, title, emptyMsg) {
  if (!orders.length) return noData(emptyMsg);

}


// ── ORDER LOOKUP — call list data first, AOR as fallback ─────────────────
function buildOrderLookup() {
  var map = {};
  (DATA.masterTracker||[]).concat(DATA.completedOrders||[]).concat(DATA.dayAfterOrders||[]).concat(DATA.deliveredOrders||[]).concat(DATA.orderIssues||[]).forEach(function(o) {
    if (o.dsi && !map[o.dsi]) map[o.dsi] = o;
  });
  (DATA.aorData||[]).forEach(function(r) {
    var d = r['sp.SPM Number']; if (!d || map[d]) return;
    map[d] = { dsi:d, rep:r['Rep']||'—', spe:r['Customer Name']||'', productType:r['Product Type (Broken out lvl 2)']||'', orderDate:r['sp.Order Date (copy)']||'', dtrStatus:r['DTR Status (enriched)']||'' };
  });
  return map;
}

  return '<div class="field"><label>Name</label><input type="text" id="pf-name" value="'+esc(p.name||'')+'" style="width:100%;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px"></div>' +
    '<div class="field"><label>Email</label><input type="email" id="pf-email" value="'+esc(email||'')+'"'+(isEdit?' readonly style="width:100%;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px;background:#1e1e1e"':' style="width:100%;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px"')+'></div>' +
    '<div class="field"><label>Role'+lockedNote+'</label><select id="pf-role"'+(canEditRolePerms?'':' disabled')+' style="width:100%;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px'+(canEditRolePerms?'':';background:#1e1e1e;color:#999')+'">'+ roleOpts+'</select></div>' +
    '<div class="field"><label>Team</label><input type="text" id="pf-team" value="'+esc(p.team||'')+'" style="width:100%;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px"></div>' +
    '<div class="field"><label>Tableau Name</label><select id="pf-tableau" style="width:100%;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px">'+tableauOpts+'</select></div>' +
    '<div class="field"><label>Office Permissions'+lockedNote+'</label><div id="pf-perms" style="padding:8px;border:1.5px solid #3a3a3a;border-radius:6px'+(canEditRolePerms?'':';background:#1e1e1e')+'">'+ officeChecks+'</div></div>' +
    '<div class="field"><label>Status</label><select id="pf-status" style="width:100%;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px"><option value="false"'+(p.deactivated?'':' selected')+'>Active</option><option value="true"'+(p.deactivated?' selected':'')+'>Inactive</option></select></div>' +
    '<div class="nm-actions">' +
    '<button class="nm-add-btn" onclick="savePerson('+(isEdit?'\''+esc(email)+'\'':'null')+')">SAVE</button>' +
    '<button class="nm-close-btn" onclick="closeModal()">CANCEL</button>' +
    '</div>';
}

function openAddPersonModal() {
  document.getElementById('modal-title').innerHTML = '<div class="nm-dsi">Add Person</div>';
  document.getElementById('modal-body').innerHTML = buildPersonForm(null, null);
  document.getElementById('detail-modal').classList.add('open');
}

function openEditPersonModal(email) {
  var person = (DATA.roster||{})[email]; if (!person) return;
  document.getElementById('modal-title').innerHTML = '<div class="nm-dsi">Edit Person</div><div class="nm-sub">'+esc(email)+'</div>';
  document.getElementById('modal-body').innerHTML = buildPersonForm(email, person);
  document.getElementById('detail-modal').classList.add('open');
}

function savePerson(existingEmail) {
  var name = document.getElementById('pf-name').value.trim();
  var email = document.getElementById('pf-email').value.trim().toLowerCase();
  var team = document.getElementById('pf-team').value.trim();
  var tableauName = document.getElementById('pf-tableau').value;
  var deactivated = document.getElementById('pf-status').value === 'true';
  var canEditRolePerms = SESSION.role === 'master-admin' || SESSION.role === 'owner';
  var existing = existingEmail ? ((DATA.roster||{})[existingEmail] || {}) : {};
  var role = canEditRolePerms ? document.getElementById('pf-role').value : (existing.rank || 'rep');
  var checked = document.querySelectorAll('#pf-perms input[type=checkbox]:checked');
  var permissions = canEditRolePerms
    ? (Array.from(checked).map(function(cb){ return cb.value; }).join(',') || CFG.officeId)
    : (existing.permissions || CFG.officeId);
  if (!email) { alert('Email is required.'); return; }
  var body = { name:name, rank:role, team:team, tableauName:tableauName, permissions:permissions, deactivated:deactivated };
  if (existingEmail) {
    body.action = 'updateRosterEntry'; body.email = existingEmail;
  } else {
    body.action = 'addRosterEntry'; body.email = email;
  }
  apiPost(body).then(function(res) {
    if (res.ok) { closeModal(); refreshData(); }
    else alert(res.error || 'Save failed.');
  }).catch(function(){ alert('Connection error.'); });
}

function deletePerson(email) {
  if (!confirm('Remove ' + email + ' from the roster? This cannot be undone.')) return;
  apiPost({ action:'deleteRosterEntry', email:email }).then(function(res) {
    if (res.ok) refreshData(); else alert(res.error||'Delete failed.');
  });
}

function noData(msg) {
  return '<div class="card"><div class="card-body"><div class="empty">'+esc(msg)+'</div></div></div>';
}

// ── LIVE FILTER BINDING ───────────────────────────────────────────────────
function bindFilters() {
  document.querySelectorAll('[id^="f-"]').forEach(function(input) {
    input.addEventListener('input', function() {
      var tblId = input.id.replace('f-','') + '-table';
      var tbl = document.getElementById(tblId);
      if (!tbl) return;
      var q = input.value.toLowerCase();
      Array.from(tbl.querySelectorAll('tbody tr')).forEach(function(tr) {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function closeModal() { document.getElementById('detail-modal').classList.remove('open'); }
document.getElementById('detail-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ── BOOT ─────────────────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  var panel = document.getElementById('office-dd-panel');
  if (panel) panel.classList.remove('open');
  if (!e.target.closest || !e.target.closest('.dd-filter')) {
    document.querySelectorAll('.dd-panel.open').forEach(function(p){ p.classList.remove('open'); });
  }
});
initLogin();
</script>
