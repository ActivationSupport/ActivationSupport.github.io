function _tmBuildList() {
  var teams  = DATA.teams  || {};
  var roster = DATA.roster || {};
  var role = SESSION.role;
  var canManage = ['master-admin','owner','admin','manager'].indexOf(role) !== -1;
  var teamArr = Object.keys(teams).map(function(k){ return teams[k]; });
  teamArr.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });

  // Member counts
  var memberCounts = {};
  Object.keys(roster).forEach(function(email) {
    var r = roster[email]; if (r.deactivated) return;
    Object.keys(teams).forEach(function(tid) {
      if (teams[tid].name === r.team) memberCounts[tid] = (memberCounts[tid]||0)+1;
    });
  });

  // This-week units per team
  var weekUnits = {};
  var ws = _lstWeekStart(); var DAY_MS = 86400000;
  (_LST_SALES||[]).forEach(function(s) {
    if (!s.dateOfSale) return;
    var d = new Date(s.dateOfSale+'T12:00:00'); d.setHours(0,0,0,0);
    if (d < ws) return;
    var r = roster[s.repEmail]; if (!r) return;
    Object.keys(teams).forEach(function(tid) {
      if (teams[tid].name === r.team) weekUnits[tid] = (weekUnits[tid]||0)+(Number(s.units)||0);
    });
  });

  var createBtn = canManage ? '<button class="refresh-btn" style="margin-left:8px" onclick="openCreateTeamModal()">+ Create Team</button>' : '';

  if (!teamArr.length) {
    return '<div class="card"><div class="card-body">' +
      '<div class="tm-header"><div><div class="tm-title">Teams</div><div class="tm-count">0 teams</div></div>'+createBtn+'</div>' +
      '<hr class="tm-hr"><div class="empty">No teams yet.'+(canManage?' Click &ldquo;+ Create Team&rdquo; to get started.':'')+' </div>' +
      '</div></div>';
  }

  var rows = teamArr.map(function(team) {
    var leader = team.leaderId ? (roster[team.leaderId]||{}) : {};
    var leaderName = leader.name || team.leaderId || '—';
    var leaderRole = leader.rank ? (_ROLE_LABELS[leader.rank]||leader.rank) : '';
    var cnt  = memberCounts[team.teamId]||0;
    var units = weekUnits[team.teamId]||0;
    var uColor = units>=10?'#4ade80':units>=5?'#fbbf24':units>0?'#94a3b8':'#6b7280';
    var parent = team.parentId && teams[team.parentId] ? '<span class="tm-parent-tag">↳ '+esc(teams[team.parentId].name)+'</span>' : '';
    var acts = canManage ?
      '<td class="tm-act-cell"><button class="tm-btn-edit" onclick="openEditTeamModal(\''+esc(team.teamId)+'\')">EDIT</button><button class="tm-btn-del" onclick="_tmDelete(\''+esc(team.teamId)+'\',\''+esc(team.name)+'\')">DEL</button></td>' :
      '<td></td>';
    return '<tr>' +
      '<td class="tm-name-cell"><span class="tm-emoji-col">'+(team.emoji||'👥')+'</span><button class="tm-name-link" onclick="_tmShowDetail(\''+esc(team.teamId)+'\')">'+esc(team.name)+'</button>'+parent+'</td>' +
      '<td class="tm-leader-cell">'+esc(leaderName)+(leaderRole?' <span class="tm-role-tag">('+esc(leaderRole)+')</span>':'')+'</td>' +
      '<td class="tm-num-cell">'+cnt+'</td>' +
      '<td class="tm-num-cell"><span style="color:'+uColor+';font-weight:700">'+units+'</span></td>' +
      acts+'</tr>';
  }).join('');

  return '<div class="card"><div class="card-body">' +
    '<div class="tm-header"><div><div class="tm-title">Teams</div><div class="tm-count">'+teamArr.length+' team'+(teamArr.length!==1?'s':'')+'</div></div>'+createBtn+'</div>' +
    '<hr class="tm-hr">' +
    '<div class="tbl-wrap"><table class="tm-table"><thead><tr>' +
    '<th>TEAM</th><th>LEADER</th><th>MEMBERS</th><th>UNITS (WK)</th>'+(canManage?'<th>ACTIONS</th>':'') +
    '</tr></thead><tbody>'+rows+'</tbody></table></div>' +
    '</div></div>';
}

function _tmShowDetail(teamId) {
  _TM_VIEW = 'detail'; _TM_DETAIL_ID = teamId; _TM_LDR_VIEW = 'days';
  document.getElementById('main-content').innerHTML = _tmBuildDetail(teamId);
}

function _tmBackToList() {
  _TM_VIEW = 'list'; _TM_DETAIL_ID = null;
  document.getElementById('main-content').innerHTML = _tmBuildList();
}

function _tmSetLdrView(v) {
  _TM_LDR_VIEW = v;
  var t1 = document.getElementById('tm-ldr-days-btn');
  var t2 = document.getElementById('tm-ldr-weeks-btn');
  if (t1) { t1.className = 'lst-toggle-btn'+(v==='days'?' active':''); }
  if (t2) { t2.className = 'lst-toggle-btn'+(v==='weeks'?' active':''); }
  var wrap = document.getElementById('tm-ldr-wrap');
  if (wrap) wrap.innerHTML = _tmLdrTable(_TM_DETAIL_ID);
}

function _tmBuildDetail(teamId) {
  var teams = DATA.teams||{}; var team = teams[teamId];
  if (!team) return noData('Team not found.');
  var roster = DATA.roster||{};
  var DAY_MS = 86400000;

  // Members
  var memberEmails = Object.keys(roster).filter(function(e){ return !roster[e].deactivated && roster[e].team===team.name; });
  var memberTabs   = memberEmails.map(function(e){ return (roster[e].tableauName||'').toLowerCase(); }).filter(Boolean);

  // This-week + prior 4-week unit totals
  var ws = _lstWeekStart();
  var wkU=0, wkO=0, priorW=[0,0,0,0];
  (_LST_SALES||[]).forEach(function(s) {
    if (!s.dateOfSale||memberEmails.indexOf(s.repEmail)===-1) return;
    var d=new Date(s.dateOfSale+'T12:00:00'); d.setHours(0,0,0,0);
    var u=Number(s.units)||0;
    if (d>=ws){ wkU+=u; wkO++; }
    else {
      var daysAgo=Math.floor((ws.getTime()-d.getTime())/DAY_MS);
      var wi=Math.floor(daysAgo/7); if(wi>=0&&wi<=3) priorW[wi]+=u;
    }
  });
  var fourWkSum=(priorW[0]+priorW[1]+priorW[2]+priorW[3]);
  var fourWkAvg=fourWkSum/4;
  var vsPct=fourWkAvg>0?(wkU-fourWkAvg)/fourWkAvg*100:(wkU>0?100:0);
  var perRep=memberEmails.length>0?wkU/memberEmails.length:0;

  var trendLabel,trendCls;
  if      (vsPct>=20) { trendLabel='Strong upward trend'; trendCls='tm-trend-up'; }
  else if (vsPct>=5)  { trendLabel='Slight upward trend'; trendCls='tm-trend-up'; }
  else if (vsPct<=-20){ trendLabel='Declining trend';     trendCls='tm-trend-down'; }
  else if (vsPct<=-5) { trendLabel='Slight decline';      trendCls='tm-trend-down'; }
  else                { trendLabel='Steady performance';  trendCls='tm-trend-flat'; }

  // Line stats from masterTracker
  var teamLines=(DATA.masterTracker||[]).filter(function(l){ return memberTabs.indexOf((l.rep||'').toLowerCase())!==-1; });
  var tot=teamLines.length, act=0, post=0, can=0;
  teamLines.forEach(function(l){
    var s=(l.dtrStatus||'').toLowerCase();
    if(s==='active')act++; else if(s==='posted')post++; else if(s==='canceled')can++;
  });
  var pend=Math.max(0,tot-act-post-can);
  var pct=function(n){ return tot?Math.round(n/tot*100):0; };

  // Churn data
  var churnRows=(DATA.churnReport||[]).filter(function(r){ return memberTabs.indexOf((r.rep||'').toLowerCase())!==-1; });
  var churnBuilt=_buildChurnRepMap(churnRows,'');
  var acts0=0,dis0=0;
  churnBuilt.repList.forEach(function(rep){ var d=churnBuilt.repMap[rep]['0-30 Day']; if(d){acts0+=d.activated;dis0+=d.disconnects;} });
  var projDisco=acts0>0?Math.round(dis0/acts0*100):0;

  var vsColor=vsPct>=0?'color:#4ade80':'color:#f87171';
  var vsSign=vsPct>=0?'↑':'↓';

  var hdr = '<div class="tm-back" onclick="_tmBackToList()">← Teams</div>' +
    '<div class="tm-detail-hdr"><span class="tm-detail-em">'+(team.emoji||'👥')+'</span><span class="tm-detail-nm">'+esc(team.name)+'</span></div>';

  var breakdown = '<div class="tm-section-label">TEAM BREAKDOWN</div>' +
    '<div class="tm-breakdown-row">' +
    '<div class="tm-remarks-card '+trendCls+'">' +
    '<div class="tm-remarks-label">REMARKS</div>' +
    '<div class="tm-remarks-trend">'+esc(trendLabel)+'</div>' +
    '<div class="tm-remarks-sub">Team Avg: '+perRep.toFixed(1)+' · 4Wk Total: '+fourWkSum+'</div>' +
    '</div>' +
    '<div class="tm-stat-pill"><span style="'+vsColor+';font-size:1.3rem;font-weight:800">'+vsSign+Math.abs(vsPct).toFixed(1)+'%</span><div class="tm-stat-lbl">VS 4WK AVG</div></div>' +
    '<div class="tm-stat-pill"><span class="tm-stat-val">'+pct(act+post)+'%</span><div class="tm-stat-lbl">ACTIVE %</div></div>' +
    '<div class="tm-stat-pill"><span class="tm-stat-val" style="color:#fbbf24">'+pct(pend)+'%</span><div class="tm-stat-lbl">PENDING %</div></div>' +
    '<div class="tm-stat-pill"><span class="tm-stat-val" style="color:#f87171">'+pct(can)+'%</span><div class="tm-stat-lbl">CANCEL %</div></div>' +
    '<div class="tm-stat-pill"><span class="tm-stat-val" style="color:#f87171">'+projDisco+'%</span><div class="tm-stat-lbl">PROJ. DISCO %</div></div>' +
    '</div>';

  var churnSec = '<div class="tm-section-label">CHURN BUCKETS</div><div class="tm-churn-row">' +
    _tmChurnBucket(churnBuilt,'0-30 Day')+_tmChurnBucket(churnBuilt,'30 Day')+
    _tmChurnBucket(churnBuilt,'60 Day')+_tmChurnBucket(churnBuilt,'90 Day')+
    _tmChurnBucket(churnBuilt,'120 Day')+'</div>';

  var ldrSec = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
    '<div class="tm-section-label" style="margin:0;border:none">TEAM LEADERBOARD</div>' +
    '<div class="lst-toggle-row">' +
    '<button id="tm-ldr-days-btn" class="lst-toggle-btn'+(_TM_LDR_VIEW==='days'?' active':'')+'" onclick="_tmSetLdrView(\'days\')">DAYS</button>' +
    '<button id="tm-ldr-weeks-btn" class="lst-toggle-btn'+(_TM_LDR_VIEW==='weeks'?' active':'')+'" onclick="_tmSetLdrView(\'weeks\')">WEEKS</button>' +
    '</div></div>' +
    '<div id="tm-ldr-wrap">'+_tmLdrTable(teamId)+'</div>';

  return hdr+'<div class="card"><div class="card-body">'+breakdown+churnSec+ldrSec+'</div></div>';
}

function _tmChurnBucket(built, bucket) {
  var acts=0,dis=0;
  built.repList.forEach(function(rep){ var d=built.repMap[rep][bucket]; if(d){acts+=d.activated;dis+=d.disconnects;} });
  var rate=acts>0?dis/acts*100:0;
  var cls;
  if (!acts) { cls='tm-bkt-grey'; }
  else {
    var threshG,threshY;
    if      (bucket==='0-30 Day') { threshG=2.4;  threshY=3.0; }
    else if (bucket==='30 Day')   { threshG=4.9;  threshY=6.9; }
    else if (bucket==='60 Day')   { threshG=8.9;  threshY=9.9; }
    else if (bucket==='90 Day')   { threshG=10.9; threshY=13.9; }
    else                           { threshG=13.9; threshY=17.9; }
    cls = rate<=threshG?'tm-bkt-green':rate<=threshY?'tm-bkt-yellow':'tm-bkt-red';
  }
  return '<div class="tm-churn-bkt '+cls+'">' +
    '<div class="tm-bkt-label">'+esc(bucket)+'</div>' +
    '<div class="tm-bkt-rate">'+(acts?rate.toFixed(1)+'%':'—')+'</div>' +
    '<div class="tm-bkt-sub">'+(acts?'('+dis+'/'+acts+')':'No data')+'</div>' +
    '</div>';
}

function _tmLdrTable(teamId) {
  var teams=DATA.teams||{}; var team=teams[teamId]; if(!team) return '';
  var roster=DATA.roster||{};
  var emails=Object.keys(roster).filter(function(e){ return !roster[e].deactivated&&roster[e].team===team.name; });
  return _TM_LDR_VIEW==='days' ? _tmLdrDays(emails,roster) : _tmLdrWeeks(emails,roster);
}

function _tmLdrDays(emails, roster) {
  var ws=_lstWeekStart(); var DAY_MS=86400000;
  var today=new Date(); today.setHours(0,0,0,0);
  var todayIdx=Math.min(6,Math.floor((today.getTime()-ws.getTime())/DAY_MS));
  var days=['MON','TUE','WED','THU','FRI','SAT','SUN'];

  var agg={};
  emails.forEach(function(e){ var r=roster[e]; agg[e]={name:r.name||e,rank:r.rank||'client-rep',days:[0,1,2,3,4,5,6].map(function(){ return {o:0,u:0}; })}; });
  (_LST_SALES||[]).forEach(function(s){
    if(!s.dateOfSale||!agg[s.repEmail]) return;
    var d=new Date(s.dateOfSale+'T12:00:00'); d.setHours(0,0,0,0); if(d<ws) return;
    var idx=Math.floor((d.getTime()-ws.getTime())/DAY_MS); if(idx<0||idx>6) return;
    agg[s.repEmail].days[idx].o++; agg[s.repEmail].days[idx].u+=Number(s.units)||0;
  });
  var sorted=emails.slice().sort(function(a,b){
    var au=agg[a].days.reduce(function(s,d){return s+d.u;},0);
    var bu=agg[b].days.reduce(function(s,d){return s+d.u;},0);
    return bu-au;
  });
  var totDays=[0,1,2,3,4,5,6].map(function(i){ var o=0,u=0; emails.forEach(function(e){o+=agg[e].days[i].o;u+=agg[e].days[i].u;}); return {o:o,u:u}; });

  function uCls(u,past){ if(!past)return 'lst-u-grey'; return u>=3?'lst-u-green':u===2?'lst-u-yellow':u===1?'lst-u-orange':'lst-u-red'; }

  var hdCols=days.map(function(d,i){ return '<th colspan="2" class="tm-day-hdr">'+d+'</th>'; }).join('');
  var subCols=days.map(function(){ return '<th class="tm-sub-hdr">ORD</th><th class="tm-sub-hdr">UNITS</th>'; }).join('');

  var repRows=sorted.map(function(e,idx){
    var a=agg[e];
    var dayCells=a.days.map(function(day,i){
      var past=i<=todayIdx;
      return '<td class="tm-day-cell">'+(past?day.o:'—')+'</td>' +
             '<td class="tm-day-cell tm-unit-cell '+uCls(day.u,past)+'">'+(past?day.u:'—')+'</td>';
    }).join('');
    return '<tr><td class="tm-ldr-rank">'+(idx+1)+'</td>' +
      '<td class="tm-ldr-name-cell"><span class="tm-ldr-name" onclick="_lstShowRepProfile(\''+esc(e)+'\')">'+esc(a.name)+'</span>' +
      '<div class="lst-rep-role">'+esc(_LST_RNKL[a.rank]||a.rank)+'</div></td>'+dayCells+'</tr>';
  }).join('');

  var totCells=totDays.map(function(day,i){ var past=i<=todayIdx; return '<td class="tm-day-cell"><b>'+(past?day.o:'—')+'</b></td><td class="tm-day-cell tm-unit-cell"><b>'+(past?day.u:'—')+'</b></td>'; }).join('');
  var totRow='<tr class="tm-total-row"><td></td><td class="tm-ldr-name-cell" style="font-weight:700;font-size:.8rem">TEAM TOTAL</td>'+totCells+'</tr>';

  return '<div class="tbl-wrap"><table class="tm-ldr-table"><thead><tr><th></th><th>NAME</th>'+hdCols+'</tr><tr><th></th><th></th>'+subCols+'</tr></thead><tbody>'+repRows+totRow+'</tbody></table></div>';
}

function _tmLdrWeeks(emails, roster) {
  var ws=_lstWeekStart(); var DAY_MS=86400000;
  var WK=['This Wk','Last Wk','2 Wks Ago','3 Wks Ago'];
  var agg={};
  emails.forEach(function(e){ var r=roster[e]; agg[e]={name:r.name||e,rank:r.rank||'client-rep',wks:[{o:0,u:0},{o:0,u:0},{o:0,u:0},{o:0,u:0}]}; });
  (_LST_SALES||[]).forEach(function(s){
    if(!s.dateOfSale||!agg[s.repEmail]) return;
    var d=new Date(s.dateOfSale+'T12:00:00'); d.setHours(0,0,0,0);
    var wi=d>=ws?0:Math.floor((ws.getTime()-d.getTime())/DAY_MS/7)+1;
    if(wi<0||wi>3) return;
    agg[s.repEmail].wks[wi].o++; agg[s.repEmail].wks[wi].u+=Number(s.units)||0;
  });
  var sorted=emails.slice().sort(function(a,b){ return agg[b].wks[0].u-agg[a].wks[0].u||agg[b].wks[0].o-agg[a].wks[0].o; });
  var totWks=[0,1,2,3].map(function(w){ var o=0,u=0; emails.forEach(function(e){o+=agg[e].wks[w].o;u+=agg[e].wks[w].u;}); return {o:o,u:u}; });

  var hdCols=WK.map(function(l){ return '<th colspan="2" class="tm-day-hdr">'+l+'</th>'; }).join('');
  var subCols=WK.map(function(){ return '<th class="tm-sub-hdr">ORD</th><th class="tm-sub-hdr">UNITS</th>'; }).join('');
  var repRows=sorted.map(function(e,idx){
    var a=agg[e];
    var wkCells=a.wks.map(function(wk){ return '<td class="tm-day-cell">'+wk.o+'</td><td class="tm-day-cell">'+wk.u+'</td>'; }).join('');
    return '<tr><td class="tm-ldr-rank">'+(idx+1)+'</td>' +
      '<td class="tm-ldr-name-cell"><span class="tm-ldr-name" onclick="_lstShowRepProfile(\''+esc(e)+'\')">'+esc(a.name)+'</span>' +
      '<div class="lst-rep-role">'+esc(_LST_RNKL[a.rank]||a.rank)+'</div></td>'+wkCells+'</tr>';
  }).join('');
  var totCells=totWks.map(function(wk){ return '<td class="tm-day-cell"><b>'+wk.o+'</b></td><td class="tm-day-cell"><b>'+wk.u+'</b></td>'; }).join('');
  var totRow='<tr class="tm-total-row"><td></td><td class="tm-ldr-name-cell" style="font-weight:700;font-size:.8rem">TEAM TOTAL</td>'+totCells+'</tr>';

  return '<div class="tbl-wrap"><table class="tm-ldr-table"><thead><tr><th></th><th>NAME</th>'+hdCols+'</tr><tr><th></th><th></th>'+subCols+'</tr></thead><tbody>'+repRows+totRow+'</tbody></table></div>';
}

function _tmBuildForm(teamId) {
  var teams=DATA.teams||{}; var roster=DATA.roster||{};
  var team=teamId?(teams[teamId]||{}):{};
  var fs='width:100%;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px;background:#1a1a2a;color:var(--text)';
  var ldrRoles=['master-admin','owner','admin','manager','jd','leader'];
  var leaderOpts='<option value="">— No Leader —</option>'+
    Object.keys(roster).filter(function(e){ return ldrRoles.indexOf(roster[e].rank)!==-1&&!roster[e].deactivated; })
      .sort(function(a,b){ return (roster[a].name||'').localeCompare(roster[b].name||''); })
      .map(function(e){ var r=roster[e]; return '<option value="'+esc(e)+'"'+(team.leaderId===e?' selected':'')+'>'+esc(r.name||e)+' ('+esc(_ROLE_LABELS[r.rank]||r.rank)+')</option>'; }).join('');

    Object.keys(teams).filter(function(tid){ return tid!==teamId; })
      .sort(function(a,b){ return (teams[a].name||'').localeCompare(teams[b].name||''); })
      .map(function(tid){ return '<option value="'+esc(tid)+'"'+(team.parentId===tid?' selected':'')+'>'+esc(teams[tid].name)+'</option>'; }).join('');
  var cur=team.emoji||'';
  var grid=_TM_EMOJIS.map(function(em){
    var sel=em===cur;
    return '<button type="button" onclick="_tmPickEmoji(\''+em+'\')" style="font-size:1.4rem;padding:4px 6px;background:'+(sel?'rgba(74,159,212,.15)':'transparent')+';border:1.5px solid '+(sel?'#4A9FD4':'transparent')+';border-radius:6px;cursor:pointer;transition:all .15s" data-emoji="'+em+'" title="'+em+'">'+em+'</button>';
  }).join('');
  return '<div class="field"><label>Team Name</label><input type="text" id="tm-f-name" value="'+esc(team.name||'')+'" placeholder="e.g. Aces" style="'+fs+'"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'+
    '<div class="field" style="margin:0"><label>Parent Team</label><select id="tm-f-parent" style="'+fs+'">'+parentOpts+'</select></div>'+
    '<div class="field" style="margin:0"><label>Leader</label><select id="tm-f-leader" style="'+fs+'">'+leaderOpts+'</select></div>'+
    '</div>'+
    '<div class="field"><label>Emoji</label>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'+
    '<div id="tm-emoji-preview" style="font-size:2rem;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#2c2c2c;border-radius:8px;border:1.5px solid #3a3a3a">'+(cur||'👥')+'</div>'+
    '<input type="text" id="tm-f-emoji" value="'+esc(cur)+'" placeholder="Type or paste emoji" oninput="_tmEmojiInput()" style="flex:1;padding:8px;border:1.5px solid #3a3a3a;border-radius:6px;background:#1a1a2a;color:var(--text);font-size:1.1rem">'+
    '</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:2px;max-height:160px;overflow-y:auto;padding:4px;background:#1a1a2a;border:1.5px solid #3a3a3a;border-radius:6px">'+grid+'</div>'+
    '</div>'+
    '<div class="nm-actions">'+
    '<button class="nm-add-btn" onclick="saveTeamModal(\''+esc(teamId||'')+'\')">SAVE</button>'+
    '<button class="nm-close-btn" onclick="closeModal()">CANCEL</button>'+
    '</div>';
}

function _tmPickEmoji(em) {
  var inp=document.getElementById('tm-f-emoji');
  var prev=document.getElementById('tm-emoji-preview');
  if(inp) inp.value=em; if(prev) prev.textContent=em;
  document.querySelectorAll('[data-emoji]').forEach(function(btn){
    var sel=btn.getAttribute('data-emoji')===em;
    btn.style.background=sel?'rgba(74,159,212,.15)':'transparent';
    btn.style.borderColor=sel?'#4A9FD4':'transparent';
  });
}

function _tmEmojiInput() {
  var val=(document.getElementById('tm-f-emoji')||{}).value||'';
  if(val.trim()){
    var prev=document.getElementById('tm-emoji-preview');
    if(prev) prev.textContent=val.trim();

function saveTeamModal(existingId) {
  var name=(document.getElementById('tm-f-name')||{}).value||''; name=name.trim();
  var emoji=(document.getElementById('tm-f-emoji')||{}).value||''; emoji=emoji.trim();
  var leaderId=(document.getElementById('tm-f-leader')||{}).value||'';
  var parentId=(document.getElementById('tm-f-parent')||{}).value||'';
  if(!name){ alert('Team name is required.'); return; }
  var body;
  if(existingId) {
    body={action:'updateTeam',teamId:existingId,name:name,emoji:emoji,leaderId:leaderId,parentId:parentId};
  } else {
    var tid=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')+'-'+Date.now().toString(36);
    body={action:'addTeam',teamId:tid,name:name,emoji:emoji,leaderId:leaderId,parentId:parentId};
  }
  apiPost(body).then(function(res){
    if(res.ok){ closeModal(); refreshData(); } else alert(res.error||'Save failed.');
  }).catch(function(){ alert('Connection error.'); });
}

function _tmDelete(teamId, name) {
  if(!confirm('Delete team "'+name+'"? This cannot be undone.')) return;
  apiPost({action:'deleteTeam',teamId:teamId}).then(function(res){
    if(res.ok) refreshData(); else alert(res.error||'Delete failed.');
  }).catch(function(){ alert('Connection error.'); });
}

// ── LIVE FILTER BINDING ───────────────────────────────────────────────────
function bindFilters() {
  document.querySelectorAll('[id^="f-"]').forEach(function(input) {
    input.addEventListener('input', function() {
      var tblId = input.id.replace('f-','') + '-table';
      var tbl = document.getElementById(tblId);
      if (!tbl) return;
      var q = input.value.toLowerCase();
      Array.from(tbl.querySelectorAll('tbody tr')).forEach(function(tr) {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
      if (tblId === 'ct-table') {
        var countEl = document.getElementById('ct-count');
        if (countEl) {
          var visible = Array.from(tbl.querySelectorAll('tbody tr')).filter(function(tr){ return tr.style.display !== 'none'; }).length;
          countEl.textContent = visible === _tabOrders.length
            ? 'Showing all ' + _tabOrders.length + ' orders'
            : 'Showing ' + visible + ' of ' + _tabOrders.length + ' orders';
        }
        _updateFilterBadge();
      }
    });
  });
}

function _psNotifyDiscord(payload, units) {
  var url = DISCORD_WEBHOOKS[CFG.officeId || ''];
  if (!url) return;
  var office = OFFICE_NAMES[CFG.officeId] || CFG.officeId || '';
  var prods = [];
  if (payload.airQty > 0)       prods.push('Air ×' + payload.airQty);
  if (payload.wirelessNew > 0)  prods.push('Wireless New ×' + payload.wirelessNew);
  if (payload.wirelessByod > 0) prods.push('Wireless BYOD ×' + payload.wirelessByod);
  if (payload.fiberPackage)     prods.push('Fiber (' + payload.fiberPackage + ')');
  if (payload.voipQty > 0)      prods.push('VoIP ×' + payload.voipQty);
  if (payload.dtvQty > 0)       prods.push('DTV (' + (payload.dtvPackage || '1') + ')');
  var body = {
    embeds: [{
      color: 0x4A9FD4,
      title: '🎉 New Sale Posted — ' + office,
      fields: [
        { name: '👤 Rep',      value: payload.repName || payload.repEmail, inline: true },
        { name: '📅 Date',     value: payload.dateOfSale || '—',           inline: true },
        { name: '✨ Units',    value: String(units),                        inline: true },
        { name: '📋 DSI',      value: payload.dsi || '—',                  inline: true },
        { name: '📦 Products', value: prods.length ? prods.join(', ') : '—', inline: false }
      ],
      footer: { text: office + ' Portal' },
      timestamp: new Date().toISOString()
    }]
  };
  if (payload.notes) body.embeds[0].fields.push({ name: '📝 Notes', value: payload.notes, inline: false });
  fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
    .catch(function() { /* silent — Discord notification is best-effort */ });
}

function _psSubmit(btn) {
  btn.disabled = true; btn.textContent = 'Submitting...';
  var d = _PS_DATA;
  var traineeName = '';
  if (d.trainee==='Yes'&&d.traineeName) traineeName=(DATA.roster&&DATA.roster[d.traineeName])?DATA.roster[d.traineeName].name:d.traineeName;
  var payload = {
    action:'postSale', key:API_KEY, officeId:CFG.officeId,
    repEmail:SESSION.email, repName:SESSION.name||'',
    dateOfSale:d.dateOfSale, dsi:d.dsi,
    accountType:d.accountType, processedVia:d.processedVia,
    underSomeoneCodes:d.underSomeoneCodes, codesUsedBy:d.codesUsedBy,
    trainee:d.trainee, traineeName:traineeName,
    airQty:d.products.air?1:0,
    wirelessNew:d.wirelessNew||0, wirelessByod:d.wirelessByod||0,
    fiberPackage:d.products.fiber?d.fiberPackage:'',
    fiberInstallDate:d.products.fiber?d.fiberInstallDate:'',
    voipQty:d.products.voip?(d.voipQty||0):0,
    dtvQty:d.products.dtv?1:0,
    dtvPackage:d.products.dtv?d.dtvPackage:'',
    notes:d.notes
  };
  apiPost(payload).then(function(res) {
    if (res&&res.ok) {
      _PS_STEP=4;
      document.getElementById('main-content').innerHTML=renderPostSale();
      _psNotifyDiscord(payload, _psCalcUnits());
    }
    else { btn.disabled=false; btn.textContent='SUBMIT'; alert('Error: '+(res&&res.error?res.error:'Unknown error')); }
  }).catch(function(){ btn.disabled=false; btn.textContent='SUBMIT'; alert('Submission failed. Please try again.'); });
}

}

function _lstUCls(n) {
  return n === 0 ? 'lst-u-red' : n <= 2 ? 'lst-u-orange' : n <= 5 ? 'lst-u-yellow' : 'lst-u-green';
}

var _LST_SKIP_UNLESS_SOLD = ['master-admin','owner','admin','activator','manager','jd'];

function _lstAgg(sales, roster) {
  var ws = _lstWeekStart(), DAY = 86400000, agg = {};
  Object.keys(roster || {}).forEach(function(e) {
    var r = roster[e];
    if (r.deactivated) return;
    if (_LST_SKIP_UNLESS_SOLD.indexOf(r.rank) !== -1) return;
    agg[e] = {
      name: r.name || e, team: r.team || '', rank: r.rank || 'client-rep',
      orders: 0, units: 0,
      days: [0,1,2,3,4,5,6].map(function() { return { orders: 0, units: 0 }; })
    };
  });
  (sales || []).forEach(function(s) {
    if (!s.dateOfSale) return;
    var email = s.repEmail;
    if (!agg[email] && roster[email] && !roster[email].deactivated) {
      var r = roster[email];
      agg[email] = {
        name: r.name || email, team: r.team || '', rank: r.rank || 'client-rep',
        orders: 0, units: 0,
        days: [0,1,2,3,4,5,6].map(function() { return { orders: 0, units: 0 }; })
      };
    }
    if (!agg[email]) return;
    var sd = new Date(s.dateOfSale + 'T12:00:00'); sd.setHours(0,0,0,0);
    var diff = Math.floor((sd.getTime() - ws.getTime()) / DAY);
    if (diff < 0 || diff > 6) return;
    agg[email].orders++;
    agg[email].units += s.units || 0;
    agg[email].days[diff].orders++;
    agg[email].days[diff].units += s.units || 0;
  });
  return agg;
}

function _lstTeamAgg(repAgg, teams) {
  var tAgg = {};
  Object.keys(teams || {}).forEach(function(tid) {
    var t = teams[tid]; if (!t.name) return;
    tAgg[t.name] = { name: t.name, emoji: t.emoji || '', orders: 0, units: 0, members: 0 };
  });
  Object.keys(repAgg).forEach(function(e) {
    var r = repAgg[e]; if (!r.team) return;
    if (!tAgg[r.team]) tAgg[r.team] = { name: r.team, emoji: '', orders: 0, units: 0, members: 0 };
    tAgg[r.team].orders += r.orders;
    tAgg[r.team].units += r.units;
    tAgg[r.team].members++;
  });
  return tAgg;
}

function _lstBuild() {
  var roster = DATA.roster || {}, teams = DATA.teams || {};
  var repAgg = _lstAgg(_LST_SALES, roster);
  var tAgg = _lstTeamAgg(repAgg, teams);
  var todayIdx = _lstTodayIdx();

  var role = SESSION.role;
  var isTeamScoped = role === 'leader' || role === 'jd';
  var lstTeamName = '';
  var kpiTeamSet = null;
  if (isTeamScoped) {
    var lstTeam = _myTeam();
    if (lstTeam) {
      lstTeamName = lstTeam.name;
      var teamEmailSet = {};
      _teamEmails(lstTeamName).forEach(function(e) { teamEmailSet[e] = true; });
      kpiTeamSet = teamEmailSet;
      var filteredRepAgg = {};
      Object.keys(repAgg).forEach(function(e) {
        if (teamEmailSet[e]) filteredRepAgg[e] = repAgg[e];
      });
      repAgg = filteredRepAgg;
      var filteredTAgg = {};
      if (tAgg[lstTeamName]) filteredTAgg[lstTeamName] = tAgg[lstTeamName];
      tAgg = filteredTAgg;
    }
  }

  var all = Object.keys(repAgg).map(function(e) { return { email: e, d: repAgg[e] }; })
    .sort(function(a, b) { return b.d.units - a.d.units || b.d.orders - a.d.orders; });
  var leaders = all.filter(function(x) { return _LST_LDR_RANKS.indexOf(x.d.rank) !== -1; });
  var reps    = all.filter(function(x) { return _LST_LDR_RANKS.indexOf(x.d.rank) === -1; });
  var tArr = Object.keys(tAgg).map(function(k) { return tAgg[k]; })
    .sort(function(a, b) { return b.units - a.units || b.orders - a.orders; });

  var totOrd = all.reduce(function(s, x) { return s + x.d.orders; }, 0);
  var totUni = all.reduce(function(s, x) { return s + x.d.units; }, 0);

  var boardTitle = (isTeamScoped && lstTeamName) ? lstTeamName.toUpperCase() + ' LEADERBOARD' : 'OFFICE LEADERBOARD';

  return '<div class="lst-wrap">' +
    '<div class="lst-wb-bar"><button class="lst-wb-btn" onclick="openWallboard()">📺 Wallboard</button></div>' +
    _lstKpiCards(_LST_SALES, roster, _LST_VIEW, kpiTeamSet) +
    _lstTopPerf(all.slice(0, 3), tArr.slice(0, 3)) +
    _lstBoard(leaders, reps, tArr, todayIdx, boardTitle) +
    '</div>';
}

function _lstWeekBar(ord, uni) {
  return '<div class="lst-week-bar">' +
    '<div class="lst-week-stat"><div class="lst-wk-lbl">WEEK ORDERS</div><div class="lst-wk-num">' + ord + '</div></div>' +
    '<div class="lst-week-div"></div>' +
    '<div class="lst-week-stat"><div class="lst-wk-lbl">WEEK UNITS</div><div class="lst-wk-num blue">' + uni + '</div></div>' +
    '</div>';
}

// ── WALLBOARD / TV MODE ───────────────────────────────────────
// Full-screen, big-type, auto-cycling office display for a TV. Reuses the LST
// data (_LST_SALES), office-wide. Panels: This Week (KPIs) → Top Performers → Teams.
var _WB = { panel:0, timer:null, clock:null, n:3 };

function _wbData() {
  var roster=DATA.roster||{}, teams=DATA.teams||{};
  var repAgg=_lstAgg(_LST_SALES||[], roster);
  var tAgg=_lstTeamAgg(repAgg, teams);
  var all=Object.keys(repAgg).map(function(e){return {email:e,d:repAgg[e]};})
    .sort(function(a,b){return b.d.units-a.d.units||b.d.orders-a.d.orders;});
  var tArr=Object.keys(tAgg).map(function(k){return tAgg[k];})
    .sort(function(a,b){return b.units-a.units||b.orders-a.orders;});
  var totOrd=all.reduce(function(s,x){return s+x.d.orders;},0);
  var totUni=all.reduce(function(s,x){return s+x.d.units;},0);
  var sellers=all.filter(function(x){return x.d.orders>0;}).length;
  return {all:all,tArr:tArr,totOrd:totOrd,totUni:totUni,sellers:sellers};
}

function openWallboard() {
  var wb=document.getElementById('wallboard'); if(!wb) return;
  document.getElementById('wb-office').textContent=(CFG.officeId||'').toUpperCase();
  _WB.panel=0;
  wb.classList.remove('wb-hidden');
  _wbRender();
  _wbStartTimer();
  _wbTickClock(); _WB.clock=setInterval(_wbTickClock,1000);
  document.addEventListener('keydown', _wbKey);
  if(wb.requestFullscreen){ try{ wb.requestFullscreen(); }catch(e){} }
}
function closeWallboard() {
  var wb=document.getElementById('wallboard'); if(!wb) return;
  wb.classList.add('wb-hidden');
  if(_WB.timer){clearInterval(_WB.timer);_WB.timer=null;}
  if(_WB.clock){clearInterval(_WB.clock);_WB.clock=null;}
  document.removeEventListener('keydown', _wbKey);
  if(document.fullscreenElement){ try{ document.exitFullscreen(); }catch(e){} }
}
function _wbKey(e){ if(e.key==='Escape') closeWallboard(); else if(e.key==='ArrowRight') _wbGo(_WB.panel+1); else if(e.key==='ArrowLeft') _wbGo(_WB.panel-1); }
function _wbStartTimer(){ if(_WB.timer)clearInterval(_WB.timer); _WB.timer=setInterval(function(){ _wbGo(_WB.panel+1); },12000); }
function _wbGo(i){ _WB.panel=((i%_WB.n)+_WB.n)%_WB.n; _wbRender(); _wbStartTimer(); }
function _wbTickClock(){ var el=document.getElementById('wb-clock'); if(!el)return; var d=new Date(),h=d.getHours(),m=d.getMinutes(); el.textContent=((h%12)||12)+':'+String(m).padStart(2,'0')+' '+(h>=12?'PM':'AM'); }

function _wbHead(label){
  return '<div class="wb-row wb-head"><div class="wb-rank">#</div>'+
    '<div class="wb-name">'+label+'</div>'+
    '<div class="wb-ord">Orders</div>'+
    '<div class="wb-units">Units</div></div>';
}
function _wbRow(rank,name,orders,units){
  var medal = rank===0?'🥇':rank===1?'🥈':rank===2?'🥉':(rank+1);
  return '<div class="wb-row"><div class="wb-rank">'+medal+'</div>'+
    '<div class="wb-name">'+name+'</div>'+
    '<div class="wb-ord">'+orders+'</div>'+
    '<div class="wb-units">'+units+'</div></div>';
}
function _wbKpi(label,val,color){
  return '<div class="wb-kpi"><div class="wb-kpi-val" style="color:'+color+'">'+val+'</div><div class="wb-kpi-lbl">'+label+'</div></div>';
}
function _wbRender(){
  var data=_wbData();
  var titles=['This Week','Top Performers','Team Standings'];
  var tEl=document.getElementById('wb-title'); if(tEl) tEl.textContent=titles[_WB.panel]||'Live Sales';
  var stage=document.getElementById('wb-stage'); if(!stage) return;
  var html='';
  if(_WB.panel===0){
    var upo=data.totOrd?(data.totUni/data.totOrd):0;
    html='<div class="wb-kpis">'+
      _wbKpi('Orders', data.totOrd, '#5B9BD5')+
      _wbKpi('Units', data.totUni, '#70AD47')+
      _wbKpi('Units / Order', upo.toFixed(2), '#ED7D31')+
      _wbKpi('Active Sellers', data.sellers, '#FFC000')+
    '</div>';
  } else if(_WB.panel===1){
    var top=data.all.slice(0,5);
    html='<div class="wb-list">'+(top.length?_wbHead('Rep')+top.map(function(x,i){return _wbRow(i,esc(x.d.name),x.d.orders,x.d.units);}).join(''):'<div class="wb-empty">No sales yet this week.</div>')+'</div>';
  } else {
    var tt=data.tArr.slice(0,8);
    html='<div class="wb-list">'+(tt.length?_wbHead('Team')+tt.map(function(t,i){return _wbRow(i,(t.emoji?esc(t.emoji)+' ':'')+esc(t.name),t.orders,t.units);}).join(''):'<div class="wb-empty">No team sales yet this week.</div>')+'</div>';
  }
  stage.innerHTML=html;
  var dots=document.getElementById('wb-dots');
  if(dots) dots.innerHTML=[0,1,2].map(function(i){return '<span class="wb-dot'+(i===_WB.panel?' wb-dot-on':'')+'" onclick="_wbGo('+i+')"></span>';}).join('');
}

// ── KPI SUMMARY CARDS (client-side over _LST_SALES; respects role scoping) ──
function _lstKpiDateKey(d){ return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function _lstKpiDayLabel(d){ return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+(d.getMonth()+1)+'/'+d.getDate(); }

function _lstKpiAddSale(b, email, roster, s){
  b.orders++;
  b.units += s.units || 0;
  if (!b.reps[email]) b.reps[email] = { name: (roster[email] && roster[email].name) || email, orders:0, units:0 };
  b.reps[email].orders++;
  b.reps[email].units += s.units || 0;
}

// Build period buckets oldest→newest. days: last 14 calendar days; weeks: last 8 Mon-start weeks.
function _lstKpiBuckets(sales, roster, view, teamSet) {
  var DAY = 86400000;
  var now = new Date(); now.setHours(0,0,0,0);
  var buckets = [], index = {};
  function mk(key, label){ var b={key:key,label:label,orders:0,units:0,reps:{}}; buckets.push(b); index[key]=b; return b; }

  function eligible(email){
    if (!roster[email] || roster[email].deactivated) return false;
    if (teamSet && !teamSet[email]) return false;
    return true;
  }

  if (view === 'weeks') {
    var dow = now.getDay(), dfm = dow === 0 ? 6 : dow - 1;
    var curMon = new Date(now); curMon.setDate(now.getDate() - dfm); curMon.setHours(0,0,0,0);
    for (var i = 7; i >= 0; i--) {
      var ms = new Date(curMon.getTime() - i * 7 * DAY);
      mk(_lstKpiDateKey(ms), (ms.getMonth()+1)+'/'+ms.getDate());
    }
    (sales || []).forEach(function(s){
      if (!s.dateOfSale || !eligible(s.repEmail)) return;
      var sd = new Date(s.dateOfSale + 'T12:00:00'); sd.setHours(0,0,0,0);
      var wdow = sd.getDay(), wdfm = wdow === 0 ? 6 : wdow - 1;
      var sMon = new Date(sd); sMon.setDate(sd.getDate() - wdfm); sMon.setHours(0,0,0,0);
      var b = index[_lstKpiDateKey(sMon)];
      if (b) _lstKpiAddSale(b, s.repEmail, roster, s);
    });
  } else {
    for (var j = 13; j >= 0; j--) {
      var dms = new Date(now.getTime() - j * DAY);
      mk(_lstKpiDateKey(dms), _lstKpiDayLabel(dms));
    }
    (sales || []).forEach(function(s){
      if (!s.dateOfSale || !eligible(s.repEmail)) return;
      var sd2 = new Date(s.dateOfSale + 'T12:00:00'); sd2.setHours(0,0,0,0);
      var b2 = index[_lstKpiDateKey(sd2)];
      if (b2) _lstKpiAddSale(b2, s.repEmail, roster, s);
    });
  }
  return buckets;
}

function _lstDelta(cur, prev, word, decimals) {
  var d = cur - prev;
  var cls = d > 0 ? 'up' : d < 0 ? 'down' : 'flat';
  var arrow = d > 0 ? '▲' : d < 0 ? '▼' : '—';
  var mag = decimals ? Math.abs(d).toFixed(decimals) : Math.abs(d);
  var sign = d > 0 ? '+' : d < 0 ? '−' : '';
  var pct = '';
  if (prev > 0) pct = ' ('+sign+Math.round(Math.abs(d)/prev*100)+'%)';
  var txt = d === 0 ? 'no change' : sign+mag+pct;
  return '<div class="lst-kpi-delta '+cls+'"><span class="lst-kpi-arrow">'+arrow+'</span>'+txt+
    ' <span class="lst-kpi-vs">vs prior '+word+'</span></div>';
}

function _lstSpark(series, color) {
  if (!series || !series.length) return '';
  var w = 120, h = 34, pad = 2, n = series.length;
  var max = Math.max.apply(null, series), min = Math.min.apply(null, series);
  var range = max - min || 1;
  var stepX = n > 1 ? (w - pad*2)/(n-1) : 0;
  var pts = series.map(function(v, i){
    var x = pad + i*stepX;
    var y = pad + (h - pad*2) * (1 - (v - min)/range);
    return x.toFixed(1)+','+y.toFixed(1);
  });
  var line = pts.join(' ');
  var lastX = (pad+(n-1)*stepX).toFixed(1);
  var lastY = (pad + (h-pad*2)*(1-(series[n-1]-min)/range)).toFixed(1);
  var area = pad+','+(h-pad)+' '+line+' '+lastX+','+(h-pad);
  return '<svg class="lst-spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
    '<polygon points="'+area+'" fill="'+color+'" opacity="0.10"/>'+
    '<polyline points="'+line+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>'+
    '<circle cx="'+lastX+'" cy="'+lastY+'" r="2.2" fill="'+color+'"/>'+
    '</svg>';
}

function _lstKpiCard(label, value, deltaHtml, sparkHtml, color) {
  return '<div class="lst-kpi-card" style="--kpi-accent:'+color+'">'+
    '<div class="lst-kpi-lbl">'+esc(label)+'</div>'+
    '<div class="lst-kpi-val">'+value+'</div>'+
    deltaHtml+
    '<div class="lst-kpi-spark-wrap">'+sparkHtml+'</div>'+
    '</div>';
}

function _lstKpiTopCard(top, view) {
  var body = top
    ? '<div class="lst-kpi-top-name">🥇 '+esc(top.name)+'</div>'+
      '<div class="lst-kpi-top-stats">'+top.units+' units · '+top.orders+' orders</div>'
    : '<div class="lst-kpi-top-name lst-kpi-top-empty">No sales yet</div>';
  return '<div class="lst-kpi-card lst-kpi-card-top" style="--kpi-accent:#FFC000">'+
    '<div class="lst-kpi-lbl">Top Performer</div>'+body+
    '<div class="lst-kpi-top-period">'+(view==='weeks'?'this week':'today')+'</div>'+
    '</div>';
}

function _lstKpiCards(sales, roster, view, teamSet) {
  var buckets = _lstKpiBuckets(sales, roster, view, teamSet);
  var n = buckets.length;
  var cur  = buckets[n-1] || {orders:0,units:0,reps:{}};
  var prev = buckets[n-2] || {orders:0,units:0,reps:{}};

  var ordSeries  = buckets.map(function(b){return b.orders;});
  var uniSeries  = buckets.map(function(b){return b.units;});
  var sellSeries = buckets.map(function(b){return Object.keys(b.reps).length;});
  var upoSeries  = buckets.map(function(b){return b.orders ? b.units/b.orders : 0;});

  var curSellers  = Object.keys(cur.reps).length;
  var prevSellers = Object.keys(prev.reps).length;
  var curUpo  = cur.orders  ? cur.units/cur.orders   : 0;
  var prevUpo = prev.orders ? prev.units/prev.orders : 0;

  var top = null;
  Object.keys(cur.reps).forEach(function(e){
    var r = cur.reps[e];
    if (!top || r.units > top.units || (r.units === top.units && r.orders > top.orders))
      top = { name:r.name, units:r.units, orders:r.orders };
  });

  var word = view === 'weeks' ? 'wk' : 'day';
  var EX = { blue:'#5B9BD5', green:'#70AD47', orange:'#ED7D31', gold:'#FFC000' };

  var cards =
    _lstKpiCard('Orders',        cur.orders, _lstDelta(cur.orders, prev.orders, word),       _lstSpark(ordSeries,  EX.blue),   EX.blue) +
    _lstKpiCard('Units',         cur.units,  _lstDelta(cur.units,  prev.units,  word),       _lstSpark(uniSeries,  EX.green),  EX.green) +
    _lstKpiCard('Units / Order', (cur.orders ? curUpo.toFixed(1) : '—'), _lstDelta(curUpo, prevUpo, word, 1), _lstSpark(upoSeries, EX.orange), EX.orange) +
    _lstKpiCard('Active Sellers',curSellers, _lstDelta(curSellers, prevSellers, word),       _lstSpark(sellSeries, EX.gold),   EX.gold) +
    _lstKpiTopCard(top, view);

  var hint = view === 'weeks' ? 'This week vs last week · 8-week trend' : 'Today vs yesterday · 14-day trend';
  return '<div class="lst-kpi-head"><div class="lst-sec-lbl">SUMMARY</div><div class="lst-kpi-hint">'+hint+'</div></div>'+
    '<div class="lst-kpi-row">'+cards+'</div>';
}

function _lstTopPerf(topAll, topTeams) {
  var medals = ['🥇','🥈','🥉'], podCls = ['gold','silver','bronze'];
  var order = [1, 0, 2]; // render 2nd | 1st | 3rd

  function indCard(i) {
    var item = topAll[i];
    if (!item) return '<div class="lst-pod ' + podCls[i] + '"></div>';
    var d = item.d;
    return '<div class="lst-pod ' + podCls[i] + '">' +
      '<div class="lst-pod-medal">' + medals[i] + '</div>' +

      '<div class="lst-pod-role">' + esc(_LST_RNKL[d.rank] || d.rank) + '</div>' +
      '<div class="lst-pod-stats">' +
        '<div class="lst-pod-stat"><div class="lst-pod-num">' + d.units + '</div><div class="lst-pod-lbl">UNITS</div></div>' +
        '<div class="lst-pod-stat"><div class="lst-pod-num sm">' + d.orders + '</div><div class="lst-pod-lbl">ORDERS</div></div>' +
      '</div></div>';
  }

  function teamCard(i) {

    return '<div class="lst-pod ' + podCls[i] + '">' +

        '<div class="lst-pod-stat"><div class="lst-pod-num">' + t.units + '</div><div class="lst-pod-lbl">UNITS THIS WK</div></div>' +
        '<div class="lst-pod-stat"><div class="lst-pod-num sm">' + t.orders + '</div><div class="lst-pod-lbl">ORDERS</div></div>' +

  var h = '<div style="margin-bottom:32px">';

  if (topAll.length > 0) {
    h += '<div class="lst-sub-lbl">INDIVIDUALS</div>';
    h += '<div class="lst-podium">' + indCard(order[0]) + indCard(order[1]) + indCard(order[2]) + '</div>';

  if (topTeams.length > 0) {
    h += '<div class="lst-sub-lbl">TEAMS</div>';
    h += '<div class="lst-podium">' + teamCard(order[0]) + teamCard(order[1]) + teamCard(order[2]) + '</div>';

  return h + '</div>';

  return h + '</div>';
}

function _lstDaysTbl(leaders, reps, todayIdx) {
  var medals = ['🥇','🥈','🥉'];
  var h = '<thead><tr>';
  h += '<th style="width:36px">#</th><th class="ll" style="min-width:160px">NAME</th>';
  _LST_DAYS.forEach(function(d) { h += '<th colspan="2">' + d + '</th>'; });
  h += '</tr><tr><th></th><th></th>';
  _LST_DAYS.forEach(function() { h += '<th>ORD</th><th>UNITS</th>'; });
  h += '</tr></thead><tbody>';

  function row(item, rank) {
    var d = item.d;
    var r = '<tr><td style="color:var(--text2)">' + (rank <= 3 ? medals[rank - 1] : rank) + '</td>';
    r += '<td class="ll"><div class="lst-rep-name lst-rep-link" onclick="_lstShowRepProfile(\'' + item.email + '\')">' + esc(d.name) + '</div>' +
      '<div class="lst-rep-role">' + esc(_LST_RNKL[d.rank] || d.rank) + '</div></td>';
    for (var i = 0; i < 7; i++) {
      if (i > todayIdx) {
        r += '<td class="lst-dash">—</td><td class="lst-dash">—</td>';
      } else {
        r += '<td style="color:var(--text2)">' + d.days[i].orders + '</td>';
        r += '<td class="' + _lstUCls(d.days[i].units) + '">' + d.days[i].units + '</td>';
      }
    }
    return r + '</tr>';
  }

  function dayTotals(items) {
    return [0,1,2,3,4,5,6].map(function(i) {
      return {
        orders: items.reduce(function(s, x) { return s + x.d.days[i].orders; }, 0),
        units:  items.reduce(function(s, x) { return s + x.d.days[i].units;  }, 0)
      };
    });
  }

  function totalRow(label, items, extraCls) {
    var dt = dayTotals(items);
    var r = '<tr class="lst-total-row' + (extraCls ? ' ' + extraCls : '') + '">';
    r += '<td></td><td class="ll">' + label + '</td>';
    for (var i = 0; i < 7; i++) {
      if (i > todayIdx) { r += '<td class="lst-dash">—</td><td class="lst-dash">—</td>'; }
      else { r += '<td>' + dt[i].orders + '</td><td class="' + _lstUCls(dt[i].units) + '">' + dt[i].units + '</td>'; }
    }
    return r + '</tr>';
  }

  h += '<tr class="lst-section-sep"><td colspan="' + (2 + 14) + '">LEADERS</td></tr>';
  leaders.forEach(function(item, i) { h += row(item, i + 1); });
  h += totalRow('👑 LEADER TOTAL', leaders);

  h += '<tr class="lst-section-sep"><td colspan="' + (2 + 14) + '">CLIENT REPS</td></tr>';
  reps.forEach(function(item, i) { h += row(item, i + 1); });
  h += totalRow('⚡ REP TOTAL', reps);
  h += totalRow('OFFICE TOTAL', leaders.concat(reps), 'lst-grand-row');

  return h + '</tbody>';
}

function _lstWeeksTbl(leaders, reps) {
  var ws = _lstWeekStart(), DAY = 86400000;
  var weeks = [0,1,2,3,4].map(function(i) {
    var s = new Date(ws.getTime() - i * 7 * DAY);
    var m = s.getMonth() + 1, d = s.getDate();
    return { start: s, end: new Date(s.getTime() + 7 * DAY),
      label: (m < 10 ? '0' : '') + m + '/' + (d < 10 ? '0' : '') + d };
  });
  var wAgg = {}, roster = DATA.roster || {};
  Object.keys(roster).forEach(function(e) {
    var r = roster[e];
    if (r.deactivated) return;
    if (_LST_SKIP_UNLESS_SOLD.indexOf(r.rank) !== -1) return;
    wAgg[e] = { name: r.name, rank: r.rank,
      weeks: weeks.map(function() { return { orders: 0, units: 0 }; }) };
  });
  (_LST_SALES || []).forEach(function(s) {
    if (!s.dateOfSale) return;
    var email = s.repEmail;
    if (!wAgg[email] && roster[email] && !roster[email].deactivated) {
      var r = roster[email];
      wAgg[email] = { name: r.name, rank: r.rank,
        weeks: weeks.map(function() { return { orders: 0, units: 0 }; }) };
    }
    if (!wAgg[email]) return;
    var sd = new Date(s.dateOfSale + 'T12:00:00'); sd.setHours(0,0,0,0);
    for (var i = 0; i < weeks.length; i++) {
      if (sd >= weeks[i].start && sd < weeks[i].end) {
        wAgg[email].weeks[i].orders++;
        wAgg[email].weeks[i].units += s.units || 0;
        break;
      }
    }
  });

  var medals = ['🥇','🥈','🥉'];
  var h = '<thead><tr><th style="width:36px">#</th><th class="ll" style="min-width:160px">NAME</th>';
  weeks.forEach(function(w) { h += '<th colspan="2">' + w.label + '</th>'; });
  h += '</tr><tr><th></th><th></th>';
  weeks.forEach(function() { h += '<th>ORD</th><th>UNITS</th>'; });
  h += '</tr></thead><tbody>';

  function row(item, rank) {
    var wr = wAgg[item.email]; if (!wr) return '';
    var r = '<tr><td style="color:var(--text2)">' + (rank <= 3 ? medals[rank - 1] : rank) + '</td>';
    r += '<td class="ll"><div class="lst-rep-name lst-rep-link" onclick="_lstShowRepProfile(\'' + item.email + '\')">' + esc(wr.name) + '</div>' +
      '<div class="lst-rep-role">' + esc(_LST_RNKL[wr.rank] || wr.rank) + '</div></td>';
    wr.weeks.forEach(function(w) {
      r += '<td style="color:var(--text2)">' + w.orders + '</td>';
      r += '<td class="' + _lstUCls(w.units) + '">' + w.units + '</td>';
    });
    return r + '</tr>';
  }

  function totalRow(label, items, extraCls) {
    var r = '<tr class="lst-total-row' + (extraCls ? ' ' + extraCls : '') + '">';
    r += '<td></td><td class="ll">' + label + '</td>';
    weeks.forEach(function(_, wi) {
      var o = items.reduce(function(s, x) { return s + (wAgg[x.email] ? wAgg[x.email].weeks[wi].orders : 0); }, 0);
      var u = items.reduce(function(s, x) { return s + (wAgg[x.email] ? wAgg[x.email].weeks[wi].units  : 0); }, 0);
      r += '<td>' + o + '</td><td class="' + _lstUCls(u) + '">' + u + '</td>';
    });
    return r + '</tr>';
  }

  h += '<tr class="lst-section-sep"><td colspan="' + (2 + weeks.length * 2) + '">LEADERS</td></tr>';
  leaders.forEach(function(item, i) { h += row(item, i + 1); });
  h += totalRow('👑 LEADER TOTAL', leaders);
  h += '<tr class="lst-section-sep"><td colspan="' + (2 + weeks.length * 2) + '">CLIENT REPS</td></tr>';
  reps.forEach(function(item, i) { h += row(item, i + 1); });
  h += totalRow('⚡ REP TOTAL', reps);
  h += totalRow('OFFICE TOTAL', leaders.concat(reps), 'lst-grand-row');

  return h + '</tbody>';
}

var _LST_PROFILE = null;

function lstSaveTableauName(email, btn) {
  var sel = document.getElementById('rp-tbl-sel');
  if (!sel || !sel.value) return;
  btn.disabled = true; btn.textContent = 'Saving…';
  apiPost({ action:'setTableauName', email:email, tableauName:sel.value }).then(function(r) {
    if (r && r.ok) {
      if (DATA.roster && DATA.roster[email]) DATA.roster[email].tableauName = sel.value;
      _lstShowRepProfile(email);
    } else {
      btn.disabled = false; btn.textContent = 'Save';
      alert(r && r.error ? r.error : 'Error saving.');
    }
  }).catch(function() {
    btn.disabled = false; btn.textContent = 'Save';
    alert('Save failed.');
  });
}

function _lstPct(n, total) { return total > 0 ? Math.round(n / total * 100) : 0; }

function _lstProfileHtml(email, lineStats, tableauNames) {
  var roster = DATA.roster || {};

  var name = r.name || email;
  var rank = r.rank || 'client-rep';
  var team = r.team || '';
  var tableauName = r.tableauName || '';

  // This week + all-time posted sales from _LST_SALES
  var ws = _lstWeekStart(), DAY = 86400000;
  var weekOrders=0, weekUnits=0, allOrders=0, allUnits=0;
  (_LST_SALES||[]).forEach(function(s) {
    if (s.repEmail !== email) return;

    if (!s.dateOfSale) return;
    var sd = new Date(s.dateOfSale+'T12:00:00'); sd.setHours(0,0,0,0);

  if (tableauName) h += '<span class="rp-badge">📊 ' + esc(tableauName) + '</span>';
  h += '</div>';

  // Tableau Name assignment (owner/admin only)
  if (canEdit) {
    h += '<div class="rp-card"><div class="rp-card-title">Tableau Name</div>';
    if (tableauNames.length > 0) {
      h += '<div class="rp-tbl-row">';
      h += '<select class="rp-tbl-sel" id="rp-tbl-sel">';
      h += '<option value="">— Select —</option>';

        h += '<option value="'+esc(n)+'"'+(n===tableauName?' selected':'')+'>'+esc(n)+'</option>';
      });
      h += '</select>';
      h += '<button class="rp-save-btn" onclick="lstSaveTableauName(\''+email+'\',this)">Save</button>';
      h += '</div>';
      if (!tableauName) h += '<div class="rp-no-data" style="margin-top:8px">No Tableau name linked — rates and line stats require this.</div>';
    } else {
      h += '<div class="rp-no-data">No Tableau names found. Run a sync first.</div>';
    }
    h += '</div>';
  }

  // Posted Sales stats
  h += '<div class="rp-card"><div class="rp-card-title">Posted Sales</div>';
  h += '<div class="rp-stats-row">';
  h += '<div class="rp-stat"><div class="rp-stat-num">'+weekOrders+'</div><div class="rp-stat-lbl">Orders This Week</div></div>';
  h += '<div class="rp-stat"><div class="rp-stat-num">'+weekUnits+'</div><div class="rp-stat-lbl">Units This Week</div></div>';
  h += '<div class="rp-stat"><div class="rp-stat-num">'+allOrders+'</div><div class="rp-stat-lbl">All-Time Posted</div></div>';
  h += '</div></div>';

  if (!tableauName) {
    h += '<div class="rp-card" style="text-align:center;padding:24px;color:var(--text2)">Link a Tableau name above to see line metrics and rates.</div>';
    return h + '</div>';

  // Line Stats

function _lstLineStatsHtml(ls) {
  if (!ls || ls.noLink) return '';
  if (ls.error) return '<div class="rp-card"><div class="rp-card-title">Line Stats</div><div class="rp-no-data">'+esc(ls.error)+'</div></div>';
  var total = ls.total || 0;
  if (!total) return '<div class="rp-card"><div class="rp-card-title">Line Stats</div><div class="rp-no-data">No lines found in the 120-day window.</div></div>';

  var goodN = (ls.active||0) + (ls.posted||0);
  var pendN = ls.pending||0;
  var cancN = ls.canceled||0;
  var goodP = _lstPct(goodN,total), pendP = _lstPct(pendN,total), cancP = _lstPct(cancN,total);

  function pctRow(lbl, n, p, colorCls, barColor) {
    return '<div class="rp-pct-item">' +
      '<div class="rp-pct-header"><span class="rp-pct-lbl">'+lbl+'</span><span class="rp-pct-val '+colorCls+'">'+n+' lines &nbsp;'+p+'%</span></div>' +
      '<div class="rp-bar"><div class="rp-bar-fill" style="width:'+p+'%;background:'+barColor+'"></div></div>' +

  h += '<div class="rp-pct-list">';
  h += pctRow('Active / Posted', goodN, goodP, 'green', '#4ade80');
  h += pctRow('Pending (not Active, Posted, Canceled, or Disconnected)', pendN, pendP, 'orange', '#fb923c');
  h += pctRow('Canceled', cancN, cancP, 'red', '#f87171');
  h += '</div></div>';

function _lstRepArHtml(tableauName) {
  if (!_AR_LINES || !_AR_LINES.length) return '<div class="rp-card"><div class="rp-card-title">Activation Rates</div><div class="rp-no-data">No data. Visit the Activation Rates tab first to load it.</div></div>';
  var BKT = {'0-7 Days':'b0_7','8-14 Days':'b8_14','15-30 Days':'b15_30','31-60 Days':'b31_60'};
  var bkts = {b0_7:{t:0,a:0},b8_14:{t:0,a:0},b15_30:{t:0,a:0},b31_60:{t:0,a:0}};
  _AR_LINES.forEach(function(l) {
    if (l.rep !== tableauName) return;
    var b = BKT[l.bucket]; if (!b) return;
    bkts[b].t += l.vol||0; bkts[b].a += l.acts||0;
  });
  var hasData = Object.keys(bkts).some(function(k){ return bkts[k].t > 0; });
  if (!hasData) return '<div class="rp-card"><div class="rp-card-title">Activation Rates</div><div class="rp-no-data">No activation rate data for this rep.</div></div>';

  function arColor(k, pct) {
    if (k==='b0_7')   return pct>=21?'#4ade80':pct>=10?'#fbbf24':'#f87171';
    if (k==='b8_14')  return pct>=71?'#4ade80':pct>=51?'#fbbf24':'#f87171';
    if (k==='b15_30') return pct>=75?'#4ade80':pct>=70?'#fbbf24':'#f87171';
    if (k==='b31_60') return pct>=86?'#4ade80':pct>=79?'#fbbf24':'#f87171';
    return 'var(--text2)';
  }

  var BKTS = [{k:'b0_7',lbl:'0–7 Days'},{k:'b8_14',lbl:'8–14 Days'},{k:'b15_30',lbl:'15–30 Days'},{k:'b31_60',lbl:'31–60 Days'}];
  var h = '<div class="rp-card"><div class="rp-card-title">Activation Rates</div><div class="rp-rate-row">';
  BKTS.forEach(function(bkt) {
    var b = bkts[bkt.k], pct = b.t > 0 ? Math.round(b.a/b.t*100) : null;
    var color = pct !== null ? arColor(bkt.k, pct) : 'var(--text2)';
    h += '<div class="rp-rate-cell"><div class="rp-rate-bkt">'+bkt.lbl+'</div>';
    h += '<div class="rp-rate-val" style="color:'+color+'">'+(pct!==null?pct+'%':'—')+'</div>';
    if (pct !== null) h += '<div class="rp-rate-sub">('+b.a+'/'+b.t+')</div>';
    h += '</div>';
  });
  return h + '</div></div>';
}

function _lstRepChurnHtml(tableauName) {
  function fmtR(s) {
    var str = String(s==null?'':s).trim();
    if (str.indexOf('%')!==-1) return str;
    var n = parseFloat(str); if (isNaN(n)) return '0.0%';
    return (n<=1?n*100:n).toFixed(1)+'%';
  }
  var rows = (DATA.churnReport||[]).filter(function(r){ return r.rep===tableauName; });
  if (!rows.length) return '<div class="rp-card"><div class="rp-card-title">Churn</div><div class="rp-no-data">No churn data for this rep.</div></div>';
  var BKTS = ['0-30 Day','30 Day','60 Day','90 Day','120 Day'];
  var rowMap = {}; rows.forEach(function(r){ rowMap[r.bucket]=r; });
  var h = '<div class="rp-card"><div class="rp-card-title">Churn</div><div class="rp-rate-row" style="grid-template-columns:repeat(5,1fr)">';
  BKTS.forEach(function(bkt) {
    var r = rowMap[bkt];
    h += '<div class="rp-rate-cell"><div class="rp-rate-bkt">'+bkt+'</div>';
    if (!r) { h += '<div class="rp-rate-val" style="color:var(--text2)">—</div>'; }
    else { h += '<div class="rp-rate-val">'+fmtR(r.churnRate)+'</div><div class="rp-rate-sub">'+r.disconnects+' disco</div>'; }
    h += '</div>';
  });
  return h + '</div></div>';
}

// ── APPOINTMENTS ─────────────────────────────────────────────────────────
var _APPT = { activators:null, appointments:null, weekOffset:0, filterEmail:'', loading:false };

function _apptGet(params) {
  var p = Object.assign({}, params, { key: API_KEY });
  var qs = Object.keys(p).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(p[k]||''); }).join('&');
  return fetch(APPT_SCRIPT_URL+'?'+qs, { redirect:'follow' }).then(function(r){ return r.json(); });
}
function _apptPost(body) {
  return fetch(APPT_SCRIPT_URL, {
    method:'POST', redirect:'follow',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify(Object.assign({}, body, { key: API_KEY }))
  }).then(function(r){ return r.json(); });
}
function _apptWeekStart(offset) {
  var d = new Date(); var dow = d.getDay();
  d.setDate(d.getDate() + (dow===0?-6:1-dow) + (offset||0)*7);
  d.setHours(0,0,0,0); return d;
}
function _apptDateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
// Phase 1 booking window: NO same-day. Earliest = tomorrow, latest = +7 days
// (rolling, slides forward daily). Mirrors the backend _bookingWindow().
function _apptWindow() {
  var t=new Date(); t.setHours(0,0,0,0);
  var min=new Date(t); min.setDate(t.getDate()+1);
  var max=new Date(t); max.setDate(t.getDate()+7);
  return { min:_apptDateStr(min), max:_apptDateStr(max) };
}
function _apptFmt12(t) {
  if (!t) return ''; var p=t.split(':').map(Number); var h=p[0],m=p[1];
  return (h>12?h-12:h===0?12:h)+':'+String(m).padStart(2,'0')+' '+(h>=12?'PM':'AM');
}
function _apptFmtDate(s) {
  if (!s) return ''; var p=s.split('-').map(Number);
  var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo[p[1]-1]+' '+p[2]+', '+p[0];
}
function _apptSlotInSched(slot, start, end) {
  if (!start||!end) return false;
  var toM=function(t){var p=t.split(':').map(Number);return p[0]*60+p[1];};
  var s=toM(slot); return s>=toM(start)&&(s+60)<=toM(end);
}
function _apptActName(email) {
  var a=(_APPT.activators||[]).find(function(x){return x.email===email;});
  return a?a.name:email;
}

// Phase 1: stable per-activator color (assigned by sorted email so it's
// consistent across renders), service glyphs (W/A/F), device + outcome glyphs.
var _APPT_PALETTE=['#5B9BD5','#70AD47','#ED7D31','#FFC000','#9B59B6','#1ABC9C','#E74C3C','#3498DB','#E67E22','#16A085','#2ECC71','#F39C12'];
function _apptColorMap(){
  if(_APPT._colorMap) return _APPT._colorMap;
  var m={};
  (_APPT.activators||[]).slice().sort(function(a,b){return a.email<b.email?-1:1;}).forEach(function(a,i){ m[a.email]=_APPT_PALETTE[i%_APPT_PALETTE.length]; });
  _APPT._colorMap=m; return m;
}
function _apptActColor(email){ return _apptColorMap()[email]||'#888'; }
function _apptSvcGlyphs(servicesStr){
  var s=String(servicesStr||'').toLowerCase(), g='';
  if(s.indexOf('wireless')!==-1) g+='<span class="appt-svc-glyph svc-w" title="Wireless">W</span>';
  if(s.indexOf('air')!==-1)      g+='<span class="appt-svc-glyph svc-a" title="Air">A</span>';
  if(s.indexOf('fiber')!==-1||s.indexOf('internet')!==-1) g+='<span class="appt-svc-glyph svc-f" title="Fiber">F</span>';
  return g;
}
function _apptOutcomeGlyph(a){
  var o=String(a.outcome||'').toLowerCase();
  if(o==='completed')   return '<span class="appt-oc-glyph oc-done" title="Completed">✓ </span>';
  if(o==='no-show')     return '<span class="appt-oc-glyph oc-noshow" title="No-Show">✗ </span>';
  if(o==='rescheduled') return '<span class="appt-oc-glyph oc-resched" title="Rescheduled">↻ </span>';
  if(o==='canceled')    return '<span class="appt-oc-glyph oc-canc" title="Canceled">⊘ </span>';
  return '';
}
function _apptLegend(appts, acts, ws){
  if(!acts.length) return '';
  var we=new Date(ws); we.setDate(ws.getDate()+6);
  var wsS=_apptDateStr(ws), weS=_apptDateStr(we);
  var load={}; appts.forEach(function(a){ if(a.status==='cancelled')return; if(a.date>=wsS&&a.date<=weS) load[a.activatorEmail]=(load[a.activatorEmail]||0)+1; });
  var items=acts.slice().sort(function(a,b){return a.email<b.email?-1:1;}).map(function(a){
    var c=_apptActColor(a.email), n=load[a.email]||0;
    var dim=(_APPT.filterEmail!=='' && _APPT.filterEmail!==a.email);
    return '<span class="appt-leg-item'+(dim?' appt-leg-dim':'')+'" onclick="_apptFilter(\''+(_APPT.filterEmail===a.email?'':esc(a.email))+'\')" title="Click to filter">'+

      '<span class="appt-leg-count" title="Appointments this week">'+n+'</span></span>';
  }).join('');

}

function _apptCalGrid(appts, acts, ws) {
  var slots = ['10:00','11:00','12:00','13:00','14:00','15:00','16:00'];
  var dnames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var dayKeys = ['sun','mon','tue','wed','thu','fri','sat'];
  var dates = []; for (var d=0;d<7;d++){var x=new Date(ws);x.setDate(ws.getDate()+d);dates.push(_apptDateStr(x));}
  var today = _apptDateStr(new Date());
  var win = _apptWindow();
  var fe = _APPT.filterEmail;
  var aMap = {}; appts.forEach(function(a){
    if(!a.date||!a.timeSlot||a.status==='cancelled') return;
    var k=a.date+'|'+a.timeSlot; if(!aMap[k]) aMap[k]=[]; aMap[k].push(a);
  });
  var sMap = {}; acts.forEach(function(a){ sMap[a.email]=a.schedule||{}; });

  // Single source of truth for "is this (day,slot) a bookable open cell in the
  // current view?" — used by both the header pill counts and the cell render.
  function availAt(ds, slot){
    if (ds<win.min || ds>win.max) return false;
    var dk=dayKeys[new Date(ds+'T12:00:00').getDay()];
    var slotAppts=aMap[ds+'|'+slot]||[];
    if (fe){
      var sc=(sMap[fe]||{})[dk]||{};
      if(!_apptSlotInSched(slot,sc.start,sc.end)) return false;
      return !slotAppts.some(function(a){return a.activatorEmail===fe;});
    }
    if (slotAppts.length>0) return false;
    return Object.keys(sMap).some(function(em){var s=(sMap[em]||{})[dk]||{};return _apptSlotInSched(slot,s.start,s.end);});
  }
  var availCount=[0,0,0,0,0,0,0];
  for (var di=0;di<7;di++){ slots.forEach(function(slot){ if(availAt(dates[di],slot)) availCount[di]++; }); }

  var html = '<div class="appt-cal-outer"><div class="appt-cal-grid">';
  html += '<div class="appt-cal-time-hdr"></div>';
  for (var d=0;d<7;d++){
    var dt=new Date(dates[d]+'T12:00:00');
    var pill = availCount[d]>0 ? '<span class="appt-avail-pill" title="'+availCount[d]+' open slot'+(availCount[d]===1?'':'s')+'">'+availCount[d]+' open</span>' : '';
    html += '<div class="appt-cal-th'+(dates[d]===today?' appt-today-hdr':'')+'">'+
      '<div class="appt-cal-dayname">'+dnames[d]+'</div>'+
      '<div class="appt-cal-daynum">'+(dt.getMonth()+1)+'/'+dt.getDate()+'</div>'+
      pill+
    '</div>';
  }
  slots.forEach(function(slot){
    html += '<div class="appt-cal-time">'+_apptFmt12(slot)+'</div>';
    for (var d=0;d<7;d++){
      var ds=dates[d], k=ds+'|'+slot, slotAppts=aMap[k]||[];
      var offWin = ds<win.min || ds>win.max;
      if (fe) {
        var mine=slotAppts.find(function(a){return a.activatorEmail===fe;});
        if (mine) {
          var ok=SESSION.role==='master-admin'||SESSION.role==='activator'||mine.bookerEmail===SESSION.email;
          var col=_apptActColor(fe);
          html+='<div class="appt-cal-cell appt-cell-booked" style="box-shadow:inset 3px 0 0 '+col+'" title="'+(ok?esc(mine.customerName):'Booked')+' · '+esc(mine.services||'')+' ×'+(mine.deviceCount||1)+'">'+
            '<div class="appt-cell-name">'+_apptOutcomeGlyph(mine)+(ok?esc(mine.customerName):'••••••')+'</div>'+
            '<div class="appt-cell-glyphs">'+_apptSvcGlyphs(mine.services)+'<span class="appt-dev-badge">×'+(mine.deviceCount||1)+'</span></div></div>';
        } else if(offWin){
          html+='<div class="appt-cal-cell appt-cell-offwindow" title="Outside the booking window">·</div>';
        } else if(availAt(ds,slot)){
          html+='<div class="appt-cal-cell appt-cell-avail" onclick="openApptBookingModal(\''+ds+'\',\''+esc(fe)+'\',\''+slot+'\')">'+
            '<span class="appt-avail-plus">+</span> Book</div>';
        } else {
          html+='<div class="appt-cal-cell appt-cell-closed">—</div>';
        }
      } else {
        if (slotAppts.length>0){
          html+='<div class="appt-cal-cell appt-cell-booked-multi" title="'+slotAppts.length+' booked">';
          var distinct=acts.filter(function(a){return slotAppts.some(function(ap){return ap.activatorEmail===a.email;});});
          distinct.slice(0,2).forEach(function(a){ var c=_apptActColor(a.email);
            html+='<div class="appt-cell-act-tag" style="background:'+c+'2e;color:'+c+'">'+esc(a.name.split(' ')[0])+'</div>'; });
          if(distinct.length>2) html+='<div class="appt-cell-more">+'+(distinct.length-2)+'</div>';
          html+='</div>';
        } else if(offWin){
          html+='<div class="appt-cal-cell appt-cell-offwindow" title="Outside the booking window">·</div>';
        } else if(availAt(ds,slot)){
          html+='<div class="appt-cal-cell appt-cell-avail-light" onclick="openApptBookingModal(\''+ds+'\',\'\',\''+slot+'\')">'+
            '<span class="appt-avail-dot">·</span></div>';
        } else {
          html+='<div class="appt-cal-cell appt-cell-closed">—</div>';
        }
      }
    }
  });
  return html+'</div></div>';
}

// Outcome option metadata (value → label + badge class suffix).
var _APPT_OUTCOMES = [
  ['completed','Completed','completed'],
  ['rescheduled','Rescheduled','rescheduled'],
  ['no-show','No-Show','noshow'],
  ['canceled','Canceled','canceled']
];
function _apptOutcomeBadge(v) {
  var m=_APPT_OUTCOMES.filter(function(o){return o[0]===v;})[0]; if(!m) return '—';
  return '<span class="appt-outcome appt-outcome-'+m[2]+'">'+esc(m[1])+'</span>';
}
function _apptOutcomeSelect(a) {
  var opts='<option value="">Mark…</option>'+_APPT_OUTCOMES.map(function(o){
    return '<option value="'+o[0]+'"'+(a.outcome===o[0]?' selected':'')+'>'+o[1]+'</option>';
  }).join('');
  return '<select class="appt-outcome-sel" onchange="setApptOutcomeUI(\''+esc(a.appointmentId)+'\',this.value)">'+opts+'</select>';
}

function _apptUpcomingTable(appts) {
  var today = _apptDateStr(new Date());
  // Window back 7 days so recently-finished appointments that still need an
  // outcome remain visible alongside upcoming ones.
  var floor = new Date(); floor.setDate(floor.getDate()-7); floor=_apptDateStr(floor);
  var rows = appts.filter(function(a){ return a.date>=floor; })
    .sort(function(a,b){ return a.date!==b.date?a.date.localeCompare(b.date):a.timeSlot.localeCompare(b.timeSlot); })
    .slice(0,50);
  if (!rows.length) return '<div class="card" style="margin-top:16px"><div class="card-body"><div class="empty">No upcoming appointments.</div></div></div>';
  var canAll = SESSION.role==='master-admin'||SESSION.role==='activator';
  var h='<div class="card" style="margin-top:16px"><div class="card-header dark">Appointments</div>'+
    '<div class="card-body" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr>'+
    '<th>Date</th><th>Time</th><th>Activator</th><th>Customer</th><th>DSI</th><th>Services</th><th>Status</th><th>Outcome</th><th>Actions</th>'+
    '</tr></thead><tbody>';
  rows.forEach(function(a){
    var ok=canAll||a.bookerEmail===SESSION.email;       // may see customer / DSI
    var canX=canAll||a.bookerEmail===SESSION.email;      // may modify
    var cancelled = a.status==='cancelled';
    var occurred  = a.date<=today;                       // happened or happening today
    var terminal  = a.outcome==='completed'||a.outcome==='canceled';
    // Outcome cell: editable select for occurred, non-cancelled appts; else badge / dash.
    var outcomeCell;
    if (cancelled) outcomeCell='<span class="appt-outcome appt-outcome-canceled">Canceled</span>';
    else if (occurred && canX) outcomeCell=_apptOutcomeSelect(a);
    else if (a.outcome) outcomeCell=_apptOutcomeBadge(a.outcome);
    else outcomeCell='—';
    // Actions: reschedule (non-cancelled, non-terminal) + cancel (non-cancelled).
    var actions='';
    if (canX && !cancelled && !terminal)
      actions+='<button class="appt-resched-btn" onclick="rescheduleApptUI(\''+esc(a.appointmentId)+'\')">Reschedule</button>';
    if (canX && !cancelled)
      actions+='<button class="appt-do-cancel-btn" onclick="cancelAppt(\''+esc(a.appointmentId)+'\')">Cancel</button>';
    var dsiCell = ok && a.customerDSI
      ? '<span class="appt-dsi-link" title="Open in SaraPlus + copy" onclick="clickDsi(\''+esc(a.customerDSI)+'\')">'+esc(a.customerDSI)+'</span>'
      : (ok?'—':'••••');
    h+='<tr'+(occurred&&!cancelled&&!a.outcome?' class="appt-row-needsoutcome"':'')+'>'+
      '<td>'+esc(_apptFmtDate(a.date))+'</td><td>'+esc(_apptFmt12(a.timeSlot))+'</td>'+
      '<td>'+esc(_apptActName(a.activatorEmail))+'</td>'+
      '<td>'+(ok?esc(a.customerName):'••••••')+'</td>'+
      '<td>'+dsiCell+'</td>'+
      '<td style="font-size:.78rem">'+esc(a.services||'—')+'</td>'+
      '<td><span class="appt-status-'+esc(a.status)+'">'+esc(a.status)+'</span></td>'+
      '<td>'+outcomeCell+'</td>'+
      '<td style="white-space:nowrap">'+(actions||'—')+'</td>'+
    '</tr>';
  });
  return h+'</tbody></table></div></div>';
}

function _abmLoadSlots(preselect) {
  var email=(document.getElementById('abm-act')||{}).value||'';
  var date=(document.getElementById('abm-date')||{}).value||'';
  var sel=document.getElementById('abm-slot');
  if (!email||!date){if(sel)sel.innerHTML='<option value="">Select activator &amp; date first…</option>';return;}
  if(sel)sel.innerHTML='<option value="">Loading available slots…</option>';
  var req = email==='__next__'
    ? {action:'getNextAvailableSlots',officeId:CFG.officeId,date:date}
    : {action:'getAvailableSlots',activatorEmail:email,date:date};
  _apptGet(req).then(function(res){
    var slots=res.slots||[];
    if(!slots.length){sel.innerHTML='<option value="">No available slots for this date</option>';return;}
    sel.innerHTML='<option value="">Select a time…</option>'+slots.map(function(s){
      return '<option value="'+esc(s)+'"'+(s===preselect?' selected':'')+'>'+_apptFmt12(s)+'</option>';
    }).join('');
  }).catch(function(){if(sel)sel.innerHTML='<option value="">Error loading slots</option>';});
}

function submitApptBooking() {
  var actEmail=(document.getElementById('abm-act')||{}).value||'';
  var date=(document.getElementById('abm-date')||{}).value||'';
  var slot=(document.getElementById('abm-slot')||{}).value||'';
  var name=(document.getElementById('abm-name')||{}).value||'';
  var dsi=(document.getElementById('abm-dsi')||{}).value||'';
  var phone=(document.getElementById('abm-phone')||{}).value||'';
  var email=(document.getElementById('abm-email')||{}).value||'';
  var devices=parseInt((document.getElementById('abm-devices')||{}).value||'1');
  var svcs=Array.from(document.querySelectorAll('.abm-svc:checked')).map(function(cb){return cb.value;});
  var errEl=document.getElementById('abm-error');
  if (!actEmail||!date||!slot||!name||!dsi||!phone||!email){errEl.textContent='Please fill in all fields.';errEl.style.display='block';return;}
  if (!svcs.length){errEl.textContent='Please select at least one service.';errEl.style.display='block';return;}
  errEl.style.display='none';
  var btn=document.getElementById('abm-submit-btn');
  if(btn){btn.disabled=true;btn.textContent='Booking…';}
  _apptPost({action:'bookAppointment',bookerEmail:SESSION.email,activatorEmail:actEmail,
    date:date,timeSlot:slot,customerName:name,customerDSI:dsi,customerPhone:phone,
    customerEmail:email,services:svcs,deviceCount:devices,office:CFG.officeId
  }).then(function(res){
    if(btn){btn.disabled=false;btn.textContent='Confirm Booking';}
    if(res.ok){closeApptModal();_APPT.appointments=null;renderAppointmentsTab();}
    else{errEl.textContent=res.error==='slot_unavailable'?'That slot was just taken — please pick another time.':(res.error||'Booking failed. Try again.');errEl.style.display='block';}
  }).catch(function(){if(btn){btn.disabled=false;btn.textContent='Confirm Booking';}errEl.textContent='Connection error. Try again.';errEl.style.display='block';});
}

function closeApptModal() { document.getElementById('appt-booking-modal').classList.remove('open'); }

function cancelAppt(id) {
  if (!confirm('Cancel this appointment?')) return;
  _apptPost({action:'cancelAppointment',appointmentId:id,role:SESSION.role,email:SESSION.email}).then(function(res){
    if(res.ok){_APPT.appointments=null;renderAppointmentsTab();}
