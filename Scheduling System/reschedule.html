<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reschedule Appointment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
.header{background:#00A8E0;color:#fff;padding:20px 24px;text-align:center}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:13px;opacity:.85;margin-top:4px}
.container{max-width:560px;margin:28px auto;padding:0 16px 48px}
.card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.card h2{font-size:18px;color:#1f2937;margin-bottom:6px}
.card .sub{color:#6b7280;font-size:13px;margin-bottom:22px}

/* Current appt summary */
.cur-box{background:#f0fafe;border:1px solid #bae6fd;border-radius:10px;padding:14px 16px;margin-bottom:22px}
.cur-box .cur-label{font-size:11px;font-weight:700;color:#0369a1;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.cur-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.cur-row span:first-child{color:#6b7280}
.cur-row span:last-child{color:#1f2937;font-weight:600}

/* Steps */
.step-tabs{display:flex;gap:0;margin-bottom:22px;border:2px solid #e5e7eb;border-radius:10px;overflow:hidden}
.step-tab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:600;color:#9ca3af;background:#f9fafb;border:none;cursor:default}
.step-tab.active{background:#00A8E0;color:#fff}
.step-tab.done{background:#ecfdf5;color:#15803d}

/* Form */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
.fg input[type="date"]{width:100%;padding:11px 13px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;color:#1f2937;background:#fff;transition:border-color .2s}
.fg input[type="date"]:focus{outline:none;border-color:#00A8E0}
.hint{font-size:11px;color:#9ca3af;margin-top:4px}

/* Time slots */
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ts{border:2px solid #e5e7eb;border-radius:9px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .2s}
.ts:hover{border-color:#00A8E0;background:#f0fafe}
.ts.sel{border-color:#00A8E0;background:#00A8E0;color:#fff}
.ts .tt{font-weight:700;font-size:14px}

/* Summary */
.sum-box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:20px}
.sum-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.sum-row:last-child{border-bottom:none}
.sum-lbl{color:#6b7280}
.sum-val{color:#1f2937;font-weight:600;text-align:right;max-width:60%}
.change-badge{display:inline-block;background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-left:6px;vertical-align:middle}

/* Buttons */
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-p{background:#00A8E0;color:#fff}
.btn-p:hover:not(:disabled){background:#0090c4}
.btn-p:disabled{background:#9ca3af;cursor:not-allowed}
.btn-s{background:#fff;color:#374151;border:2px solid #e5e7eb}
.btn-s:hover{border-color:#9ca3af}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-row .btn{flex:1}

/* States */
.state-center{text-align:center;padding:16px 0 8px}
.big-icon{font-size:52px;margin-bottom:14px}
.state-center h3{font-size:19px;color:#1f2937;margin-bottom:8px}
.state-center p{color:#6b7280;font-size:13px;line-height:1.55}

.no-slots{text-align:center;padding:26px;color:#6b7280}
.no-slots .ico{font-size:32px;margin-bottom:10px}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.alert-err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.alert-inf{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}

.spin{display:inline-block;width:26px;height:26px;border:3px solid #e5e7eb;border-top-color:#00A8E0;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:28px;color:#6b7280}

@media(max-width:420px){.time-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>AT&T Activation Scheduler</h1>
  <p>Reschedule your appointment</p>
</div>

<div class="container" id="app">
  <div class="card">
    <div class="loading"><div class="spin"></div><br>Loading appointment…</div>
  </div>
</div>

<script>
const APPT_ID = '<?= appointmentId ?>';

const S = {
  appt: null,
  date: null,
  time: null,
  step: 1
};

window.onload = function() {
  if (!APPT_ID) { showFatalError('No appointment ID found. Please use the link in your confirmation email.'); return; }
  google.script.run
    .withSuccessHandler(onLoaded)
    .withFailureHandler(function(){ showFatalError('Could not load your appointment. Please try again.'); })
    .getAppointmentById(APPT_ID);
};

function onLoaded(appt) {
  if (!appt) { showFatalError('Appointment not found.'); return; }
  if (appt.status === 'Cancelled') { showFatalError('This appointment has already been cancelled.'); return; }
  if (appt.status === 'Completed') { showFatalError('This appointment has already been completed.'); return; }
  S.appt = appt;
  renderStep1();
}

// ── Step 1: Pick Date ──────────────────────────────────────

function renderStep1() {
  S.step = 1;
  const a = S.appt;
  const typeLabel = a.appointmentType === 'phone' ? '📞 Phone' : '🏪 In-Person';

  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>Reschedule Appointment</h2>
      <p class="sub">Choose a new date and time — your other details stay the same</p>

      <div class="cur-box">
        <div class="cur-label">Current Appointment</div>
        <div class="cur-row"><span>Date</span><span>${fmtDate(a.date)}</span></div>
        <div class="cur-row"><span>Time</span><span>${fmtTime(a.time)}</span></div>
        <div class="cur-row"><span>Activator</span><span>${esc(a.activatorName)}</span></div>
        <div class="cur-row"><span>Type</span><span>${typeLabel}</span></div>
      </div>

      <div class="step-tabs">
        <div class="step-tab active">1 · New Date</div>
        <div class="step-tab">2 · New Time</div>
        <div class="step-tab">3 · Confirm</div>
      </div>

      <div class="fg">
        <label>Select a New Date</label>
        <input type="date" id="dateInput" min="${todayStr()}" onchange="onDateChange(this.value)">
        <div class="hint">Must be booked at least 4 hours in advance</div>
      </div>

      <div id="dateInfo" class="alert alert-inf" style="display:none"></div>

      <div class="btn-row">
        <button class="btn btn-p" id="s1Next" onclick="goStep2()" disabled>Choose Time →</button>
      </div>
    </div>`;
}

function onDateChange(v) {
  S.date = v;
  S.time = null;
  const d = new Date(v + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const info = document.getElementById('dateInfo');
  info.style.display = 'block';
  info.textContent = 'Selected: ' + days[d.getDay()] + ', ' + fmtDate(v);
  document.getElementById('s1Next').disabled = false;
}

// ── Step 2: Pick Time ──────────────────────────────────────

function goStep2() {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>Reschedule Appointment</h2>
      <p class="sub">Pick an available time on ${fmtDate(S.date)}</p>

      <div class="step-tabs">
        <div class="step-tab done">1 · New Date</div>
        <div class="step-tab active">2 · New Time</div>
        <div class="step-tab">3 · Confirm</div>
      </div>

      <div id="slotsWrap">
        <div class="loading"><div class="spin"></div><br>Loading available times…</div>
      </div>

      <div class="btn-row" style="margin-top:18px">
        <button class="btn btn-s" onclick="renderStep1()">← Back</button>
        <button class="btn btn-p" id="s2Next" onclick="goStep3()" disabled>Review →</button>
      </div>
    </div>`;

  google.script.run
    .withSuccessHandler(renderSlots)
    .withFailureHandler(function(){ document.getElementById('slotsWrap').innerHTML = '<div class="alert alert-err">Failed to load time slots. Please try again.</div>'; })
    .getAvailableSlots(S.appt.activatorId, S.date, APPT_ID);
}

function renderSlots(slots) {
  if (!slots || !slots.length) {
    document.getElementById('slotsWrap').innerHTML = `
      <div class="no-slots">
        <div class="ico">📅</div>
        <strong>No available times on this date</strong><br>
        <span style="font-size:12px">Go back and select a different date</span>
      </div>`;
    return;
  }
  document.getElementById('slotsWrap').innerHTML =
    '<div class="time-grid">' +
    slots.map(s =>
      `<div class="ts" onclick="pickTime('${s}',this)">
        <div class="tt">${fmtTime(s)}</div>
      </div>`
    ).join('') +
    '</div>';
}

function pickTime(time, el) {
  S.time = time;
  document.querySelectorAll('.ts').forEach(t => t.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('s2Next').disabled = false;
}

// ── Step 3: Confirm ────────────────────────────────────────

function goStep3() {
  const a = S.appt;
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>Confirm Reschedule</h2>
      <p class="sub">Review your updated appointment before confirming</p>

      <div class="step-tabs">
        <div class="step-tab done">1 · New Date</div>
        <div class="step-tab done">2 · New Time</div>
        <div class="step-tab active">3 · Confirm</div>
      </div>

      <div class="sum-box">
        <div class="sum-row">
          <span class="sum-lbl">Date</span>
          <span class="sum-val">${fmtDate(S.date)} <span class="change-badge">NEW</span></span>
        </div>
        <div class="sum-row">
          <span class="sum-lbl">Time</span>
          <span class="sum-val">${fmtTime(S.time)} <span class="change-badge">NEW</span></span>
        </div>
        <div class="sum-row"><span class="sum-lbl">Activator</span><span class="sum-val">${esc(a.activatorName)}</span></div>
        <div class="sum-row"><span class="sum-lbl">Type</span><span class="sum-val">${a.appointmentType === 'phone' ? 'Phone Appointment' : 'In-Person Appointment'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Customer</span><span class="sum-val">${esc(a.customerName)}</span></div>
        <div class="sum-row"><span class="sum-lbl">DSI/SPM #</span><span class="sum-val">${esc(a.dsiSpmNumber)}</span></div>
        ${a.address ? `<div class="sum-row"><span class="sum-lbl">Address</span><span class="sum-val">${esc(a.address)}</span></div>` : ''}
      </div>

      <div id="submitErr" class="alert alert-err" style="display:none"></div>

      <div class="btn-row">
        <button class="btn btn-s" onclick="goStep2()">← Back</button>
        <button class="btn btn-p" id="confirmBtn" onclick="submitReschedule()">Confirm Reschedule</button>
      </div>
    </div>`;
}

function submitReschedule() {
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = 'Rescheduling…';
  document.getElementById('submitErr').style.display = 'none';

  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        showSuccess();
      } else if (res.error === 'slot_unavailable') {
        btn.disabled = false; btn.textContent = 'Confirm Reschedule';
        document.getElementById('submitErr').style.display = 'block';
        document.getElementById('submitErr').textContent = 'That time slot is no longer available. Please go back and choose another.';
      } else if (res.error === 'already_cancelled') {
        showFatalError('This appointment has already been cancelled.');
      } else {
        btn.disabled = false; btn.textContent = 'Confirm Reschedule';
        document.getElementById('submitErr').style.display = 'block';
        document.getElementById('submitErr').textContent = 'Something went wrong. Please try again.';
      }
    })
    .withFailureHandler(function() {
      btn.disabled = false; btn.textContent = 'Confirm Reschedule';
      document.getElementById('submitErr').style.display = 'block';
      document.getElementById('submitErr').textContent = 'An error occurred. Please try again.';
    })
    .rescheduleAppointment(APPT_ID, S.date, S.time);
}

function showSuccess() {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="state-center">
        <div class="big-icon">✅</div>
        <h3>Appointment Rescheduled!</h3>
        <p>
          Your activation has been moved to<br>
          <strong>${fmtDate(S.date)} at ${fmtTime(S.time)}</strong>.<br><br>
          A new confirmation email has been sent to you.
        </p>
      </div>
    </div>`;
}

function showFatalError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="state-center">
        <div class="big-icon">⚠️</div>
        <h3>Unable to Reschedule</h3>
        <p>${msg}</p>
      </div>
    </div>`;
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n){ return String(n).padStart(2,'0'); }
function fmtTime(t) {
  if (!t) return '';
  const [h,m] = String(t).split(':').map(Number);
  const per = h >= 12 ? 'PM' : 'AM';
  const h12 = h === 0 ? 12 : h > 12 ? h-12 : h;
  return h12 + ':' + pad(m) + ' ' + per;
}
function fmtDate(d) {
  if (!d) return '';
  const [y,mo,dd] = String(d).split('-').map(Number);
  return new Date(y,mo-1,dd).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
