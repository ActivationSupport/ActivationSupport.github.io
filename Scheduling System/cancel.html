<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancel Appointment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
.header{background:#00A8E0;color:#fff;padding:20px 24px;text-align:center}
.header h1{font-size:20px;font-weight:700}
.container{max-width:520px;margin:32px auto;padding:0 16px 48px}
.card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h2{font-size:18px;color:#1f2937;margin-bottom:6px}
.card .sub{color:#6b7280;font-size:13px;margin-bottom:22px}

.sum-box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:22px}
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f0f0f0}
.sum-row:last-child{border-bottom:none}
.sum-lbl{color:#6b7280;font-size:13px}
.sum-val{color:#1f2937;font-size:13px;font-weight:600;text-align:right;max-width:60%}

.warn-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px 16px;margin-bottom:22px;display:flex;gap:12px;align-items:flex-start}
.warn-icon{font-size:20px;flex-shrink:0}
.warn-text{font-size:13px;color:#991b1b;line-height:1.5}

.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-danger:disabled{background:#9ca3af;cursor:not-allowed}
.btn-ghost{background:#fff;color:#374151;border:2px solid #e5e7eb;margin-top:10px}
.btn-ghost:hover{border-color:#9ca3af}

.state-center{text-align:center;padding:16px 0 8px}
.big-icon{font-size:52px;margin-bottom:14px}
.state-center h3{font-size:19px;color:#1f2937;margin-bottom:8px}
.state-center p{color:#6b7280;font-size:13px;line-height:1.55}

.spin{display:inline-block;width:26px;height:26px;border:3px solid #e5e7eb;border-top-color:#00A8E0;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:36px;color:#6b7280}

.field-label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.field-label .req{color:#dc2626}
textarea.reason-input{width:100%;border:1.5px solid #d1d5db;border-radius:9px;padding:11px 13px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px;margin-bottom:18px;transition:border-color .2s}
textarea.reason-input:focus{outline:none;border-color:#00A8E0;box-shadow:0 0 0 3px rgba(0,168,224,.12)}
textarea.reason-input.error{border-color:#dc2626}
.field-err{font-size:12px;color:#dc2626;margin-top:-14px;margin-bottom:14px;display:none}
</style>
</head>
<body>

<div class="header">
  <h1>AT&T Activation Scheduler</h1>
</div>

<div class="container">
  <div class="card" id="mainCard">
    <div class="loading" id="loadingState">
      <div class="spin"></div><br>Loading appointment…
    </div>
  </div>
</div>

<script>
const APPT_ID = '<?= appointmentId ?>';

window.onload = function() {
  if (!APPT_ID) {
    showError('No appointment ID provided. Please check the link in your email.');
    return;
  }
  google.script.run
    .withSuccessHandler(onAppointmentLoaded)
    .withFailureHandler(function() { showError('Could not load appointment. Please try again.'); })
    .getAppointmentById(APPT_ID);
};

function onAppointmentLoaded(appt) {
  if (!appt) { showError('Appointment not found. It may have already been removed.'); return; }

  if (appt.status === 'Cancelled') {
    showAlreadyDone('This appointment has already been cancelled.', '❌');
    return;
  }
  if (appt.status === 'Completed') {
    showAlreadyDone('This appointment has already been completed and cannot be cancelled.', '✅');
    return;
  }

  const card = document.getElementById('mainCard');
  const typeLabel = appt.appointmentType === 'phone' ? '📞 Phone Appointment' : '🏪 In-Person Appointment';

  card.innerHTML = `
    <h2>Cancel Appointment</h2>
    <p class="sub">Please review the details below before cancelling</p>

    <div class="sum-box">
      <div class="sum-row"><span class="sum-lbl">Date</span><span class="sum-val">${fmtDate(appt.date)}</span></div>
      <div class="sum-row"><span class="sum-lbl">Time</span><span class="sum-val">${fmtTime(appt.time)}</span></div>
      <div class="sum-row"><span class="sum-lbl">Type</span><span class="sum-val">${typeLabel}</span></div>
      <div class="sum-row"><span class="sum-lbl">Activator</span><span class="sum-val">${esc(appt.activatorName)}</span></div>
      <div class="sum-row"><span class="sum-lbl">Customer</span><span class="sum-val">${esc(appt.customerName)}</span></div>
      <div class="sum-row"><span class="sum-lbl">DSI/SPM #</span><span class="sum-val">${esc(appt.dsiSpmNumber)}</span></div>
      ${appt.address ? `<div class="sum-row"><span class="sum-lbl">Address</span><span class="sum-val">${esc(appt.address)}</span></div>` : ''}
    </div>

    <div class="warn-box">
      <span class="warn-icon">⚠️</span>
      <div class="warn-text">
        <strong>This action cannot be undone.</strong><br>
        Cancelling will remove this appointment and notify the activator. If you'd like to reschedule instead, go back and use the Reschedule link in your confirmation email.
      </div>
    </div>

    <label class="field-label" for="cancelReason">Reason for Cancellation <span class="req">*</span></label>
    <textarea id="cancelReason" class="reason-input" placeholder="Please tell us why you're cancelling (e.g. schedule conflict, no longer needed, etc.)"></textarea>
    <div class="field-err" id="reasonErr">Please enter a reason before cancelling.</div>

    <button class="btn btn-danger" id="cancelBtn" onclick="confirmCancel()">Cancel My Appointment</button>
    <button class="btn btn-ghost" onclick="window.history.back()">Go Back</button>
  `;
}

function confirmCancel() {
  const reason = (document.getElementById('cancelReason') ? document.getElementById('cancelReason').value : '').trim();
  const errEl  = document.getElementById('reasonErr');
  const ta     = document.getElementById('cancelReason');

  // Validate reason
  if (!reason) {
    if (ta)    { ta.classList.add('error'); ta.focus(); }
    if (errEl) { errEl.style.display = 'block'; }
    return;
  }
  if (ta)    ta.classList.remove('error');
  if (errEl) errEl.style.display = 'none';

  const btn = document.getElementById('cancelBtn');
  btn.disabled = true;
  btn.textContent = 'Cancelling…';

  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) {
        showSuccess();
      } else if (res.error === 'already_cancelled') {
        showAlreadyDone('This appointment has already been cancelled.', '❌');
      } else if (res.error === 'reason_required') {
        btn.disabled = false;
        btn.textContent = 'Cancel My Appointment';
        if (ta)    { ta.classList.add('error'); ta.focus(); }
        if (errEl) errEl.style.display = 'block';
      } else {
        btn.disabled = false;
        btn.textContent = 'Cancel My Appointment';
        showError('Something went wrong. Please try again or contact us directly.');
      }
    })
    .withFailureHandler(function() {
      btn.disabled = false;
      btn.textContent = 'Cancel My Appointment';
      showError('Something went wrong. Please try again.');
    })
    .cancelByLink(APPT_ID, reason);
}

function showSuccess() {
  document.getElementById('mainCard').innerHTML = `
    <div class="state-center">
      <div class="big-icon">✅</div>
      <h3>Appointment Cancelled</h3>
      <p>Your appointment has been successfully cancelled.<br>If you'd like to rebook, use the scheduling link provided by your rep.</p>
    </div>`;
}

function showAlreadyDone(msg, icon) {
  document.getElementById('mainCard').innerHTML = `
    <div class="state-center">
      <div class="big-icon">${icon}</div>
      <h3>Nothing to Cancel</h3>
      <p>${msg}</p>
    </div>`;
}

function showError(msg) {
  document.getElementById('mainCard').innerHTML = `
    <div class="state-center">
      <div class="big-icon">⚠️</div>
      <h3>Something Went Wrong</h3>
      <p>${msg}</p>
    </div>`;
}

function fmtTime(t) {
  if (!t) return '';
  const [h, m] = String(t).split(':').map(Number);
  const per = h >= 12 ? 'PM' : 'AM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return h12 + ':' + String(m).padStart(2,'0') + ' ' + per;
}

function fmtDate(d) {
  if (!d) return '';
  const [y, mo, dd] = String(d).split('-').map(Number);
  return new Date(y, mo-1, dd).toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
